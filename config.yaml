project:
  name: "flatwhite"
  version: "0.1.0"

two_lane_architecture:
  pulse_lane_sources:
    - "google_trends"
    - "market_hiring"
    - "employer_hiring_breadth"
    - "employer_req_freshness"
    - "employer_net_delta"
    - "salary_pressure"
    - "resume_anxiety"
    - "news_velocity_count"
    - "contractor_proxy"
    - "consumer_confidence"
    - "asx_volatility"
    - "asx_momentum"
    - "reddit_topic_velocity"
    - "auslaw_velocity"
  editorial_lane_sources:
    - "reddit_rss"
    - "google_news_editorial"
    - "twitter_rss"
    - "manual_whispers"

pulse_weights:
  consumer_confidence: 0.08
  salary_pressure: 0.08
  job_anxiety: 0.07
  layoff_news_velocity: 0.07
  market_hiring: 0.07
  indeed_job_postings: 0.08
  reddit_topic_velocity: 0.07
  career_mobility: 0.06
  contractor_proxy: 0.06
  asx_volatility: 0.06
  employer_hiring_breadth: 0.05
  asx_momentum: 0.05
  indeed_remote_pct: 0.04
  employer_req_freshness: 0.04
  asic_insolvency: 0.04
  employer_net_delta: 0.03
  resume_anxiety: 0.03
  auslaw_velocity: 0.02

pulse_smoothing:
  method: "ema"
  span_weeks: 3

anomaly_detection:
  baseline_weeks: 10
  method: "median_mad"
  threshold_mads: 2.0

direction_threshold_points: 2.0

signal_reference_ranges:
  min_weeks_for_self_calibration: 10
  signals:
    market_hiring:
      floor: 8000
      ceiling: 32000
      inverted: false
    salary_pressure:
      floor: 90000
      ceiling: 135000
      inverted: false
    indeed_remote_pct:
      floor: 4.0
      ceiling: 20.0
      inverted: false
    asic_insolvency:
      floor: 100
      ceiling: 350
      inverted: true
    reddit_topic_velocity:
      floor: 30.0
      ceiling: 70.0
      inverted: true
    auslaw_velocity:
      floor: 30.0
      ceiling: 70.0
      inverted: true
    layoff_news_velocity:
      floor: 3
      ceiling: 40
      inverted: true
    job_anxiety:
      floor: 3
      ceiling: 25
      inverted: true
    career_mobility:
      floor: 2
      ceiling: 18
      inverted: false

signal_interactions:
  patterns:
    - name: "Defensive mobility"
      description: "People searching for jobs out of anxiety, not confidence"
      signals:
        high: "career_mobility"
        low: "consumer_confidence"
      thresholds:
        high_above: 60
        low_below: 40
      narrative: "Career search activity is elevated while consumer confidence is weak — this looks like defensive job-hunting, not confident talent movement."

    - name: "Confident mobility"
      description: "Genuine talent movement in a strong market"
      signals:
        high: "career_mobility"
        also_high: "consumer_confidence"
      thresholds:
        high_above: 60
        also_high_above: 60
      narrative: "Career mobility and consumer confidence are both elevated — people are moving between roles by choice, not necessity."

    - name: "News leading, public lagging"
      description: "Layoff coverage accelerating but workers haven't noticed yet"
      signals:
        calm: "job_anxiety"
        stressed: "layoff_news_velocity"
      thresholds:
        calm_above: 55
        stressed_below: 40
      narrative: "Layoff news coverage is accelerating but public search anxiety hasn't caught up yet — the newsroom knows something the workforce doesn't."

    - name: "Confirmed anxiety"
      description: "Both search intent and news coverage confirm stress"
      signals:
        anxious: "job_anxiety"
        also_anxious: "layoff_news_velocity"
      thresholds:
        anxious_below: 40
        also_anxious_below: 40
      narrative: "Both layoff news coverage and public search anxiety are elevated — the stress is real and workers know it."

    - name: "Broad pessimism"
      description: "Markets and consumers aligned in downturn conviction"
      signals:
        market: "asx_momentum"
        consumer: "consumer_confidence"
      thresholds:
        market_below: 35
        consumer_below: 35
      narrative: "Both ASX momentum and consumer confidence are deeply weak — markets and households are aligned in pessimism."

    - name: "Corporate stress confirmed"
      description: "Insolvencies rising while hiring contracts"
      signals:
        insolvency: "asic_insolvency"
        hiring: "employer_hiring_breadth"
      thresholds:
        insolvency_below: 40
        hiring_below: 40
      narrative: "Company insolvencies are elevated and employer hiring is contracting — corporate distress is showing up in both the data and the job market."

    - name: "Hiring resilience"
      description: "Companies still hiring despite negative headlines"
      signals:
        hiring: "employer_hiring_breadth"
        news: "layoff_news_velocity"
      thresholds:
        hiring_above: 60
        news_below: 40
      narrative: "Employer hiring remains strong despite escalating layoff headlines — the job market is absorbing the shock, at least for now."

    - name: "Salary squeeze"
      description: "Lots of jobs but wages compressing"
      signals:
        salary: "salary_pressure"
        hiring: "market_hiring"
      thresholds:
        salary_below: 40
        hiring_above: 60
      narrative: "Job listings are plentiful but salary pressure is weakening — employers are hiring on their terms, not yours."

google_trends:
  geo: "AU"
  timeframe: "today 3-m"
  sleep_between_calls_seconds: 65
  keyword_groups:
    job_anxiety:
      - "layoffs australia"
      - "redundancy"
      - "job cuts australia"
      - "retrenchment"
    career_mobility:
      - "recruiter sydney"
      - "salary guide australia"
      - "career change australia"
      - "resign from job"
    contractor_proxy_positive:
      - "consulting jobs australia"
      - "contract work australia"
      - "freelance jobs sydney"
    contractor_proxy_negative:
      - "hiring freeze"
    resume_anxiety:
      - "update resume"
      - "linkedin open to work"
      - "update linkedin profile"

