<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flat White — Editor Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface-warm: #FAF8F4;
  --border: #E8E4DE;
  --border-gold: #F0DFA8;
  --divider: #EEEBE5;
  --text: #1A1A1A;
  --text-2: #5A5048;
  --text-3: #7A6D60;
  --amber: #D9920A;
  --amber-light: #FEF3D8;
  --amber-dark: #B87800;
  --green: #2D8A56;
  --green-bg: #E8F5E9;
  --red: #C62828;
  --red-bg: #FFEBEE;
  --blue: #2C6FC7;
  --font-serif: Arial, Helvetica, sans-serif;
  --font-sans: Arial, Helvetica, sans-serif;
}
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: var(--font-sans); cursor: pointer; border: none; }
input, textarea, select { font-family: var(--font-sans); font-size: 14px; }
::selection { background: var(--amber-light); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Sidebar ── */
.sidebar {
  width: 200px; min-height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  padding: 24px 0; position: fixed; top: 0; left: 0; z-index: 10;
  overflow-y: auto;
}
.main { flex: 1; margin-left: 200px; padding: 36px 48px; max-width: none; }
.sidebar-brand { padding: 0 20px; margin-bottom: 32px; }
.sidebar-brand h1 { font-family: var(--font-serif); font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
.sidebar-brand span { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-top: 2px; }
.sidebar-week { padding: 0 16px; margin-bottom: 20px; }
.sidebar-week-inner { background: var(--amber-light); border-radius: 10px; padding: 10px 14px; border: 1px solid var(--border-gold); }
.sidebar-week-inner .lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-week-inner .val { font-size: 14px; font-weight: 600; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 0 10px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 9px; margin-bottom: 3px; cursor: pointer;
  border-left: 3px solid transparent; transition: all 0.15s ease;
  font-size: 13px; color: var(--text-2);
}
.nav-item:hover { background: var(--surface-warm); }
.nav-item.active { background: var(--amber-light); border-left-color: var(--amber); color: var(--text); font-weight: 600; }
.nav-item.greyed { opacity: 0.45; cursor: default; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; color: var(--text-3); }
.nav-item.active .nav-icon { color: var(--amber); }
.dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; }
.dot-done { background: var(--green); }
.dot-amber { background: var(--amber); }
.sidebar-footer { padding: 16px 20px 0; }
.sidebar-footer .lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.pbar { width: 100%; height: 3px; background: var(--divider); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.4s ease; }

/* ── Section header ── */
.sh { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid var(--border-gold); }
.sh h2 { font-family: var(--font-sans); font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sh .sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; transition: all 0.2s ease; }
.card.hov:hover { border-color: var(--border-gold); box-shadow: 0 2px 16px rgba(180,150,80,0.09); }
.card.sel { border-color: var(--amber); background: var(--amber-light); }

/* ── Chips ── */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
.chip-green { background: var(--green-bg); color: var(--green); border: 1px solid #C8E6C9; }
.chip-red { background: var(--red-bg); color: var(--red); border: 1px solid #FFCDD2; }
.chip-amber { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--border-gold); }
.chip-default { background: var(--surface-warm); color: var(--text-2); border: 1px solid var(--border); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; min-height: 40px; transition: all 0.15s ease; }
.btn-sm { padding: 6px 13px; font-size: 12px; min-height: 32px; }
.btn-primary { background: var(--amber); color: #fff; }
.btn-primary:hover { background: var(--amber-dark); }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #2E7D32; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface-warm); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #B71C1C; }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid transparent; }
.btn-ghost:hover { background: var(--surface-warm); }
.btn:disabled { background: #E0D8CC !important; color: #AAA !important; cursor: not-allowed; }

/* ── Spinner ── */
.ingest-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-3); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Gauge ── */
.gauge-wrap { text-align: center; }
.gauge-num { font-family: var(--font-sans); font-size: 60px; font-weight: 700; letter-spacing: -3px; margin-top: -12px; line-height: 1; }
.gauge-lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
.dir-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.dir-up { background: var(--red-bg); color: var(--red); border: 1px solid #FFCDD2; }
.dir-down { background: var(--green-bg); color: var(--green); border: 1px solid #C8E6C9; }
.dir-stable { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--border-gold); }

/* ── Table ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); font-weight: 600; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--divider); vertical-align: top; }
.tbl tr:hover td { background: var(--surface-warm); }
.tbl input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--amber); }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--surface); }
.form-input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }
textarea.form-input { min-height: 100px; resize: vertical; font-family: var(--font-sans); }
select.form-input { appearance: auto; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
.toolbar .model-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface-warm); min-width: 180px; }
.toolbar .model-select:focus { outline: none; border-color: var(--amber); }

/* ── Output box ── */
.output-box { margin-top: 20px; }
.output-box textarea { width: 100%; min-height: 200px; padding: 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; line-height: 1.7; font-family: var(--font-sans); resize: vertical; background: var(--surface-warm); }
.output-box textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }

/* ── Radio ── */
.radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #fff; transition: all 0.15s ease; cursor: pointer; }
.radio.on { background: var(--amber); border-color: var(--amber); }

/* ── Layout utils ── */
.g2 { display: grid; grid-template-columns: 280px 1fr; gap: 28px; }
.fc { display: flex; flex-direction: column; gap: 10px; }
.fr { display: flex; align-items: center; gap: 8px; }
.fb { display: flex; justify-content: space-between; align-items: center; }
.fw { display: flex; flex-wrap: wrap; gap: 10px; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt20 { margin-top: 20px; }
.mb8 { margin-bottom: 8px; }
.mb16 { margin-bottom: 16px; }
.mb20 { margin-bottom: 20px; }
.mb24 { margin-bottom: 24px; }
.bt { border-top: 1px solid var(--divider); }

/* ── Toast notifications ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }
.toast {
  background: var(--surface); border: 1px solid var(--border-gold);
  border-radius: 14px; padding: 13px 22px; margin-top: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
  animation: slideUp 0.3s ease; font-size: 14px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Loading ── */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.loading { animation: pulse 1.5s infinite; color: var(--text-3); font-size: 14px; }

/* ── Anomaly ── */
.anomaly { background: var(--red-bg); border: 1px solid #FFCDD2; border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

/* ── Mover cards ── */
.movers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
.mover-card { padding: 16px; }
.mover-card .mc-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.mover-card .mc-sector { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.mover-card .mc-delta { font-size: 22px; font-weight: 700; }
.mover-card .mc-delta.up { color: var(--green); }
.mover-card .mc-delta.down { color: var(--red); }
.mover-card .mc-detail { font-size: 12px; color: var(--text-2); margin-top: 4px; }

/* ── Assemble status ── */
.asm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.asm-item { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
.asm-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.asm-dot.done { background: var(--green); }
.asm-dot.pending { background: var(--border); }
.asm-dot.amber { background: var(--amber); }
.asm-name { font-size: 13px; font-weight: 600; }

/* ── Candidate card list ── */
.cand-list { display: flex; flex-direction: column; gap: 10px; }
.cand-card { display: flex; gap: 14px; align-items: flex-start; cursor: pointer; }
.cand-card .cand-body { flex: 1; }
.cand-card .cand-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.cand-card .cand-meta { font-size: 12px; color: var(--text-3); }
.cand-card .cand-summary { font-size: 13px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }

/* ── OTC categories ── */
.otc-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.otc-cat-card { padding: 20px; }
.otc-cat-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; color: var(--amber-dark); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px; }
  .g2 { grid-template-columns: 1fr; }
}
.modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:60px; }
.modal-box { background:var(--bg-2);border-radius:12px;padding:28px;width:720px;max-width:95vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3); }
.modal-box h3 { margin:0 0 16px;font-size:18px; }
.modal-section-label { font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-3);margin:16px 0 6px; }
.modal-footer { display:flex;gap:10px;justify-content:flex-end;margin-top:20px; }
.cat-trends { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px; }
@media(max-width:700px){.cat-trends{grid-template-columns:1fr;}}
.cat-card { background:var(--bg-2);border-radius:10px;padding:16px; }
.cat-card-label { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:8px; }
.cat-card-score { font-size:28px;font-weight:700;color:var(--text-1); }
.cat-card-delta { display:inline-block;font-size:13px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:4px; }
.cat-card-delta.up { background:#d4edda;color:#155724; }
.cat-card-delta.down { background:#f8d7da;color:#721c24; }
.cat-card-delta.stable { background:var(--bg-3);color:var(--text-3); }
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<div class="main" id="main"><div class="loading" style="padding:40px;text-align:center;">Loading dashboard...</div></div>
<div class="toast-container" id="toasts"></div>
<div id="modal-root"></div>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   FLAT WHITE EDITOR DASHBOARD — Section-Oriented
   ═══════════════════════════════════════════════════════════════════════ */

var S = {
  page: "pulse",
  weekIso: "",
  models: [],
  pulse: null,
  signals: [],
  anomalies: [],
  items: null,
  threads: null,
  lobby: null,
  otcData: null,
  bigConvCandidates: null,
  ampFinest: null,
  events: null,
  sectionOutputs: {},
  whispers: [],
  threadComments: {},
  threadCommentsLoading: {},
  selectedBigConv: null,
  selectedThread: null,
  customBigConv: null,
  findsChecked: {},
  findsBlurbs: {},
  lobbyChecked: {},
  pulseChecked: {},
  otcPicks: {},
  otcBlurbs: {},
  otcSelected: {},
  loading: {},
  proceedModal: { open: false, section: null, prompt: "", lean: "", items: [], loading: false },
  proceedData: {},
};

/* ── Helpers ───────────────────────────────────────────── */
function api(path, opts) {
  opts = opts || {};
  var config = { headers: { "Content-Type": "application/json" } };
  if (opts.method) config.method = opts.method;
  if (opts.body) config.body = JSON.stringify(opts.body);
  return fetch(path, config).then(function(r) {
    if (!r.ok) return r.json().then(function(d) { var e = new Error(d.error || ("HTTP " + r.status)); e.data = d; throw e; });
    return r.json();
  });
}

function sparkline(values, width, height) {
  var clean = values.filter(function(v) { return v != null; });
  if (clean.length < 2) return '<svg width="' + width + '" height="' + height + '"></svg>';
  var min = Math.min.apply(null, clean);
  var max = Math.max.apply(null, clean);
  var range = max - min || 1;
  var w = width / (clean.length - 1);
  var points = clean.map(function(v, i) {
    var x = Math.round(i * w);
    var y = Math.round(height - ((v - min) / range * (height - 4)) - 2);
    return x + "," + y;
  }).join(" ");
  return '<svg width="' + width + '" height="' + height + '" style="vertical-align:middle">'
    + '<polyline points="' + points + '" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

function esc(s) {
  if (s == null) return "";
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

function showToast(msg, type) {
  var c = document.getElementById("toasts");
  var t = document.createElement("div");
  t.className = "toast " + (type || "success");
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}

function $(id) { return document.getElementById(id); }

/* ── Navigation ───────────────────────────────────────── */
var NAV_ITEMS = [
  { id: "editorial",   icon: "GM",  label: "Editorial" },
  { id: "pulse",       icon: "\u25C9", label: "Pulse" },
  { id: "big_conversation", icon: "\u00B6", label: "Big Conversation" },
  { id: "whispers",    icon: "\uD83D\uDC41", label: "Whispers" },
  { id: "lobby",       icon: "\uD83D\uDCCA", label: "The Lobby" },
  { id: "finds",       icon: "\uD83D\uDD25", label: "Finds" },
  { id: "thread",      icon: "\u00A7", label: "Thread" },
  { id: "amp_finest",  icon: "\uD83D\uDCC8", label: "AMP's Finest" },
  { id: "off_the_clock", icon: "\uD83C\uDF77", label: "Off the Clock" },
  { id: "events",      icon: "\uD83D\uDCC5", label: "Events" },
  { id: "salary_vault", icon: "\uD83D\uDCB0", label: "Salary Vault", greyed: true },
  { id: "assemble",    icon: "\u2709", label: "Assemble" },
];

function nav(page) {
  if (page === "salary_vault") return;
  S.page = page;
  renderSidebar();
  loadPageData(page).then(function() { render(); });
}

function loadPageData(page) {
  switch (page) {
    case "pulse":
      if (S.pulse) return Promise.resolve();
      return Promise.all([api("/api/pulse"), api("/api/pulse/trends")]).then(function(r) {
        S.pulse = r[0].pulse; S.signals = r[0].signals || []; S.anomalies = r[0].anomalies || []; S.weekIso = r[0].week_iso || "";
        S.trends = r[1] || null;
      });
    case "big_conversation":
      return Promise.resolve(); // Don't auto-load — user must click RUN
    case "whispers":
      return api("/api/items").then(function(d) { S.whispers = (d.items && d.items.whisper) || []; S.weekIso = d.week_iso; });
    case "lobby":
      if (S.lobby) return Promise.resolve();
      return api("/api/lobby").then(function(d) { S.lobby = d; S.weekIso = d.week_iso; });
    case "finds":
      if (S.items) return Promise.resolve();
      return api("/api/items").then(function(d) { S.items = d.items || {}; S.weekIso = d.week_iso; });
    case "thread":
      if (S.threads) return Promise.resolve();
      return api("/api/threads?limit=5").then(function(d) { S.threads = d.threads || []; S.weekIso = d.week_iso; });
    case "amp_finest":
      if (S.ampFinest !== null) return Promise.resolve();
      return api("/api/amp-finest").then(function(d) { S.ampFinest = d.data; S.weekIso = d.week_iso; });
    case "off_the_clock":
      if (S.otcData) return Promise.resolve();
      return api("/api/off-the-clock").then(function(d) { S.otcData = d; S.weekIso = d.week_iso; });
    case "events":
      if (S.events) return Promise.resolve();
      return api("/api/events").then(function(d) { S.events = d.events || []; S.weekIso = d.week_iso; });
    case "assemble":
      return api("/api/section-outputs").then(function(d) { S.sectionOutputs = d.outputs || {}; S.weekIso = d.week_iso; });
    case "editorial":
      return api("/api/section-outputs").then(function(d) { S.sectionOutputs = d.outputs || {}; S.weekIso = d.week_iso; });
    default: return Promise.resolve();
  }
}

/* ── Model dropdown helper ── */
function modelSelect(id) {
  if (!S.models.length) return "";
  var h = '<select class="model-select" id="' + id + '">';
  S.models.forEach(function(m) {
    h += '<option value="' + esc(m.id) + '">' + esc(m.label || m.id) + '</option>';
  });
  h += '</select>';
  return h;
}

function getModel(id) {
  var el = $(id);
  return el ? el.value : (S.models.length ? S.models[0].id : null);
}

/* ── Status dot for sidebar ── */
function sectionStatus(sectionId) {
  var o = S.sectionOutputs[sectionId];
  if (o && o.output_text) return '<span class="dot dot-done"></span>';
  return "";
}

/* ── Render sidebar ── */
function renderSidebar() {
  var h = '<div class="sidebar-brand"><h1>Flat White</h1><span>The Aussie Corporate</span></div>';
  h += '<div class="sidebar-week"><div class="sidebar-week-inner"><div class="lbl">Current Week</div><div class="val">' + esc(S.weekIso || "...") + '</div></div></div>';
  h += '<div class="sidebar-nav">';
  NAV_ITEMS.forEach(function(n) {
    var active = S.page === n.id ? " active" : "";
    var greyed = n.greyed ? " greyed" : "";
    h += '<div class="nav-item' + active + greyed + '" onclick="nav(\'' + n.id + '\')">';
    h += '<span class="nav-icon">' + n.icon + '</span>';
    h += '<span>' + esc(n.label) + '</span>';
    if (n.greyed) {
      h += '<span style="margin-left:auto;font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;">Soon</span>';
    } else {
      h += sectionStatus(n.id);
    }
    h += '</div>';
  });
  h += '</div>';
  // Progress footer
  var done = 0; var total = 0;
  NAV_ITEMS.forEach(function(n) {
    if (n.greyed || n.id === "assemble") return;
    total++;
    if (S.sectionOutputs[n.id] && S.sectionOutputs[n.id].output_text) done++;
  });
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  h += '<div class="sidebar-footer"><div class="lbl">Progress</div><div class="pbar"><div class="pbar-fill" style="width:' + pct + '%"></div></div><div style="font-size:12px;color:var(--text-2);margin-top:6px;">' + done + '/' + total + ' sections</div></div>';
  $("sidebar").innerHTML = h;
}

/* ── Main render dispatch ── */
function render() {
  renderSidebar();
  var m = $("main");
  switch (S.page) {
    case "pulse": renderPulse(m); break;
    case "big_conversation": renderBigConv(m); break;
    case "whispers": renderWhispers(m); break;
    case "lobby": renderLobby(m); break;
    case "finds": renderFinds(m); break;
    case "thread": renderThread(m); break;
    case "amp_finest": renderAmpFinest(m); break;
    case "off_the_clock": renderOTC(m); break;
    case "events": renderEvents(m); break;
    case "assemble": renderAssemble(m); break;
    case "editorial": renderEditorial(m); break;
    default: m.innerHTML = '<p>Unknown page</p>';
  }
  // Render modal overlay (outside main content)
  var modalEl = document.getElementById("modal-root");
  if (modalEl) modalEl.innerHTML = renderProceedModal();
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: PULSE
   ═══════════════════════════════════════════════════════════════════════ */
function renderCategoryTrends() {
  if (!S.trends || !S.trends.categories) return "";
  var h = '<div class="cat-trends">';
  S.trends.categories.forEach(function(cat) {
    var score = cat.current_score != null ? cat.current_score.toFixed(1) : "—";
    var delta = cat.delta;
    var deltaClass = delta == null ? "stable" : (delta > 2 ? "up" : (delta < -2 ? "down" : "stable"));
    var deltaText = delta == null ? "—" : ((delta > 0 ? "+" : "") + delta.toFixed(1));
    var histScores = (cat.history || []).map(function(h) { return h.score; });
    h += '<div class="cat-card">';
    h += '<div class="cat-card-label">' + esc(cat.label) + '</div>';
    h += '<div class="cat-card-score">' + esc(score) + '</div>';
    h += '<div><span class="cat-card-delta ' + deltaClass + '">' + esc(deltaText) + ' WoW</span></div>';
    if (histScores.length >= 2) {
      h += '<div style="margin-top:10px;">' + sparkline(histScores, 120, 36) + '</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function renderPulse(el) {
  var h = '<div class="sh"><div><h2>Pulse</h2><div class="sub">Disruption score, signals, and narrative</div></div></div>';
  h += '<div class="toolbar">';
  h += '<button class="btn btn-primary" onclick="runSection(\'pulse\')">SCRAPE</button>';
  h += modelSelect("model-pulse");
  h += '<button class="btn btn-success" onclick="proceedPulse()">PROCEED</button>';
  if (S.loading.pulse) h += ' <span class="ingest-spinner"></span>';
  h += '</div>';

  if (!S.pulse) {
    h += '<div class="card"><p class="loading">No pulse data yet. Click RUN to pull signals.</p></div>';
  } else {
    // Gauge
    var p = S.pulse;
    var score = p.smoothed_score != null ? p.smoothed_score : (p.composite_score != null ? p.composite_score : "—");
    var dir = p.direction || "stable";
    // Compute pulse-level delta from trends composite_history if available
    var delta = 0;
    if (S.trends && S.trends.composite_history && S.trends.composite_history.length >= 2) {
      var hist = S.trends.composite_history;
      delta = (p.smoothed_score || 0) - (hist[hist.length - 2].value || 0);
    }
    var dirClass = dir === "up" ? "dir-up" : (dir === "down" ? "dir-down" : "dir-stable");
    var arrow = dir === "up" ? "\u2191" : (dir === "down" ? "\u2193" : "\u2192");

    h += '<div class="card mb20" style="text-align:center;padding:32px;">';
    h += '<div class="gauge-lbl">DISRUPTION SCORE</div>';
    h += '<div class="gauge-num">' + esc(typeof score === "number" ? score.toFixed(1) : score) + '</div>';
    h += '<div style="margin-top:10px;"><span class="dir-pill ' + dirClass + '">' + arrow + ' ' + esc(dir) + (delta ? ' (' + (delta > 0 ? "+" : "") + delta.toFixed(1) + ')' : '') + '</span></div>';
    h += '</div>';

    h += renderCategoryTrends();

    // Anomalies
    if (S.anomalies && S.anomalies.length) {
      h += '<div class="mb20">';
      S.anomalies.forEach(function(a) {
        h += '<div class="anomaly"><span style="font-size:18px;">\u26A0</span><span>' + esc(a.message || a) + '</span></div>';
      });
      h += '</div>';
    }

    // Signal table with checkboxes
    h += '<div class="card mb20"><div style="font-weight:600;margin-bottom:12px;">Signals</div>';
    if (S.signals && S.signals.length) {
      // Pre-check top 3 movers on first load
      if (!S._pulseInitChecked && S.signals.length) {
        S._pulseInitChecked = true;
        S.signals.forEach(function(sig) { S.pulseChecked[sig.signal_name || sig.name] = true; });
      }
      h += '<table class="tbl"><thead><tr><th style="width:30px;"></th><th>Signal</th><th>Score</th><th>Delta</th><th>Category</th></tr></thead><tbody>';
      // Build delta lookup from all_signal_deltas (full set) with biggest_movers as fallback
      var moverDeltas = {};
      if (S.trends && S.trends.all_signal_deltas) {
        Object.keys(S.trends.all_signal_deltas).forEach(function(name) {
          moverDeltas[name] = S.trends.all_signal_deltas[name].delta || 0;
        });
      } else if (S.trends && S.trends.biggest_movers) {
        S.trends.biggest_movers.forEach(function(m) { moverDeltas[m.signal_name || m.name] = m.delta || 0; });
      }
      S.signals.forEach(function(sig) {
        var name = sig.signal_name || sig.name || "";
        var checked = S.pulseChecked[name] ? " checked" : "";
        var dv = moverDeltas[name] != null ? moverDeltas[name] : 0;
        var hasDelta = moverDeltas[name] != null;
        var dc = dv > 0 ? 'color:var(--red)' : (dv < 0 ? 'color:var(--green)' : 'color:var(--text-3)');
        h += '<tr>';
        h += '<td><input type="checkbox"' + checked + ' onchange="togglePulseCheck(\'' + esc(name) + '\',this.checked)"></td>';
        h += '<td>' + esc(name) + '</td>';
        h += '<td>' + esc(sig.normalised_score != null ? sig.normalised_score.toFixed(1) : "—") + '</td>';
        h += '<td style="font-weight:600;' + dc + '">' + (hasDelta ? ((dv > 0 ? "+" : "") + dv.toFixed(1)) : "—") + '</td>';
        h += '<td><span class="chip chip-default">' + esc(sig.area || "") + '</span></td>';
        h += '</tr>';
      });
      h += '</tbody></table>';
    } else {
      h += '<p style="color:var(--text-3);font-size:13px;">No signals loaded yet.</p>';
    }
    h += '</div>';
  }

  h += outputBox("pulse");
  el.innerHTML = h;
  fillOutput("pulse");
}

function togglePulseCheck(name, val) { S.pulseChecked[name] = val; }

function proceedPulse() {
  var model = getModel("model-pulse");
  var checked = Object.keys(S.pulseChecked).filter(function(k) { return S.pulseChecked[k]; });
  S.proceedData.pulse = { section: "pulse", model: model, data: { selected_signals: checked, pulse: S.pulse, signals: S.signals, anomalies: S.anomalies } };
  openProceedModal("pulse");
}

function renderBigConv(el) {
  var h = '<div class="sh"><div><h2>Big Conversation</h2><div class="sub">Top 5 candidates for this week\'s deep dive</div></div></div>';
  h += '<div class="toolbar">';
  h += '<button class="btn btn-primary" onclick="runBigConv()">SCRAPE</button>';

  h += '<button class="btn btn-success" onclick="proceedBigConv()">PROCEED</button>';

  h += '</div>';

  // Candidates
  h += '<div class="cand-list mb20">';
  if (S.bigConvCandidates && S.bigConvCandidates.length) {
    S.bigConvCandidates.forEach(function(c, i) {
      var sel = S.selectedBigConv === c.id;
      h += '<div class="card hov' + (sel ? " sel" : "") + ' cand-card" onclick="selectBigConv(' + c.id + ')">';
      h += '<div class="radio' + (sel ? " on" : "") + '">' + (sel ? "\u2713" : "") + '</div>';
      h += '<div class="cand-body">';
      h += '<div class="cand-title">' + esc(c.title || c.summary) + '</div>';
      h += '<div class="cand-meta">' + esc(c.source || "") + ' &middot; Score: ' + esc(c.weighted_composite != null ? c.weighted_composite.toFixed(1) : "—") + '</div>';
      h += '<div class="cand-summary">' + esc(c.summary || "") + '</div>';
      h += '</div></div>';
    });
  } else {
    h += '<div class="card"><p style="color:var(--text-3);font-size:13px;">No candidates yet. Click RUN to pull editorial data.</p></div>';
  }
  h += '</div>';

  // Add custom
  h += '<div class="card mb20">';
  h += '<div class="fb mb8"><span style="font-weight:600;">Add Custom Topic</span>';
  h += '<button class="btn btn-sm btn-secondary" onclick="toggleCustomBigConv()">+ Add Custom</button></div>';
  if (S.customBigConv) {
    h += '<div class="form-group"><label>Headline</label><input class="form-input" id="bc-custom-headline" value="' + esc(S.customBigConv.headline || "") + '" placeholder="Topic headline"></div>';
    h += '<div class="form-group"><label>Pitch</label><input class="form-input" id="bc-custom-pitch" value="' + esc(S.customBigConv.pitch || "") + '" placeholder="Why this matters"></div>';
    h += '<div class="form-group"><label>Supporting Data</label><textarea class="form-input" id="bc-custom-data" placeholder="Key data points, links, context...">' + esc(S.customBigConv.data || "") + '</textarea></div>';
    h += '<button class="btn btn-sm btn-primary" onclick="useCustomBigConv()">Use This Topic</button>';
  }
  h += '</div>';

  h += outputBox("big_conversation");
  el.innerHTML = h;
  fillOutput("big_conversation");
}

function selectBigConv(id) { S.selectedBigConv = id; S.customBigConv = null; render(); }

function toggleCustomBigConv() {
  S.customBigConv = S.customBigConv ? null : { headline: "", pitch: "", data: "" };
  S.selectedBigConv = null;
  render();
}

function useCustomBigConv() {
  S.customBigConv.headline = ($("bc-custom-headline") || {}).value || "";
  S.customBigConv.pitch = ($("bc-custom-pitch") || {}).value || "";
  S.customBigConv.data = ($("bc-custom-data") || {}).value || "";
  S.selectedBigConv = null;
  render();
  showToast("Custom topic set");
}

function runBigConv() {
  S.loading.big_conversation = true; render();
  // Start finds run in background
  api("/api/run-section", { method: "POST", body: { section: "finds" } })
    .then(function(d) {
      if (!d.started) { S.loading.big_conversation = false; render(); showToast(d.message || "Already running"); return; }
      showToast("Pulling editorial sources for Big Conversation...");
      // Poll for finds completion, then load candidates
      var poll = setInterval(function() {
        fetch("/api/section-status/finds").then(function(r) { return r.json(); }).then(function(st) {
          if (!st.running && st.done) {
            clearInterval(poll);
            if (st.error) {
              S.loading.big_conversation = false; render();
              showToast("Error pulling sources: " + st.error, "error");
              return;
            }
            // Now load candidates
            api("/api/big-conversation-candidates").then(function(d) {
              S.bigConvCandidates = d.candidates || [];
              S.items = null; // invalidate items cache
              S.loading.big_conversation = false;
              render();
              showToast("Big Conversation candidates loaded (" + S.bigConvCandidates.length + ")");
            });
          }
        }).catch(function() {});
      }, 2000);
    })
    .catch(function(e) {
      S.loading.big_conversation = false; render();
      showToast("Error: " + e.message, "error");
    });
}

function proceedBigConv() {
  var model = getModel("model-bigconv");
  var data = {};
  if (S.customBigConv && S.customBigConv.headline) {
    data = { custom: true, headline: S.customBigConv.headline, pitch: S.customBigConv.pitch, supporting_data: S.customBigConv.data };
  } else if (S.selectedBigConv) {
    var c = S.bigConvCandidates.find(function(x) { return x.id === S.selectedBigConv; });
    if (c) data = { candidate_id: c.id, title: c.title, summary: c.summary, source: c.source };
  } else {
    showToast("Select a candidate or add a custom topic", "error"); return;
  }
  S.loading.big_conversation = true; render();
  api("/api/proceed-section", { method: "POST", body: { section: "big_conversation", model: model, data: data } })
    .then(function(d) { S.sectionOutputs.big_conversation = { output_text: d.output, model_used: d.model }; S.loading.big_conversation = false; render(); showToast("Big Conversation generated"); })
    .catch(function(e) { S.loading.big_conversation = false; render(); showToast("Error: " + e.message, "error"); });
}

      h += '<div class="card hov' + (checked ? " sel" : "") + '">';
      h += '<div class="fr mb8">';

      h += '</div>';
      h += '<div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">' + esc(item.source || "") + ' &middot; Score: ' + esc(item.weighted_composite != null ? item.weighted_composite.toFixed(1) : "—") + '</div>';
      if (item.summary) h += '<div style="font-size:13px;color:var(--text-2);margin-bottom:8px;line-height:1.5;">' + esc(item.summary) + '</div>';

        h += '<div class="form-group mt8"><label>Blurb</label><textarea class="form-input" id="finds-blurb-' + item.id + '" rows="2" placeholder="Write a short blurb..." onchange="updateFindsBlurb(' + item.id + ',this.value)">' + esc(S.findsBlurbs[item.id] || "") + '</textarea></div>';

function toggleFindsCheck(id, val) { S.findsChecked[id] = val; render(); }
function updateFindsBlurb(id, val) { S.findsBlurbs[id] = val; }

function proceedFinds() {
  var model = getModel("model-finds");
  var checked = Object.keys(S.findsChecked).filter(function(k) { return S.findsChecked[k]; });
  var items = (S.items && S.items.finds) || [];

function renderThread(el) {
  var h = '<div class="sh"><div><h2>Thread</h2><div class="sub">Reddit thread pick for the week</div></div></div>';
  h += '<div class="toolbar">';
  h += '<button class="btn btn-primary" onclick="runSection(\'thread\')">SCRAPE</button>';

    h += '<div class="card"><p class="loading">No threads yet. Click RUN to pull Reddit data.</p></div>';
  } else {
    h += '<div class="cand-list mb20">';
    S.threads.forEach(function(t) {
      var sel = S.selectedThread === t.id;
      var comments = S.threadComments[t.id];
      var loadingComments = S.threadCommentsLoading[t.id];
      h += '<div class="card hov' + (sel ? " sel" : "") + '">';
      h += '<div class="cand-card" onclick="selectThread(' + t.id + ')">';
      h += '<div class="radio' + (sel ? " on" : "") + '">' + (sel ? "\u2713" : "") + '</div>';
      h += '<div class="cand-body">';
      h += '<div class="cand-title">' + esc(t.title || t.summary) + '</div>';
      h += '<div class="cand-meta">' + esc(t.source || "reddit") + ' &middot; Score: ' + esc(t.weighted_composite != null ? t.weighted_composite.toFixed(1) : "—") + '</div>';
      if (t.summary) h += '<div class="cand-summary">' + esc(t.summary) + '</div>';
      h += '</div></div>';
      // Fetch comments button
      h += '<div class="mt8">';
      if (loadingComments) {
        h += '<span class="ingest-spinner"></span> Loading comments...';
      } else if (comments) {
        h += '<div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;">Top Comments:</div>';
        comments.forEach(function(c) {
          h += '<div style="background:var(--surface-warm);border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px;line-height:1.5;">' + esc(typeof c === "string" ? c : c.body || c.text || JSON.stringify(c)) + '</div>';
        });
      } else {
        h += '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();fetchThreadComments(' + t.id + ')">Fetch Comments</button>';
      }
      h += '</div></div>';
    });
    h += '</div>';
  }

  h += outputBox("thread");
  el.innerHTML = h;
  fillOutput("thread");
}

function selectThread(id) { S.selectedThread = id; render(); }

function fetchThreadComments(id) {
  S.threadCommentsLoading[id] = true; render();
  api("/api/fetch-thread-comments", { method: "POST", body: { curated_item_id: id } })
    .then(function(d) {
      S.threadComments[id] = d.comments || [];
      S.threadCommentsLoading[id] = false;
      render();
    })
    .catch(function(e) { S.threadCommentsLoading[id] = false; render(); showToast("Error: " + e.message, "error"); });
}

function proceedThread() {
  if (!S.selectedThread) { showToast("Select a thread first", "error"); return; }
  var model = getModel("model-thread");
  var t = S.threads.find(function(x) { return x.id === S.selectedThread; });
  var data = { thread_id: t.id, title: t.title || t.summary, comments: S.threadComments[t.id] || [] };
  S.loading.thread = true; render();
  api("/api/proceed-section", { method: "POST", body: { section: "thread", model: model, data: data } })
    .then(function(d) { S.sectionOutputs.thread = { output_text: d.output, model_used: d.model }; S.loading.thread = false; render(); showToast("Thread write-up generated"); })
    .catch(function(e) { S.loading.thread = false; render(); showToast("Error: " + e.message, "error"); });
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: OFF THE CLOCK
   ═══════════════════════════════════════════════════════════════════════ */
var OTC_CATS = [
  { key: "otc_eating", label: "Eating" },
  { key: "otc_watching", label: "Watching" },
  { key: "otc_reading", label: "Reading" },
  { key: "otc_wearing", label: "Wearing" },
  { key: "otc_going", label: "Going" },
];

function renderOTC(el) {
  var h = '<div class="sh"><div><h2>Off the Clock</h2><div class="sub">Lifestyle picks across 5 categories</div></div></div>';
  h += '<div class="toolbar">';
  h += '<button class="btn btn-primary" onclick="runSection(\'off_the_clock\')">SCRAPE</button>';
  h += '<button class="btn btn-sm btn-secondary" onclick="runSection(\'classify_otc\')">Classify OTC</button>';
  h += modelSelect("model-otc");
  h += '<button class="btn btn-success" onclick="proceedOTC()">PROCEED</button>';
  if (S.loading.off_the_clock) h += ' <span class="ingest-spinner"></span>';
  h += '</div>';

  if (!S.otcData || !S.otcData.candidates) {
    h += '<div class="card"><p class="loading">No data yet. Click RUN to pull lifestyle sources.</p></div>';
  } else {
    // Existing picks
    if (S.otcData.picks && S.otcData.picks.length) {
      h += '<div class="card mb20"><div style="font-weight:600;margin-bottom:10px;">Current Picks</div>';
      S.otcData.picks.forEach(function(p) {
        h += '<div class="fr mb8"><span class="chip chip-amber">' + esc(p.category || "") + '</span> <span style="font-size:13px;">' + esc(p.summary || p.editor_blurb || "") + '</span></div>';
      });
      h += '</div>';
    }

    // Categories with candidates
    h += '<div class="otc-cats">';
    OTC_CATS.forEach(function(cat) {
      var candidates = S.otcData.candidates[cat.key] || [];
      h += '<div class="card otc-cat-card">';
      h += '<div class="otc-cat-title">' + esc(cat.label) + ' ';
      h += '<span style="font-size:11px;color:var(--text-3);">' + candidates.length + ' items</span></div>';
      if (!candidates.length) {
        h += '<p style="font-size:12px;color:var(--text-3);">No candidates</p>';
      } else {
        // Initialise all selected on first render
        if (!S.otcSelected[cat.key]) {
          S.otcSelected[cat.key] = {};
          candidates.forEach(function(c) { S.otcSelected[cat.key][c.id] = true; });
        }
        candidates.forEach(function(c) {
          var checked = S.otcSelected[cat.key][c.id] ? " checked" : "";
          var city = c.city ? '<span class="chip chip-default" style="font-size:10px;">' + esc(c.city) + '</span> ' : "";
          var src = '<span style="font-size:11px;color:var(--text-3);">' + esc(c.source || "") + '</span>';
          h += '<div class="fr mb8" style="align-items:flex-start;gap:8px;">';
          h += '<input type="checkbox"' + checked + ' onchange="toggleOtcSelect(\'' + cat.key + '\',' + c.id + ',this.checked)" style="margin-top:2px;flex-shrink:0;">';
          h += '<div style="flex:1;">';
          h += '<div style="font-size:13px;">' + esc(c.title || c.summary) + '</div>';
          h += '<div style="margin-top:2px;">' + city + src + '</div>';
          h += '</div></div>';
          // Radio pick (existing behaviour — kept for final pick selection)
          var sel = S.otcPicks[cat.key] === c.id;
          if (S.otcSelected[cat.key][c.id]) {
            h += '<div style="margin-left:26px;margin-bottom:6px;">';
            h += '<label style="font-size:11px;cursor:pointer;">';
            h += '<input type="radio" name="otc-pick-' + cat.key + '" ' + (sel ? "checked" : "") + ' onchange="pickOTC(\'' + cat.key + '\',' + c.id + ')">';
            h += ' Pick this one';
            h += '</label>';
            if (sel) {
              h += '<textarea class="form-input" id="otc-blurb-' + c.id + '" rows="2" placeholder="Blurb..." style="margin-top:4px;" onchange="updateOTCBlurb(\'' + cat.key + '\',this.value)">' + esc(S.otcBlurbs[cat.key] || "") + '</textarea>';
            }
            h += '</div>';
          }
        });
      }
      h += '</div>';
    });
    h += '</div>';
  }

  h += '<div class="mt20">' + outputBox("off_the_clock") + '</div>';
  el.innerHTML = h;
  fillOutput("off_the_clock");
}

function toggleOtcSelect(cat, id, val) {
  if (!S.otcSelected[cat]) S.otcSelected[cat] = {};
  S.otcSelected[cat][id] = val;
  if (!val && S.otcPicks[cat] === id) {
    delete S.otcPicks[cat];
  }
  render();
}

function pickOTC(cat, id) {
  S.otcPicks[cat] = id;
  render();
}

function updateOTCBlurb(cat, val) { S.otcBlurbs[cat] = val; }

function proceedOTC() {
  var model = getModel("model-otc");
  var picks = [];
  var selectedByCategory = {};
  OTC_CATS.forEach(function(cat) {
    if (S.otcPicks[cat.key]) {
      picks.push({ category: cat.key, curated_item_id: S.otcPicks[cat.key], blurb: S.otcBlurbs[cat.key] || "" });
    }
    // Collect selected item IDs for this category
    var sel = S.otcSelected[cat.key] || {};
    selectedByCategory[cat.key] = Object.keys(sel).filter(function(id) { return sel[id]; }).map(Number);
  });
  S.proceedData.off_the_clock = {
    section: "off_the_clock",
    model: model,
    data: { picks: picks, selected_by_category: selectedByCategory },
  };
  var savePromises = picks.map(function(p) {
    return api("/api/off-the-clock/pick", { method: "POST", body: p }).catch(function() {});
  });
  Promise.all(savePromises).then(function() {
    openProceedModal("off_the_clock");
  });
}

function addEvent() {
  var body = {
    event_date: ($("evt-date") || {}).value || "",
    title: ($("evt-title") || {}).value || "",
    location: ($("evt-location") || {}).value || "",
    time_range: ($("evt-time") || {}).value || "",
    price: ($("evt-price") || {}).value || "",
    description: ($("evt-desc") || {}).value || "",
  };
  if (!body.title.trim()) { showToast("Title is required", "error"); return; }
  api("/api/events", { method: "POST", body: body })
    .then(function() {
      showToast("Event added");
      return api("/api/events").then(function(d) { S.events = d.events || []; render(); });
    })
    .catch(function(e) { showToast("Error: " + e.message, "error"); });
}

function deleteEvent(id) {
  api("/api/events/" + id, { method: "DELETE" })
    .then(function() {
      showToast("Event deleted");
      S.events = S.events.filter(function(e) { return e.id !== id; });
      render();
    })
    .catch(function(e) { showToast("Error: " + e.message, "error"); });
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: ASSEMBLE
   ═══════════════════════════════════════════════════════════════════════ */
function renderAssemble(el) {
  var h = '<div class="sh"><div><h2>Assemble</h2><div class="sub">Preview and export the newsletter</div></div></div>';

  // Status grid
  var sections = ["editorial","pulse","big_conversation","whispers","lobby","finds","thread","amp_finest","off_the_clock","events"];
  h += '<div class="asm-grid">';
  sections.forEach(function(s) {
    var out = S.sectionOutputs[s];
    var done = out && out.output_text;
    var dotClass = done ? "done" : "pending";
    // Events and whispers are always "done" if they have data
    if (s === "events" && S.events && S.events.length) { dotClass = "done"; done = true; }
    if (s === "whispers" && S.whispers && S.whispers.length) { dotClass = "done"; done = true; }
    h += '<div class="card asm-item"><span class="asm-dot ' + dotClass + '"></span><span class="asm-name">' + esc(s.replace(/_/g, " ")) + '</span></div>';
  });
  h += '</div>';

  // Assembled preview
  h += '<div class="card mb20">';
  h += '<div class="fb mb8"><span style="font-weight:600;">Newsletter Preview</span>';
  h += '<button class="btn btn-sm btn-primary" onclick="copyAssembly()">Copy to Clipboard</button></div>';
  h += '<textarea class="form-input" id="assembly-preview" style="min-height:400px;font-size:13px;line-height:1.8;" readonly>';

  // Concatenate all sections
  var order = ["editorial","pulse","big_conversation","whispers","lobby","finds","thread","amp_finest","off_the_clock","events"];
  var labels = {
    editorial: "GM",
    pulse: "THE PULSE",
    big_conversation: "THE BIG CONVERSATION",
    whispers: "WHISPERS",
    lobby: "THE LOBBY",
    finds: "FINDS",
    thread: "THE THREAD",
    amp_finest: "AMP'S FINEST",
    off_the_clock: "OFF THE CLOCK",
    events: "EVENTS",
  };
  order.forEach(function(s) {
    var out = S.sectionOutputs[s];
    if (out && out.output_text) {
      h += "=== " + esc(labels[s] || s.toUpperCase()) + " ===\n\n";
      h += esc(out.output_text) + "\n\n";
    } else if (s === "events" && S.events && S.events.length) {
      h += "=== EVENTS ===\n\n";
      S.events.forEach(function(e) {
        h += esc(e.title) + " - " + esc(e.event_date || "") + "\n";
        if (e.location) h += esc(e.location);
        if (e.time_range) h += " | " + esc(e.time_range);
        if (e.price) h += " | " + esc(e.price);
        h += "\n";
        if (e.description) h += esc(e.description) + "\n";
        h += "\n";
      });
    } else if (s === "whispers" && S.whispers && S.whispers.length) {
      h += "=== WHISPERS ===\n\n";
      S.whispers.forEach(function(w) {
        h += "- " + esc(w.summary || w.title || w.text) + " [" + esc(w.confidence_tag || "yellow") + "]\n";
      });
      h += "\n";
    }
  });

  h += '</textarea></div>';
  el.innerHTML = h;
}

function copyAssembly() {
  var ta = $("assembly-preview");
  if (ta) {
    navigator.clipboard.writeText(ta.value).then(function() {
      showToast("Copied to clipboard");
    }).catch(function() {
      ta.select(); document.execCommand("copy");
      showToast("Copied to clipboard");
    });
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   SHARED: Output box + Save + Run
   ═══════════════════════════════════════════════════════════════════════ */
function outputBox(section) {
  var h = '<div class="output-box">';
  h += '<div class="fb mb8"><span style="font-weight:600;font-size:13px;">Output</span>';
  h += '<button class="btn btn-sm btn-success" onclick="saveOutput(\'' + section + '\')">Save</button></div>';
  h += '<textarea id="output-' + section + '" placeholder="Generated output will appear here..."></textarea>';
  h += '</div>';
  return h;
}

function fillOutput(section) {
  var ta = $("output-" + section);
  if (ta && S.sectionOutputs[section] && S.sectionOutputs[section].output_text) {
    ta.value = S.sectionOutputs[section].output_text;
  }
}

function saveOutput(section) {
  var ta = $("output-" + section);
  if (!ta) return;
  api("/api/section-output/" + section, { method: "POST", body: { output_text: ta.value } })
    .then(function() {
      S.sectionOutputs[section] = S.sectionOutputs[section] || {};
      S.sectionOutputs[section].output_text = ta.value;
      showToast("Saved " + section.replace(/_/g, " "));
      renderSidebar();
    })
    .catch(function(e) { showToast("Error: " + e.message, "error"); });
}

function runSection(section) {
  S.loading[section] = true; render();
  // Fire and forget — returns immediately, runs in background on server
  api("/api/run-section", { method: "POST", body: { section: section } })
    .then(function(d) {
      if (!d.started) { S.loading[section] = false; render(); showToast(d.message || "Already running", "error"); return; }
      showToast(section.replace(/_/g, " ") + " scraping...");
      // Poll for completion
      pollSectionStatus(section);
    })
    .catch(function(e) { S.loading[section] = false; render(); showToast("Error: " + e.message, "error"); });
}

function pollSectionStatus(section) {
  var poll = setInterval(function() {
    fetch("/api/section-status/" + section).then(function(r) { return r.json(); }).then(function(d) {
      if (!d.running && d.done) {
        clearInterval(poll);
        S.loading[section] = false;
        if (d.error) {
          showToast(section.replace(/_/g, " ") + " failed: " + d.error, "error");
        } else {
          showToast(section.replace(/_/g, " ") + " complete");
        }
        // Invalidate cached data
        switch (section) {
          case "pulse": S.pulse = null; S.trends = null; break;
          case "finds": case "editorial": case "classify": S.items = null; S.bigConvCandidates = null; break;
          case "lobby": S.lobby = null; break;
          case "thread": S.threads = null; break;
          case "off_the_clock": case "classify_otc": S.otcData = null; break;
          case "big_conversation": S.bigConvCandidates = null; break;
        }
        // Reload if still on the relevant page
        var pageForSection = {pulse:"pulse", finds:"finds", editorial:"editorial", classify:"finds", lobby:"lobby", thread:"thread", off_the_clock:"off_the_clock", classify_otc:"off_the_clock", big_conversation:"big_conversation"};
        var relevantPage = pageForSection[section] || section;
        if (S.page === relevantPage) {
          loadPageData(S.page).then(function() { render(); });
        } else {
          render(); // Update sidebar status
        }
      }
    }).catch(function() { /* ignore poll errors */ });
  }, 2000); // Poll every 2 seconds
}

/* ═══════════════════════════════════════════════════════════════════════
   PROCEED MODAL
   ═══════════════════════════════════════════════════════════════════════ */
function openProceedModal(section, items) {
  S.proceedModal = { open: true, section: section, prompt: "", lean: "", items: items || [], loading: true };
  render();
  api("/api/preview-prompt", { method: "POST", body: { section: section, data: S.proceedData[section] || {} } })
    .then(function(d) {
      S.proceedModal.prompt = d.prompt || "";
      S.proceedModal.loading = false;
      render();
    })
    .catch(function() {
      S.proceedModal.prompt = "(Could not load prompt preview)";
      S.proceedModal.loading = false;
      render();
    });
}

function closeProceedModal() {
  S.proceedModal = { open: false, section: null, prompt: "", lean: "", items: [], loading: false };
  render();
}

function confirmAndGenerate() {
  var modal = S.proceedModal;
  var section = modal.section;
  var lean = modal.lean.trim();
  var customPrompt = lean ? lean + "\n\n" + modal.prompt : modal.prompt;
  S.proceedModal.open = false;
  S.loading[section] = true;
  render();
  var body = Object.assign({}, S.proceedData[section] || {}, {
    section: section,
    custom_prompt: customPrompt,
  });
  api("/api/proceed-section", { method: "POST", body: body })
    .then(function(d) {
      S.sectionOutputs[section] = { output_text: d.output, model_used: d.model };
      S.loading[section] = false;
      render();
      showToast(section.replace(/_/g, " ") + " generated");
    })
    .catch(function(e) {
      S.loading[section] = false;
      render();
      showToast("Error: " + e.message, "error");
    });
}

function renderProceedModal() {
  if (!S.proceedModal.open) return "";
  var modal = S.proceedModal;
  var h = '<div class="modal-overlay" onclick="if(event.target===this)closeProceedModal()">';
  h += '<div class="modal-box">';
  h += '<h3>Generate ' + esc(modal.section.replace(/_/g, " ")) + '</h3>';
  h += '<div class="modal-section-label">Editorial lean (optional)</div>';
  h += '<input class="form-input" style="margin-bottom:12px;" placeholder="e.g. Focus on Big 4 this week..." value="' + esc(modal.lean) + '" oninput="S.proceedModal.lean=this.value">';
  h += '<div class="modal-section-label">Prompt</div>';
  if (modal.loading) {
    h += '<div class="loading" style="padding:20px 0;">Loading prompt...</div>';
  } else {
    h += '<textarea class="form-input" rows="14" style="font-family:monospace;font-size:12px;" oninput="S.proceedModal.prompt=this.value">' + esc(modal.prompt) + '</textarea>';
  }
  h += '<div class="modal-footer">';
  h += '<button class="btn btn-secondary" onclick="closeProceedModal()">Cancel</button>';
  h += '<button class="btn btn-success" onclick="confirmAndGenerate()" ' + (modal.loading ? 'disabled' : '') + '>Confirm & Generate</button>';
  h += '</div></div></div>';
  return h;
}

/* ═══════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════ */
function init() {
  Promise.all([
    api("/api/models").catch(function() { return { models: [] }; }),
    api("/api/section-outputs").catch(function() { return { outputs: {} }; }),
    api("/api/pulse").catch(function() { return { pulse: null, signals: [], anomalies: [], week_iso: "" }; }),
    api("/api/pulse/trends").catch(function() { return null; }),
  ]).then(function(results) {
    S.models = results[0].models || [];
    S.sectionOutputs = results[1].outputs || {};
    S.weekIso = results[1].week_iso || results[2].week_iso || "";
    S.pulse = results[2].pulse;
    S.signals = results[2].signals || [];
    S.anomalies = results[2].anomalies || [];
    S.trends = results[3] || null;
    render();
  });
}

init();
</script>
