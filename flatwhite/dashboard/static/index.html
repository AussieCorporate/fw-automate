<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flat White — Editor Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface-warm: #FAF8F4;
  --border: #E8E4DE;
  --border-gold: #F0DFA8;
  --divider: #EEEBE5;
  --text: #1A1A1A;
  --text-2: #5A5048;
  --text-3: #7A6D60;
  --amber: #D9920A;
  --amber-light: #FEF3D8;
  --amber-dark: #B87800;
  --green: #2D8A56;
  --green-bg: #E8F5E9;
  --red: #C62828;
  --red-bg: #FFEBEE;
  --blue: #2C6FC7;
  --font-serif: Arial, Helvetica, sans-serif;
  --font-sans: Arial, Helvetica, sans-serif;
}
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 15px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: var(--font-sans); cursor: pointer; border: none; }
input, textarea, select { font-family: var(--font-sans); font-size: 14px; }
::selection { background: var(--amber-light); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Sidebar ── */
.sidebar {
  width: 200px; min-height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  padding: 24px 0; position: fixed; top: 0; left: 0; z-index: 10;
  overflow-y: auto;
}
.main { flex: 1; margin-left: 200px; max-width: none; display: flex; flex-direction: column; min-height: 100vh; }
#content { flex: 1; overflow: auto; padding: 36px 48px; }
.sidebar-brand { padding: 0 20px; margin-bottom: 32px; }
.sidebar-brand h1 { font-family: var(--font-serif); font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
.sidebar-brand span { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-top: 2px; }
.sidebar-week { padding: 0 16px; margin-bottom: 20px; }
.sidebar-week-inner { background: var(--amber-light); border-radius: 10px; padding: 10px 14px; border: 1px solid var(--border-gold); }
.sidebar-week-inner .lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-week-inner .val { font-size: 14px; font-weight: 600; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 0 10px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 9px; margin-bottom: 3px; cursor: pointer;
  border-left: 3px solid transparent; transition: all 0.15s ease;
  font-size: 13px; color: var(--text-2);
}
.nav-item:hover { background: var(--surface-warm); }
.nav-item.active { background: var(--amber-light); border-left-color: var(--amber); color: var(--text); font-weight: 600; }
.nav-item.greyed { opacity: 0.45; cursor: default; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; color: var(--text-3); }
.nav-item.active .nav-icon { color: var(--amber); }
.dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; }
.dot-done { background: var(--green); }
.dot-amber { background: var(--amber); }
.sidebar-footer { padding: 16px 20px 0; }
.sidebar-footer .lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.pbar { width: 100%; height: 3px; background: var(--divider); border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.4s ease; }

/* ── Section header ── */
.sh { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid var(--border-gold); }
.sh h2 { font-family: var(--font-sans); font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sh .sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; transition: all 0.2s ease; }
.card.hov:hover { border-color: var(--border-gold); box-shadow: 0 2px 16px rgba(180,150,80,0.09); }
.card.sel { border-color: var(--amber); background: var(--amber-light); }

/* ── Chips ── */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
.chip-green { background: var(--green-bg); color: var(--green); border: 1px solid #C8E6C9; }
.chip-red { background: var(--red-bg); color: var(--red); border: 1px solid #FFCDD2; }
.chip-amber { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--border-gold); }
.chip-default { background: var(--surface-warm); color: var(--text-2); border: 1px solid var(--border); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; min-height: 40px; transition: all 0.15s ease; }
.btn-sm { padding: 6px 13px; font-size: 12px; min-height: 32px; }
.btn-primary { background: var(--amber); color: #fff; }
.btn-primary:hover { background: var(--amber-dark); }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #2E7D32; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface-warm); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #B71C1C; }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid transparent; }
.btn-ghost:hover { background: var(--surface-warm); }
.btn:disabled { background: #E0D8CC !important; color: #AAA !important; cursor: not-allowed; }

/* ── Spinner ── */
.ingest-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-3); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Gauge ── */
.gauge-wrap { text-align: center; }
.gauge-num { font-family: var(--font-sans); font-size: 60px; font-weight: 700; letter-spacing: -3px; margin-top: 4px; line-height: 1; }
.gauge-lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
.dir-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.dir-up { background: var(--red-bg); color: var(--red); border: 1px solid #FFCDD2; }
.dir-down { background: var(--green-bg); color: var(--green); border: 1px solid #C8E6C9; }
.dir-stable { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--border-gold); }

/* ── Table ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); font-weight: 600; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--divider); vertical-align: top; }
.tbl tr:hover td { background: var(--surface-warm); }
.tbl tbody tr:hover { background: var(--bg-2); }
.tbl input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--amber); }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--surface); }
.form-input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }
textarea.form-input { min-height: 100px; resize: vertical; font-family: var(--font-sans); }
select.form-input { appearance: auto; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
.toolbar .model-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface-warm); min-width: 180px; }
.toolbar .model-select:focus { outline: none; border-color: var(--amber); }

/* ── Output box ── */
.output-box { margin-top: 20px; }
.output-box textarea { width: 100%; min-height: 200px; padding: 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; line-height: 1.7; font-family: var(--font-sans); resize: vertical; background: var(--surface-warm); }
.output-box textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }

/* ── Radio ── */
.radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #fff; transition: all 0.15s ease; cursor: pointer; }
.radio.on { background: var(--amber); border-color: var(--amber); }

/* ── Layout utils ── */
.g2 { display: grid; grid-template-columns: 280px 1fr; gap: 28px; }
.fc { display: flex; flex-direction: column; gap: 10px; }
.fr { display: flex; align-items: center; gap: 8px; }
.fb { display: flex; justify-content: space-between; align-items: center; }
.fw { display: flex; flex-wrap: wrap; gap: 10px; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt20 { margin-top: 20px; }
.mb8 { margin-bottom: 8px; }
.mb16 { margin-bottom: 16px; }
.mb20 { margin-bottom: 20px; }
.mb24 { margin-bottom: 24px; }
.bt { border-top: 1px solid var(--divider); }

/* ── Toast notifications ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }
.toast {
  background: var(--surface); border: 1px solid var(--border-gold);
  border-radius: 14px; padding: 13px 22px; margin-top: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
  animation: slideUp 0.3s ease; font-size: 14px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Loading ── */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.loading { animation: pulse 1.5s infinite; color: var(--text-3); font-size: 14px; }

/* ── Anomaly ── */
.anomaly { background: var(--red-bg); border: 1px solid #FFCDD2; border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

/* ── Mover cards ── */
.movers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
.mover-card { padding: 16px; }
.mover-card .mc-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.mover-card .mc-sector { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.mover-card .mc-delta { font-size: 22px; font-weight: 700; }
.mover-card .mc-delta.up { color: var(--green); }
.mover-card .mc-delta.down { color: var(--red); }
.mover-card .mc-detail { font-size: 12px; color: var(--text-2); margin-top: 4px; }

/* ── Assemble status ── */
.asm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.asm-item { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
.asm-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.asm-dot.done { background: var(--green); }
.asm-dot.pending { background: var(--border); }
.asm-dot.amber { background: var(--amber); }
.asm-name { font-size: 13px; font-weight: 600; }

/* ── Candidate card list ── */
.cand-list { display: flex; flex-direction: column; gap: 10px; }
.cand-card { display: flex; gap: 14px; align-items: flex-start; cursor: pointer; }
.cand-card .cand-body { flex: 1; }
.cand-card .cand-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.cand-card .cand-meta { font-size: 12px; color: var(--text-3); }
.cand-card .cand-summary { font-size: 13px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }

/* ── OTC categories ── */
.otc-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.otc-cat-card { padding: 20px; }
.otc-cat-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; color: var(--amber-dark); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  #content { padding: 20px; }
  .g2 { grid-template-columns: 1fr; }
}
.modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:60px; }
.modal-box { background:var(--bg-2);border-radius:12px;padding:28px;width:720px;max-width:95vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3); }
.modal-box h3 { margin:0 0 16px;font-size:18px; }
.modal-section-label { font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-3);margin:16px 0 6px; }
.modal-footer { display:flex;gap:10px;justify-content:flex-end;margin-top:20px; }
.cat-trends { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px; }
@media(max-width:700px){.cat-trends{grid-template-columns:1fr;}}
.cat-card { background:var(--bg-2);border-radius:10px;padding:16px; }
.cat-card-label { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:8px; }
.cat-card-score { font-size:28px;font-weight:700;color:var(--text-1); }
.cat-card-delta { display:inline-block;font-size:13px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:4px; }
.cat-card-delta.up { background:#d4edda;color:#155724; }
.cat-card-delta.down { background:#f8d7da;color:#721c24; }
.cat-card-delta.stable { background:var(--bg-3);color:var(--text-3); }
.chip-au { background:#d4edda;color:#155724; }
.chip-low-au { background:var(--bg-3);color:var(--text-3); }
/* ── Phase accordion ─────────────────────────────── */
.phase-card { border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.15s; }
.phase-card.phase-open { border-color: var(--accent, #4a9); }
.phase-card.phase-locked { opacity: 0.45; pointer-events: none; }
.phase-hdr { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-2); user-select: none; }
.phase-hdr:hover { background: var(--bg-3, #ebebeb); }
.phase-num { background: var(--accent, #4a9); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.phase-locked .phase-num { background: var(--text-3, #ccc); }
.phase-lbl { font-weight: 600; font-size: 13px; flex: 1; }
.phase-done { color: var(--accent, #4a9); font-size: 12px; margin-right: 4px; }
.phase-chevron { color: var(--text-2); font-size: 11px; }
.phase-body { padding: 14px 16px; }
/* ── Command bar ─────────────────────────────────── */
.cmd-bar { display: flex; align-items: center; gap: 8px; padding: 7px 16px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }
.cmd-pill { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; background: #333; color: #ccc; }
.cmd-pill:hover { background: #444; }
.cmd-pill.pill-green { background: #1e4a1e; color: #6f6; }
.cmd-pill.pill-amber { background: #4a3a1e; color: #fa4; }
.cmd-pill.pill-red { background: #4a1e1e; color: #f66; }
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<div class="main" id="main"><div id="cmd-bar-container"></div><div id="content"><div class="loading" style="padding:40px;text-align:center;">Loading dashboard...</div></div></div>
<div class="toast-container" id="toasts"></div>
<div id="modal-root"></div>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   FLAT WHITE EDITOR DASHBOARD — Section-Oriented
   ═══════════════════════════════════════════════════════════════════════ */

var S = {
  page: "pulse",
  weekIso: "",
  models: [],
  pulse: null,
  signals: [],
  anomalies: [],
  items: null,
  threads: null,
  lobby: null,
  otcData: null,
  bigConvCandidates: null,
  ampFinest: null,
  events: null,
  sectionOutputs: {},
  whispers: [],
  threadComments: {},
  threadCommentsLoading: {},
  selectedBigConv: null,
  selectedThread: null,
  customBigConv: null,
  findsChecked: {},
  findsBlurbs: {},
  lobbyChecked: {},
  pulseChecked: {},
  signalSort: { col: null, dir: "desc" },
  otcPicks: {},
  otcBlurbs: {},
  otcPrompt: "",
  otcInstruction: null,
  otcPromptExpanded: false,
  lastScraped: {},
  loading: {},
  sectionProgress: {},   // { section: {step, total, step_name} }
  sectionPhase: {},        // { section: 1|2|3 } — which accordion phase is open
  scrapeAllRunning: false,
  scrapeAllErrors: {},     // { section: errorMessage }
  proceedModal: { open: false, section: null, prompt: "", lean: "", items: [], loading: false, contextBreakdown: null, excludedItems: {}, _tab: "prompt" },
  proceedModel: {},    // { section: model_id } — persisted to localStorage
  proceedData: {},
  signalIntelligence: {},   // { signal_name: {delta, articles, commentary} }
  signalIntelExpanded: {},  // { signal_name: bool }
};

/* ── Helpers ───────────────────────────────────────────── */
function api(path, opts) {
  opts = opts || {};
  var config = { headers: { "Content-Type": "application/json" } };
  if (opts.method) config.method = opts.method;
  if (opts.body) config.body = JSON.stringify(opts.body);
  return fetch(path, config).then(function(r) {
    if (!r.ok) return r.json().then(function(d) { var e = new Error(d.error || ("HTTP " + r.status)); e.data = d; throw e; });
    return r.json();
  });
}

function getCurrentWeekIso() {
  var d = new Date();
  var dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getUTCFullYear() + "-W" + String(weekNo).padStart(2, "0");
}

function sparkline(values, width, height) {
  var clean = values.filter(function(v) { return v != null; });
  if (clean.length < 2) return '<svg width="' + width + '" height="' + height + '"></svg>';
  var min = Math.min.apply(null, clean);
  var max = Math.max.apply(null, clean);
  var range = max - min || 1;
  var w = width / (clean.length - 1);
  var points = clean.map(function(v, i) {
    var x = Math.round(i * w);
    var y = Math.round(height - ((v - min) / range * (height - 4)) - 2);
    return x + "," + y;
  }).join(" ");
  return '<svg width="' + width + '" height="' + height + '" style="vertical-align:middle">'
    + '<polyline points="' + points + '" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

function barSparkline(values, width, height) {
  var clean = values.filter(function(v) { return v != null; });
  if (!clean.length) return '<svg width="' + width + '" height="' + height + '"></svg>';
  var max = Math.max.apply(null, clean) || 1;
  var barW = Math.max(2, Math.floor(width / clean.length) - 1);
  var bars = clean.map(function(v, i) {
    var h2 = Math.max(2, Math.round((v / max) * height));
    var x = i * (barW + 1);
    var y = height - h2;
    return '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h2 + '" fill="var(--accent)" opacity="0.7" rx="1"/>';
  }).join("");
  return '<svg width="' + width + '" height="' + height + '" style="vertical-align:middle">' + bars + '</svg>';
}

function esc(s) {
  if (s == null) return "";
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

function formatScrapedDate(isoStr) {
  if (!isoStr) return null;
  var d = new Date(isoStr.replace(" ", "T") + "Z");
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getDate() + " " + months[d.getMonth()];
}

function showToast(msg, type) {
  var c = document.getElementById("toasts");
  var t = document.createElement("div");
  t.className = "toast " + (type || "success");
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}

function $(id) { return document.getElementById(id); }

/* ── Navigation ───────────────────────────────────────── */
var NAV_ITEMS = [
  { id: "editorial",   icon: "GM",  label: "Editorial" },
  { id: "pulse",       icon: "\u25C9", label: "Pulse" },
  { id: "big_conversation", icon: "\u00B6", label: "Big Conversation" },

function nav(page) {
  if (page === "salary_vault") return;
  S.page = page;
  renderSidebar();
  loadPageData(page).then(function() { render(); });
}

function loadPageData(page) {
  switch (page) {
    case "pulse":
      if (S.pulse) return Promise.resolve();
      return Promise.all([
        api("/api/pulse"),
        api("/api/pulse/trends"),
        api("/api/signal-intelligence/" + getCurrentWeekIso()).then(function(d) {
          S.signalIntelligence = d || {};
        }).catch(function() { S.signalIntelligence = {}; })
      ]).then(function(r) {
        S.pulse = r[0].pulse; S.signals = r[0].signals || []; S.anomalies = r[0].anomalies || []; S.weekIso = r[0].week_iso || "";
        S.lastScraped.pulse = r[0].last_scraped_at || null;
        S.trends = r[1] || null;
      });
    case "big_conversation":
      return Promise.resolve(); // Don't auto-load — user must click RUN
    case "whispers":
      return api("/api/items").then(function(d) { S.whispers = (d.items && d.items.whisper) || []; S.weekIso = d.week_iso; });
    case "lobby":
      if (S.lobby) return Promise.resolve();
      return api("/api/lobby").then(function(d) { S.lobby = d; S.weekIso = d.week_iso; S.lastScraped.lobby = d.last_scraped_at || null; });
    case "finds":
      if (S.items) return Promise.resolve();
      return api("/api/items").then(function(d) { S.items = d.items || {}; S.weekIso = d.week_iso; S.lastScraped.finds = d.last_scraped_at || null; S.lastScraped.editorial = d.last_scraped_at || null; });
    case "thread":
      if (S.threads) return Promise.resolve();
      return api("/api/threads?limit=5").then(function(d) { S.threads = d.threads || []; S.weekIso = d.week_iso; S.lastScraped.threads = d.last_scraped_at || null; });
    case "amp_finest":
      if (S.ampFinest !== null) return Promise.resolve();
      return api("/api/amp-finest").then(function(d) { S.ampFinest = d.data; S.weekIso = d.week_iso; });
    case "off_the_clock":
      if (S.otcData) return Promise.resolve();
      return api("/api/off-the-clock").then(function(d) { S.otcData = d; S.weekIso = d.week_iso; S.lastScraped.off_the_clock = d.last_scraped_at || null; });
    case "events":
      if (S.events) return Promise.resolve();
      return api("/api/events").then(function(d) { S.events = d.events || []; S.weekIso = d.week_iso; });
    case "assemble":
      return api("/api/section-outputs").then(function(d) { S.sectionOutputs = d.outputs || {}; S.weekIso = d.week_iso; });
    case "editorial":
      return api("/api/section-outputs").then(function(d) { S.sectionOutputs = d.outputs || {}; S.weekIso = d.week_iso; });
    default: return Promise.resolve();
  }
}

  { id: "pulse",            label: "Pulse" },

];

function renderCommandBar() {
  var h = '<div class="cmd-bar">';

  if (S.scrapeAllRunning) {
    h += '<button class="btn btn-sm" disabled style="opacity:0.7;">⟳ Scraping…</button>';

/* ── Render sidebar ── */
function renderSidebar() {
  var h = '<div class="sidebar-brand"><h1>Flat White</h1><span>The Aussie Corporate</span></div>';
  h += '<div class="sidebar-week"><div class="sidebar-week-inner"><div class="lbl">Current Week</div><div class="val">' + esc(S.weekIso || "...") + '</div></div></div>';
  h += '<div class="sidebar-nav">';
  NAV_ITEMS.forEach(function(n) {
    var active = S.page === n.id ? " active" : "";
    var greyed = n.greyed ? " greyed" : "";
    h += '<div class="nav-item' + active + greyed + '" onclick="nav(\'' + n.id + '\')">';
    h += '<span class="nav-icon">' + n.icon + '</span>';
    h += '<span>' + esc(n.label) + '</span>';
    if (n.greyed) {
      h += '<span style="margin-left:auto;font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;">Soon</span>';
    } else {
      h += sectionStatus(n.id);
    }
    h += '</div>';
  });
  h += '</div>';
  // Progress footer
  var done = 0; var total = 0;
  NAV_ITEMS.forEach(function(n) {
    if (n.greyed || n.id === "assemble") return;
    total++;
    if (S.sectionOutputs[n.id] && S.sectionOutputs[n.id].output_text) done++;
  });
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  h += '<div class="sidebar-footer"><div class="lbl">Progress</div><div class="pbar"><div class="pbar-fill" style="width:' + pct + '%"></div></div><div style="font-size:12px;color:var(--text-2);margin-top:6px;">' + done + '/' + total + ' sections</div></div>';
  $("sidebar").innerHTML = h;
}

/* ── Main render dispatch ── */
function render() {
  renderSidebar();
  var cmdEl = document.getElementById("cmd-bar-container");
  if (cmdEl) cmdEl.innerHTML = renderCommandBar();
  var m = $("content");
  switch (S.page) {
    case "pulse": renderPulse(m); break;
    case "big_conversation": renderBigConv(m); break;
    case "whispers": renderWhispers(m); break;
    case "lobby": renderLobby(m); break;
    case "finds": renderFinds(m); break;
    case "thread": renderThread(m); break;
    case "amp_finest": renderAmpFinest(m); break;
    case "off_the_clock": renderOTC(m); break;
    case "events": renderEvents(m); break;
    case "assemble": renderAssemble(m); break;
    case "editorial": renderEditorial(m); break;
    default: m.innerHTML = '<p>Unknown page</p>';
  }
  // Render modal overlay (outside main content)
  var modalEl = document.getElementById("modal-root");
  if (modalEl) modalEl.innerHTML = renderProceedModal();
}

   SECTION: PULSE

function renderCategoryTrends() {
  if (!S.trends || !S.trends.categories) return "";
  var h = '<div class="cat-trends">';
  S.trends.categories.forEach(function(cat) {
    var score = cat.current_score != null ? cat.current_score.toFixed(1) : "—";
    var delta = cat.delta;
    var deltaClass = delta == null ? "stable" : (delta > 2 ? "up" : (delta < -2 ? "down" : "stable"));
    var weeksAvail = S.trends && S.trends.weeks_available != null ? S.trends.weeks_available : 1;
    var deltaText = delta == null ? (weeksAvail < 2 ? "first week" : "—") : ((delta > 0 ? "+" : "") + delta.toFixed(1));
    var histScores = (cat.history || []).map(function(h) { return h.score; });
    h += '<div class="cat-card">';
    h += '<div class="cat-card-label">' + esc(cat.label) + '</div>';
    h += '<div class="cat-card-score">' + esc(score) + '</div>';
    h += '<div><span class="cat-card-delta ' + deltaClass + '">' + esc(deltaText) + ' WoW</span></div>';
    if (histScores.length >= 2) {
      h += '<div style="margin-top:10px;">' + sparkline(histScores, 120, 36) + '</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function sortSignals(col) {
  if (S.signalSort.col === col) {
    S.signalSort.dir = S.signalSort.dir === "desc" ? "asc" : "desc";
  } else {
    S.signalSort.col = col;
    S.signalSort.dir = "desc";
  }
  render();
}

function getSortedSignals(signals, moverDeltas) {
  var sort = S.signalSort;
  if (!sort.col) return signals.slice();
  return signals.slice().sort(function(a, b) {
    var na = a.signal_name || a.name || "";
    var nb = b.signal_name || b.name || "";
    var val = 0;
    if (sort.col === "name") {
      val = na.localeCompare(nb);
    } else if (sort.col === "score") {
      val = (a.normalised_score || 0) - (b.normalised_score || 0);
    } else if (sort.col === "delta") {
      val = Math.abs(moverDeltas[na] || 0) - Math.abs(moverDeltas[nb] || 0);
    } else if (sort.col === "area") {
      val = (a.area || "").localeCompare(b.area || "");
    } else if (sort.col === "evidence") {
      val = (S.signalIntelligence[na] ? 1 : 0) - (S.signalIntelligence[nb] ? 1 : 0);
    }
    return sort.dir === "desc" ? -val : val;
  });
}

function renderPulseBody() {
  var h = '';
  if (!S.pulse) {
    h += '<div class="card"><p class="loading">No pulse data yet. Click RUN to pull signals.</p></div>';
  } else {
    // Gauge
    var p = S.pulse;
    var score = p.smoothed_score != null ? p.smoothed_score : (p.composite_score != null ? p.composite_score : "—");
    var dir = p.direction || "stable";
    // Compute pulse-level delta from trends composite_history if available
    var delta = 0;
    if (S.trends && S.trends.composite_history && S.trends.composite_history.length >= 2) {
      var hist = S.trends.composite_history;
      delta = (p.smoothed_score || 0) - (hist[hist.length - 2].score || 0);
    }
    var dirClass = dir === "up" ? "dir-up" : (dir === "down" ? "dir-down" : "dir-stable");
    var arrow = dir === "up" ? "\u2191" : (dir === "down" ? "\u2193" : "\u2192");

    h += '<div class="card mb20" style="text-align:center;padding:32px;">';
    h += '<div class="gauge-lbl">DISRUPTION SCORE</div>';
    h += '<div class="gauge-num">' + esc(typeof score === "number" ? score.toFixed(1) : score) + '</div>';
    h += '<div style="margin-top:10px;"><span class="dir-pill ' + dirClass + '">' + arrow + ' ' + esc(dir) + (delta ? ' (' + (delta > 0 ? "+" : "") + delta.toFixed(1) + ')' : '') + '</span></div>';
    h += '<div style="margin-top:8px;font-size:11px;color:var(--text-3);">Lower score = healthier market</div>';
    h += '</div>';

    h += renderCategoryTrends();

    // Anomalies
    if (S.anomalies && S.anomalies.length) {
      h += '<div class="mb20">';
      S.anomalies.forEach(function(a) {
        h += '<div class="anomaly"><span style="font-size:18px;">\u26A0</span><span>' + esc(a.signal + ': score ' + (a.current != null ? a.current : '\u2014') + ' (' + (a.direction || '') + ', ' + (a.confidence || '') + ' confidence)') + '</span></div>';
      });
      h += '</div>';
    }

    // Signal table with checkboxes
    h += '<div class="card mb20"><div style="font-weight:600;margin-bottom:12px;">Signals</div>';
    if (S.signals && S.signals.length) {
      function thSort(col, label, width) {
        var active = S.signalSort.col === col;
        var arrow = active ? (S.signalSort.dir === "desc" ? " \u25BC" : " \u25B2") : "";
        var style = 'cursor:pointer;user-select:none;' + (width ? 'width:' + width + ';' : '');
        return '<th onclick="sortSignals(\'' + col + '\')" style="' + style + '">' + label + arrow + '</th>';
      }
      h += '<table class="tbl"><thead><tr>';
      h += '<th style="width:30px;"></th>';
      h += thSort("name", "Signal");
      h += thSort("score", "Score");
      h += thSort("delta", "Delta");
      h += thSort("area", "Category");
      h += thSort("evidence", "Evidence", "60px");
      h += '</tr></thead><tbody>';
      // Build delta lookup from all_signal_deltas (full set) with biggest_movers as fallback
      var moverDeltas = {};
      if (S.trends && S.trends.all_signal_deltas) {
        Object.keys(S.trends.all_signal_deltas).forEach(function(name) {
          moverDeltas[name] = S.trends.all_signal_deltas[name].delta || 0;
        });
      } else if (S.trends && S.trends.biggest_movers) {
        S.trends.biggest_movers.forEach(function(m) { moverDeltas[m.signal_name || m.name] = m.delta || 0; });
      }
      getSortedSignals(S.signals, moverDeltas).forEach(function(sig) {
        var name = sig.signal_name || sig.name || "";
        var checked = S.pulseChecked[name] ? " checked" : "";
        var dv = moverDeltas[name] != null ? moverDeltas[name] : 0;
        var hasDelta = moverDeltas[name] != null;
        var dc = !hasDelta ? 'color:var(--text-3)' : (SIGNAL_INVERTED_DISPLAY.has(name)
          ? (dv > 0 ? 'color:var(--red)' : 'color:var(--green)')
          : (dv > 0 ? 'color:var(--green)' : 'color:var(--red)'));
        h += '<tr style="cursor:pointer;" onclick="togglePulseCheck(\'' + esc(name) + '\',!S.pulseChecked[\'' + esc(name) + '\']);render()">';
        h += '<td onclick="event.stopPropagation()"><input type="checkbox"' + checked + ' onchange="togglePulseCheck(\'' + esc(name) + '\',this.checked)"></td>';
        h += '<td>' + esc(name) + '</td>';
        h += '<td>' + esc(sig.normalised_score != null ? sig.normalised_score.toFixed(1) : "—") + '</td>';
        h += '<td style="font-weight:600;' + dc + '">' + (hasDelta ? ((dv > 0 ? "+" : "") + dv.toFixed(1)) : "—") + '</td>';
        h += '<td><span class="chip chip-default">' + esc(sig.area || "") + '</span></td>';
        var intel = S.signalIntelligence[name];
        var evidenceBadge = intel
          ? '<span class="chip chip-default" style="cursor:pointer;font-size:10px;" onclick="toggleSignalIntel(\'' + esc(name) + '\')" title="' + esc((intel.commentary || "").slice(0, 80)) + '...">&#8801; evidence</span>'
          : '';
        h += '<td onclick="event.stopPropagation()">' + evidenceBadge + '</td>';
        h += '</tr>';
        if (S.signalIntelExpanded[name] && intel) {
          h += '<tr><td colspan="6" style="background:var(--bg-2);padding:12px 16px;">';
          h += '<div style="font-size:13px;line-height:1.6;color:var(--text-1);margin-bottom:10px;">' + esc(intel.commentary) + '</div>';
          if (intel.articles && intel.articles.length) {
            h += '<div style="font-size:11px;color:var(--text-3);margin-bottom:6px;">Sources:</div>';
            intel.articles.slice(0, 3).forEach(function(a) {
              h += '<div style="font-size:12px;margin-bottom:4px;">';
              h += '<a href="' + esc(a.url) + '" target="_blank" style="color:var(--amber);">' + esc(a.title) + '</a>';
              if (a.published) h += ' <span style="color:var(--text-3);">(' + esc(a.published.slice(0, 10)) + ')</span>';
              h += '</div>';
            });
          }
          h += '<button class="btn btn-secondary" style="font-size:10px;margin-top:8px;" onclick="refreshSignalIntel(\'' + esc(name) + '\')">Refresh evidence</button>';
          h += '</td></tr>';
        }
      });
      h += '</tbody></table>';
    } else {
      h += '<p style="color:var(--text-3);font-size:13px;">No signals loaded yet.</p>';
    }
    h += '</div>';
  }
  return h;
}

function proceedPulse() {

function renderBigConv(el) {
  var hasScrapeData = !!(S.bigConvCandidates && S.bigConvCandidates.length);

  p1 += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';

  p3 += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">';

function selectBigConv(id) { S.selectedBigConv = id; S.customBigConv = null; render(); }

function toggleCustomBigConv() {
  S.customBigConv = S.customBigConv ? null : { headline: "", pitch: "", data: "" };
  S.selectedBigConv = null;
  render();
}

function useCustomBigConv() {
  S.customBigConv.headline = ($("bc-custom-headline") || {}).value || "";
  S.customBigConv.pitch = ($("bc-custom-pitch") || {}).value || "";
  S.customBigConv.data = ($("bc-custom-data") || {}).value || "";
  S.selectedBigConv = null;
  render();
  showToast("Custom topic set");
}

function runBigConv() {
  S.loading.big_conversation = true; render();
  // Start finds run in background
  api("/api/run-section", { method: "POST", body: { section: "big_conversation" } })
    .then(function(d) {
      if (!d.started) { S.loading.big_conversation = false; render(); showToast(d.message || "Already running"); return; }
      showToast("Pulling Big Conversation sources (incl. top AU news)...");
      // Poll for finds completion, then load candidates
      var poll = setInterval(function() {
        fetch("/api/section-status/big_conversation").then(function(r) { return r.json(); }).then(function(st) {
          if (!st.running && st.done) {
            clearInterval(poll);
            if (st.error) {
              S.loading.big_conversation = false; render();
              showToast("Error pulling sources: " + st.error, "error");
              return;
            }
            // Now load candidates
            api("/api/big-conversation-candidates").then(function(d) {
              S.bigConvCandidates = d.candidates || [];
              S.lastScraped.big_conversation = d.last_scraped_at || null;
              S.items = null; // invalidate items cache
              S.loading.big_conversation = false;
              render();
              showToast("Big Conversation candidates loaded (" + S.bigConvCandidates.length + ")");
            });
          }
        }).catch(function() {});
      }, 2000);
    })
    .catch(function(e) {
      S.loading.big_conversation = false; render();
      showToast("Error: " + e.message, "error");
    });
}

function proceedBigConv() {
  var model = getModel("model-bigconv");
  var data = {};
  if (S.customBigConv && S.customBigConv.headline) {
    data = { headline: S.customBigConv.headline, pitch: S.customBigConv.pitch, supporting_data: S.customBigConv.data };
  } else if (S.selectedBigConv) {
    var c = (S.bigConvCandidates || []).find(function(x) { return x.id === S.selectedBigConv; });
    if (c) data = { headline: c.title, pitch: c.summary, source: c.source };
  } else {
    showToast("Select a candidate or add a custom topic", "error"); return;
  }
  S.proceedData.big_conversation = { section: "big_conversation", model: model, data: data };
  openProceedModal("big_conversation");
}

function renderFindsBody() {
  var items = (S.items && S.items.finds) || [];
  // Re-rank: AU relevance counts for 30% of display score
  items = items.slice().sort(function(a, b) {
    var da = (a.weighted_composite || 0) * 0.7 + ((a.au_relevance != null ? a.au_relevance : 5) / 10.0) * 3.0;
    var db = (b.weighted_composite || 0) * 0.7 + ((b.au_relevance != null ? b.au_relevance : 5) / 10.0) * 3.0;
    return db - da;
  });
  if (!items.length) {
    return '<div class="card"><p class="loading">No finds yet. Click RUN to pull editorial sources.</p></div>';
  }
  var h = '';
  var checkedCount = Object.keys(S.findsChecked).filter(function(k) { return S.findsChecked[k]; }).length;
  h += '<div style="font-size:13px;color:var(--text-2);margin-bottom:12px;">' + checkedCount + ' selected of ' + items.length + ' items</div>';
  h += '<div class="fc">';
  items.forEach(function(item) {
    var checked = S.findsChecked[item.id];
    h += '<div class="card hov' + (checked ? " sel" : "") + '">';
    h += '<div class="fr mb8">';
    h += '<input type="checkbox"' + (checked ? " checked" : "") + ' onchange="toggleFindsCheck(' + item.id + ',this.checked)" style="width:18px;height:18px;accent-color:var(--amber);">';
    h += '<strong style="font-size:14px;">' + esc(item.title || item.summary) + '</strong>';
    h += '</div>';
    // AU relevance badge
    var auRel = item.au_relevance != null ? item.au_relevance : null;
    if (auRel != null) {
      if (auRel >= 7) {
        h += '<span class="chip chip-au" style="font-size:10px;">AU</span> ';
      } else if (auRel < 4) {
        h += '<span class="chip chip-low-au" style="font-size:10px;">low AU</span> ';
      }
    }
    h += '<div style="font-size:12px;color:var(--text-3);margin-bottom:4px;">' + esc(item.source || "") + ' &middot; Score: ' + esc(item.weighted_composite != null ? item.weighted_composite.toFixed(1) : "—") + '</div>';
    if (item.summary) h += '<div style="font-size:13px;color:var(--text-2);margin-bottom:8px;line-height:1.5;">' + esc(item.summary) + '</div>';
    if (checked) {
      h += '<div class="form-group mt8"><label>Blurb</label><textarea class="form-input" id="finds-blurb-' + item.id + '" rows="2" placeholder="Write a short blurb..." onchange="updateFindsBlurb(' + item.id + ',this.value)">' + esc(S.findsBlurbs[item.id] || "") + '</textarea></div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

var OTC_CATS = [
  { key: "otc_eating", label: "Eating" },

  { key: "otc_reading", label: "Reading" },

function renderOTCBody() {
  var h = '';
  if (!S.otcData || !S.otcData.candidates) {
    h += '<div class="card"><p class="loading">No data yet. Click SCRAPE to pull lifestyle sources.</p></div>';

  }

  // Existing picks

    });

  }

  // Categories with candidates
  h += '<div class="otc-cats">';

    h += '<span style="font-size:11px;color:var(--text-3);">' + candidates.length + ' items</span></div>';
    if (!candidates.length) {
      h += '<p style="font-size:12px;color:var(--text-3);">No candidates</p>';
    } else {
      // Multi-pick pills — any number of items per category can be selected
      var catPicks = S.otcPicks[cat.key] || {};
      h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">';
      candidates.forEach(function(c) {
        var active = !!catPicks[c.id];
        var pillStyle = active
          ? 'background:rgba(255,180,0,0.12);border:1.5px solid var(--amber);color:var(--text-1);font-weight:600;'
          : 'background:var(--bg-2);border:1.5px solid var(--divider);color:var(--text-2);';
        var label = (c.title || c.summary || "").slice(0, 44) + ((c.title || c.summary || "").length > 44 ? "…" : "");
        h += '<button onclick="pickOTC(\'' + cat.key + '\',' + c.id + ')" ';
        h += 'title="' + esc(c.title || c.summary || "") + '" ';
        h += 'style="' + pillStyle + 'padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">';
        h += esc(label);
        if (c.city) h += ' <span style="font-size:10px;opacity:0.65;">(' + esc(c.city) + ')</span>';
        h += '</button>';
      });
      h += '</div>';
      // Per-item blurb textareas — one for each selected pill
      candidates.forEach(function(c) {
        if (!catPicks[c.id]) return;
        var blurbKey = cat.key + "__" + c.id;
        var shortTitle = (c.title || c.summary || "").slice(0, 50);
        h += '<div style="margin-bottom:8px;">';
        h += '<div style="font-size:11px;color:var(--text-3);margin-bottom:3px;">Note for "' + esc(shortTitle) + '"</div>';
        h += '<textarea class="form-input" rows="2" placeholder="Optional blurb..." style="font-size:12px;" oninput="updateOTCBlurb(\'' + blurbKey + '\',this.value)">' + esc(S.otcBlurbs[blurbKey] || "") + '</textarea>';
        h += '</div>';
      });
    }
    h += '</div>';
  });
  h += '</div>';
  // Prompt preview panel
  var totalPicks = OTC_CATS.reduce(function(n, cat) {
    return n + Object.keys(S.otcPicks[cat.key] || {}).length;

  h += '<div style="margin-top:16px;">';
  h += '<button onclick="toggleOtcPrompt()" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-2);padding:0;">';
  h += (S.otcPromptExpanded ? '▲' : '▼') + ' Prompt preview';
  if (totalPicks === 0) h += ' <span style="color:var(--text-3);">(select items above)</span>';
  h += '</button>';
  if (S.otcPromptExpanded) {
    h += '<textarea id="otc-prompt-preview" class="form-input" rows="10" oninput="S.otcPrompt=this.value" ';
    h += 'placeholder="Select at least one item above to preview the prompt." ';
    h += 'style="margin-top:8px;font-size:12px;font-family:monospace;">';
    h += esc(S.otcPrompt);
    h += '</textarea>';
    h += '<div style="margin-top:8px;font-size:11px;color:var(--text-2);">Instruction (persists when picks change)</div>';
    h += '<textarea class="form-input" rows="4" oninput="updateOTCInstruction(this.value)" ';
    h += 'style="margin-top:4px;font-size:12px;font-family:monospace;">';

var OTC_DEFAULT_INSTRUCTION = (
  "For each, rewrite the blurb in 1 sentence. Voice: dry, specific, but not rude or arrogant or condescending. " +
  "Not a review. A statement from someone who already knows but done in a way that's fun and engaging and acts " +
  "like a hook to get people reading. Australian English.\n\n" +
  "After the sentence, append [LINK](url) using the URL provided for that item.\n\n" +
  "Output as: CATEGORY: BLURB [LINK](url) (one per line)"
);

function buildOTCPrompt() {
  var lines = [];
  OTC_CATS.forEach(function(cat) {
    var catPicks = S.otcPicks[cat.key] || {};
    Object.keys(catPicks).forEach(function(id) {
      var candidates = (S.otcData && S.otcData.candidates && S.otcData.candidates[cat.key]) || [];
      var item = candidates.find(function(c) { return c.id === Number(id); });
      if (!item) return;
      var blurb = S.otcBlurbs[cat.key + "__" + id] || "";
      var url = item.url || "";
      lines.push(
        "Category: " + cat.key +
        "\nTitle: " + (item.title || item.summary || "") +
        (url ? "\nURL: " + url : "") +
        "\nDraft blurb: " + blurb
      );
    });
  });
  if (!lines.length) return "";
  var instruction = S.otcInstruction !== null ? S.otcInstruction : OTC_DEFAULT_INSTRUCTION;
  return "Polish these Off the Clock blurbs for Flat White.\n\n" + lines.join("\n\n") + "\n\n" + instruction;
}

function pickOTC(cat, id) {
  if (!S.otcPicks[cat]) S.otcPicks[cat] = {};
  if (S.otcPicks[cat][id]) {
    delete S.otcPicks[cat][id];
    delete S.otcBlurbs[cat + "__" + id];
  } else {
    S.otcPicks[cat][id] = true;
    // Pre-populate blurb with article summary if not already set
    if (!S.otcBlurbs[cat + "__" + id]) {
      var candidates = (S.otcData && S.otcData.candidates && S.otcData.candidates[cat]) || [];
      var item = candidates.find(function(c) { return c.id === Number(id); });
      if (item && item.summary) S.otcBlurbs[cat + "__" + id] = item.summary;
    }
  }
  S.otcPrompt = buildOTCPrompt();
  render();
}

function updateOTCBlurb(key, value) {
  S.otcBlurbs[key] = value;
  S.otcPrompt = buildOTCPrompt();
  var el = document.getElementById("otc-prompt-preview");
  if (el) el.value = S.otcPrompt;
}

function updateOTCInstruction(value) {
  S.otcInstruction = value;
  S.otcPrompt = buildOTCPrompt();
  var el = document.getElementById("otc-prompt-preview");
  if (el) el.value = S.otcPrompt;
}

function toggleOtcPrompt() {
  S.otcPromptExpanded = !S.otcPromptExpanded;
  render();
}

function proceedOTC() {
  var model = getModel("model-otc");
  var picks = [];
  OTC_CATS.forEach(function(cat) {
    var catPicks = S.otcPicks[cat.key] || {};
    Object.keys(catPicks).forEach(function(id) {
      var idNum = Number(id);
      var candidates = (S.otcData && S.otcData.candidates && S.otcData.candidates[cat.key]) || [];
      var item = candidates.find(function(c) { return c.id === idNum; });
      picks.push({
        category: cat.key,
        curated_item_id: idNum,
        title: item ? (item.title || item.summary || "") : "",
        blurb: S.otcBlurbs[cat.key + "__" + id] || "",
        url: item ? (item.url || "") : "",
      });
    });
  });
  if (!picks.length) {
    alert("Select at least one item before proceeding.");
    return;
  }
  S.proceedData.off_the_clock = {
    section: "off_the_clock",
    model: model,
    data: { picks: picks },
    custom_prompt: S.otcPrompt || null,
  };
  openProceedModal("off_the_clock");
}

  });

  h += '</div>';
  el.innerHTML = h;
}

function copyAssembly() {
  var ta = $("assembly-preview");
  if (ta) {
    navigator.clipboard.writeText(ta.value).then(function() {
      showToast("Copied to clipboard");
    }).catch(function() {
      ta.select(); document.execCommand("copy");
      showToast("Copied to clipboard");
    });
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   SHARED: Output box + Save + Run
   ═══════════════════════════════════════════════════════════════════════ */
function openPhase(section, num) {
  S.sectionPhase[section] = num;
  render();
}

function phasePanel(section, num, label, unlocked, done, bodyHtml) {
  var open = unlocked && (S.sectionPhase[section] || 1) === num;
  var classes = 'phase-card' + (open ? ' phase-open' : '') + (unlocked ? '' : ' phase-locked');
  var h = '<div class="' + classes + '">';
  h += '<div class="phase-hdr"' + (unlocked ? ' onclick="openPhase(\'' + section + '\',' + num + ')"' : '') + '>';
  h += '<span class="phase-num">' + num + '</span>';
  h += '<span class="phase-lbl">' + label + '</span>';
  if (done) h += '<span class="phase-done">✓</span>';
  if (unlocked) h += '<span class="phase-chevron">' + (open ? '▲' : '▼') + '</span>';
  h += '</div>';
  if (open) h += '<div class="phase-body">' + bodyHtml + '</div>';
  h += '</div>';
  return h;
}

function outputBox(section) {
  var h = '<div class="output-box">';
  h += '<div class="fb mb8"><span style="font-weight:600;font-size:13px;">Output</span>';
  h += '<div style="display:flex;gap:6px;">';
  h += '<button class="btn btn-sm" onclick="copyOutput(\'' + section + '\')" id="copy-btn-' + section + '">Copy</button>';
  h += '<button class="btn btn-sm btn-success" onclick="saveOutput(\'' + section + '\')">Save</button>';
  h += '</div></div>';
  h += '<textarea id="output-' + section + '" placeholder="Generated output will appear here..."></textarea>';
  h += '</div>';
  return h;
}

function copyOutput(section) {
  var ta = $("output-" + section);
  if (!ta || !ta.value) return;
  navigator.clipboard.writeText(ta.value).then(function() {
    var btn = $("copy-btn-" + section);
    if (btn) { btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy"; }, 1500); }
  }).catch(function() {
    ta.select();
    document.execCommand("copy");
    var btn = $("copy-btn-" + section);
    if (btn) { btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy"; }, 1500); }
  });
}

function copyComposerAll() {
  var COMPOSER_ORDER = [
    { id: "pulse",            label: "PULSE" },
    { id: "big_conversation", label: "BIG CONVERSATION" },
    { id: "finds",            label: "FINDS" },
    { id: "lobby",            label: "THE LOBBY" },
    { id: "thread",           label: "THREAD" },
    { id: "off_the_clock",    label: "OFF THE CLOCK" },
    { id: "amp_finest",       label: "AMP'S FINEST" },
  ];
  var parts = [];
  COMPOSER_ORDER.forEach(function(s) {
    var ta = document.getElementById("composer-ta-" + s.id);
    var text = ta ? ta.value : (S.sectionOutputs[s.id] ? S.sectionOutputs[s.id].output_text : null);
    if (text && text.trim()) {
      parts.push("## " + s.label + "\n\n" + text.trim());
    }
  });
  if (!parts.length) { showToast("No outputs to copy yet", "error"); return; }
  navigator.clipboard.writeText(parts.join("\n\n---\n\n")).then(function() {
    showToast("All sections copied to clipboard");
  }).catch(function() {
    var ta = document.createElement("textarea");
    ta.value = parts.join("\n\n---\n\n");
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    showToast("All sections copied to clipboard");
  });
}

function copyComposerSection(sectionId, taId) {
  var ta = document.getElementById(taId);
  if (!ta || !ta.value) return;
  navigator.clipboard.writeText(ta.value).then(function() {
    var btn = document.getElementById("copy-btn-composer-" + sectionId);
    if (btn) { btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy"; }, 1500); }
  }).catch(function() {
    ta.select(); document.execCommand("copy");
    var btn = document.getElementById("copy-btn-composer-" + sectionId);
    if (btn) { btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy"; }, 1500); }
  });
}

function fillOutput(section) {
  var ta = $("output-" + section);
  if (ta && S.sectionOutputs[section] && S.sectionOutputs[section].output_text) {
    ta.value = S.sectionOutputs[section].output_text;
  }
}

function saveOutput(section) {
  var ta = $("output-" + section);
  if (!ta) return;
  api("/api/section-output/" + section, { method: "POST", body: { output_text: ta.value } })
    .then(function() {
      S.sectionOutputs[section] = S.sectionOutputs[section] || {};
      S.sectionOutputs[section].output_text = ta.value;
      showToast("Saved " + section.replace(/_/g, " "));
      renderSidebar();
    })
    .catch(function(e) { showToast("Error: " + e.message, "error"); });
}

function runBackfill() {
  // Compute previous week ISO string
  var now = new Date();
  var prevWeek = new Date(now.getTime() - 7 * 24 * 3600 * 1000);
  var d = new Date(Date.UTC(prevWeek.getFullYear(), prevWeek.getMonth(), prevWeek.getDate()));
  var dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  var targetWeek = d.getUTCFullYear() + "-W" + String(weekNo).padStart(2, "0");

  showToast("Backfilling " + targetWeek + " — signal backfill runs in background (~6 min for Google Trends)");
  api("/api/backfill", { method: "POST", body: { target_week: targetWeek } })
    .then(function(d) {
      showToast("Backfill started: " + d.seeded_employers + " employer snapshots seeded. Signal data populating in background.");
      S.trends = null;
      loadPageData("pulse").then(function() { render(); });
    })
    .catch(function(e) { showToast("Backfill failed: " + e.message, "error"); });
}

function runScrapeAll() {
  if (S.scrapeAllRunning) return;
  S.scrapeAllRunning = true;
  S.scrapeAllErrors = {};
  render();
  api("/api/scrape-all", { method: "POST" })
    .then(function() { pollScrapeAll(); })
    .catch(function(e) {
      S.scrapeAllRunning = false;
      render();
      showToast("Scrape All failed to start: " + e.message, "error");
    });
}

function pollScrapeAll() {
  var failCount = 0;
  var poll = setInterval(function() {
    fetch("/api/scrape-all/status").then(function(r) { return r.json(); }).then(function(d) {
      failCount = 0; // reset on success
      render(); // shows current section in pill
      if (!d.running) {
        clearInterval(poll);
        S.scrapeAllRunning = false;
        // Store errors from results
        (d.results || []).forEach(function(r) {
          if (r.status === "error") S.scrapeAllErrors[r.section] = r.error;
        });
        var failed = (d.results || []).filter(function(r) { return r.status === "error"; });
        var ok = (d.results || []).filter(function(r) { return r.status === "ok"; });
        var msg = "Scrape All done — " + ok.length + "/" + d.total + " succeeded";
        if (failed.length) msg += " · " + failed.map(function(r) { return r.section; }).join(", ") + " failed";
        showToast(msg, failed.length ? "error" : "");
        // Reload current page data
        loadPageData(S.page).then(function() { render(); });
      }
    }).catch(function() {
      failCount++;
      if (failCount >= 3) {
        clearInterval(poll);
        S.scrapeAllRunning = false;
        render();
        showToast("Scrape All: lost connection to server", "error");
      }
    });
  }, 2000);
}

function runSection(section) {
  S.loading[section] = true; render();
  // Fire and forget — returns immediately, runs in background on server
  api("/api/run-section", { method: "POST", body: { section: section } })
    .then(function(d) {
      if (!d.started) { S.loading[section] = false; render(); showToast(d.message || "Already running", "error"); return; }
      showToast(section.replace(/_/g, " ") + " scraping...");
      // Poll for completion
      pollSectionStatus(section);
    })
    .catch(function(e) { S.loading[section] = false; render(); showToast("Error: " + e.message, "error"); });
}

function pollSectionStatus(section) {
  var poll = setInterval(function() {
    fetch("/api/section-status/" + section).then(function(r) { return r.json(); }).then(function(d) {
      // Always store latest progress for render
      S.sectionProgress[section] = {
        step: d.step || 0,
        total: d.total || 0,
        step_name: d.step_name || ""
      };
      if (!d.running && d.done) {
        clearInterval(poll);
        S.loading[section] = false;
        delete S.sectionProgress[section];
        // Auto-advance to Phase 2 when scrape completes successfully
        if (!d.error && (S.sectionPhase[section] === 1 || !S.sectionPhase[section])) {
          S.sectionPhase[section] = 2;
        }
        if (d.error) {
          showToast(section.replace(/_/g, " ") + " failed: " + d.error, "error");
        } else {
          showToast(section.replace(/_/g, " ") + " complete");
        }
        switch (section) {
          case "pulse": S.pulse = null; S.trends = null; break;
          case "finds": case "editorial": case "classify": S.items = null; S.bigConvCandidates = null; break;
          case "lobby": S.lobby = null; break;
          case "thread": S.threads = null; break;
          case "off_the_clock": case "classify_otc": S.otcData = null; break;
          case "big_conversation": S.bigConvCandidates = null; break;
        }
        var pageForSection = {pulse:"pulse", finds:"finds", editorial:"editorial", classify:"finds", lobby:"lobby", thread:"thread", off_the_clock:"off_the_clock", classify_otc:"off_the_clock", big_conversation:"big_conversation"};
        var relevantPage = pageForSection[section] || section;
        if (S.page === relevantPage) {
          loadPageData(S.page).then(function() { render(); });
        } else {
          render();
        }
      } else {
        render();
      }
    }).catch(function() { /* ignore poll errors */ });
  }, 2000);
}

function renderSectionProgress(section) {
  var p = S.sectionProgress[section];
  if (!p || !S.loading[section]) return '<span class="ingest-spinner"></span>';
  var total = p.total || 1;
  var step = Math.min(p.step, total);
  var pct = Math.round((step / total) * 100);
  var label = esc(p.step_name || "Running...");
  return (
    '<span style="display:inline-flex;align-items:center;gap:8px;margin-left:8px;">' +
    '<span style="display:inline-block;width:120px;height:6px;background:var(--divider);border-radius:3px;overflow:hidden;">' +
    '<span style="display:block;height:100%;width:' + pct + '%;background:var(--amber);border-radius:3px;transition:width 0.4s ease;"></span>' +
    '</span>' +
    '<span style="font-size:12px;color:var(--text-2);">' + step + '/' + total + ' &middot; ' + label + '</span>' +
    '</span>'
  );
}

/* ═══════════════════════════════════════════════════════════════════════
   PROCEED MODAL
   ═══════════════════════════════════════════════════════════════════════ */
function openProceedModal(section, items) {
  S.proceedModal = {
    open: true, section: section, prompt: "", lean: "",
    items: items || [], loading: true,
    contextBreakdown: null, excludedItems: {}, _tab: "prompt"
  };
  render();
  api("/api/preview-prompt", { method: "POST", body: { section: section, data: (S.proceedData[section] || {}).data || {} } })
    .then(function(d) {
      S.proceedModal.prompt = d.prompt || "";
      S.proceedModal.contextBreakdown = d.context_breakdown || null;
      S.proceedModal.loading = false;
      render();
    })
    .catch(function() {
      S.proceedModal.prompt = "(Could not load prompt preview)";
      S.proceedModal.loading = false;
      render();
    });
}

function closeProceedModal() {
  S.proceedModal = { open: false, section: null, prompt: "", lean: "", items: [], loading: false, contextBreakdown: null, excludedItems: {}, _tab: "prompt" };
  render();
}

function confirmAndGenerate() {
  var modal = S.proceedModal;
  var section = modal.section;
  var lean = modal.lean.trim();
  var customPrompt = lean ? lean + "\n\n" + modal.prompt : modal.prompt;
  var model = S.proceedModel[section] || (S.models && S.models.length ? S.models[0].id : null);
  S.proceedModal.open = false;
  S.loading[section] = true;
  render();
  var body = Object.assign({}, S.proceedData[section] || {}, {
    section: section,
    custom_prompt: customPrompt,
    model: model,
    excluded: Object.keys(modal.excludedItems).filter(function(k) { return modal.excludedItems[k]; }),
  });
  api("/api/proceed-section", { method: "POST", body: body })
    .then(function(d) {
      S.sectionOutputs[section] = { output_text: d.output, model_used: d.model };
      S.loading[section] = false;
      S.sectionPhase[section] = 3;
      render();
      showToast(section.replace(/_/g, " ") + " generated" + (d.model ? " · " + d.model : ""));
    })
    .catch(function(e) { S.loading[section] = false; render(); showToast("Error: " + e.message, "error"); });
}

function renderProceedModal() {
  if (!S.proceedModal.open) return "";
  var modal = S.proceedModal;
  var section = modal.section;
  var availableModels = S.models || [];

  var h = '<div class="modal-overlay" onclick="if(event.target===this)closeProceedModal()">';
  h += '<div class="modal-box" style="max-width:900px;width:95vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;">';
  h += '<h3 style="margin-bottom:12px;">Generate ' + esc(section.replace(/_/g, " ")) + '</h3>';

  // Three-panel tabs
  h += '<div style="display:flex;gap:0;border-bottom:1px solid var(--divider);margin-bottom:16px;">';
  ['context','prompt','model'].forEach(function(tab) {
    var active = (S.proceedModal._tab || 'prompt') === tab;
    h += '<div onclick="S.proceedModal._tab=\'' + tab + '\';render()" style="padding:8px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid ' + (active ? 'var(--amber)' : 'transparent') + ';color:' + (active ? 'var(--text-1)' : 'var(--text-3)') + ';">';
    h += tab === 'context' ? 'Context' : tab === 'prompt' ? 'Prompt' : 'Model';
    h += '</div>';
  });
  h += '</div>';

  var activeTab = S.proceedModal._tab || 'prompt';

  // ── Context panel ──
  if (activeTab === 'context') {
    if (modal.loading) {
      h += '<div class="loading" style="padding:20px;">Loading context...</div>';
    } else if (modal.contextBreakdown) {
      var cb = modal.contextBreakdown;
      h += '<div style="overflow-y:auto;max-height:50vh;font-size:13px;">';

      // Signals
      if (cb.signals && cb.signals.length) {
        h += '<div style="font-weight:600;margin-bottom:8px;">Signals</div>';
        h += '<table class="tbl" style="margin-bottom:16px;"><thead><tr><th></th><th>Signal</th><th>Score</th><th>WoW</th><th>Area</th></tr></thead><tbody>';
        cb.signals.forEach(function(sig) {
          var key = "sig_" + sig.name;
          var checked = !modal.excludedItems[key];
          var d = sig.delta;
          var dc = d == null ? "" : (d > 0 ? "color:var(--red)" : d < 0 ? "color:var(--green)" : "");
          h += '<tr>';
          h += '<td><input type="checkbox"' + (checked ? " checked" : "") + ' onchange="S.proceedModal.excludedItems[' + "'" + key + "'" + ']=!this.checked;render()"></td>';
          h += '<td>' + esc(sig.name) + '</td>';
          h += '<td>' + (sig.score != null ? sig.score.toFixed(1) : "—") + '</td>';
          h += '<td style="' + dc + '">' + (d != null ? (d > 0 ? "+" : "") + d.toFixed(1) : "—") + '</td>';
          h += '<td><span class="chip chip-default">' + esc(sig.area) + '</span></td>';
          h += '</tr>';
        });
        h += '</tbody></table>';
      }

      // Signal intelligence
      if (cb.signal_intelligence && cb.signal_intelligence.length) {
        h += '<div style="font-weight:600;margin-bottom:8px;">Signal Intelligence</div>';
        cb.signal_intelligence.forEach(function(si) {
          var key = "intel_" + si.signal_name;
          var checked = !modal.excludedItems[key];
          h += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;">';
          h += '<input type="checkbox"' + (checked ? " checked" : "") + ' onchange="S.proceedModal.excludedItems[' + "'" + key + "'" + ']=!this.checked;render()" style="margin-top:3px;">';
          h += '<div>';
          h += '<div style="font-weight:600;font-size:12px;">' + esc(si.signal_name) + (si.delta != null ? ' (' + (si.delta > 0 ? "+" : "") + si.delta.toFixed(1) + ' pts)' : '') + '</div>';
          h += '<div style="color:var(--text-2);">' + esc(si.commentary) + '</div>';
          if (si.articles && si.articles.length) {
            si.articles.slice(0, 2).forEach(function(a) {
              h += '<div style="font-size:11px;color:var(--text-3);">' + esc(a.title) + '</div>';
            });
          }
          h += '</div></div>';
        });
      }

      // Items (finds/lobby/OTC)
      if (cb.items && cb.items.length) {
        h += '<div style="font-weight:600;margin-bottom:8px;">Items</div>';
        cb.items.forEach(function(item, idx) {
          var key = "item_" + idx;
          var checked = !modal.excludedItems[key];
          h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">';
          h += '<input type="checkbox"' + (checked ? " checked" : "") + ' onchange="S.proceedModal.excludedItems[' + "'" + key + "'" + ']=!this.checked;render()">';
          h += '<span style="font-size:13px;">' + esc(item.name || item.category || "") + '</span>';
          if (item.score != null) h += ' <span style="font-size:11px;color:var(--text-3);">(' + item.score.toFixed(1) + ')</span>';
          h += '</div>';
        });
      }

      h += '</div>';
    } else {
      h += '<div style="color:var(--text-3);padding:20px 0;">No context breakdown available for this section.</div>';
    }
  }

  // ── Prompt panel ──
  if (activeTab === 'prompt') {
    h += '<div style="margin-bottom:8px;font-size:12px;color:var(--text-3);">Editorial lean (prepended to prompt)</div>';
    h += '<input class="form-input" style="margin-bottom:12px;" placeholder="e.g. Focus on Big 4 this week..." value="' + esc(modal.lean) + '" oninput="S.proceedModal.lean=this.value">';
    if (modal.loading) {
      h += '<div class="loading" style="padding:20px 0;">Loading prompt...</div>';
    } else {
      h += '<textarea class="form-input" rows="16" style="font-family:monospace;font-size:12px;" oninput="S.proceedModal.prompt=this.value">' + esc(modal.prompt) + '</textarea>';
    }
  }

  // ── Model panel ──
  if (activeTab === 'model') {
    var currentModel = S.proceedModel[section] || (availableModels.length ? availableModels[0].id : "");
    h += '<div style="font-size:13px;color:var(--text-2);margin-bottom:16px;">Select the model for this section\'s generation. Only models with a configured API key are shown.</div>';

    var byProvider = {};
    var providerOrder = [];
    availableModels.forEach(function(m) {
      if (!byProvider[m.provider]) { byProvider[m.provider] = []; providerOrder.push(m.provider); }
      byProvider[m.provider].push(m);
    });

    var providerLabels = { anthropic: "Anthropic", openai: "OpenAI", gemini: "Google" };
    providerOrder.forEach(function(prov) {
      h += '<div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;margin-top:12px;">' + (providerLabels[prov] || prov) + '</div>';
      byProvider[prov].forEach(function(m) {
        var active = m.id === currentModel;
        h += '<div onclick="S.proceedModel[\'' + section + '\']=\'' + m.id + '\';try{localStorage.setItem(\'fw_proceedModel\',JSON.stringify(S.proceedModel));}catch(e){}render()" ';
        h += 'style="padding:10px 14px;border-radius:6px;cursor:pointer;background:' + (active ? 'var(--amber-soft, rgba(255,180,0,0.12))' : 'transparent') + ';border:1px solid ' + (active ? 'var(--amber)' : 'var(--divider)') + ';margin-bottom:6px;display:flex;align-items:center;gap:10px;">';
        h += '<div style="width:10px;height:10px;border-radius:50%;background:' + (active ? 'var(--amber)' : 'var(--divider)') + ';flex-shrink:0;"></div>';
        h += '<div><div style="font-size:13px;font-weight:' + (active ? '600' : '400') + ';">' + esc(m.label) + '</div>';
        h += '<div style="font-size:11px;color:var(--text-3);">' + esc(m.id) + '</div></div>';
        h += '</div>';
      });
    });
  }

  h += '<div class="modal-footer" style="margin-top:16px;">';
  h += '<button class="btn btn-secondary" onclick="closeProceedModal()">Cancel</button>';
  h += '<button class="btn btn-success" onclick="confirmAndGenerate()" ' + (modal.loading ? 'disabled' : '') + '>Confirm & Generate</button>';
  h += '</div></div></div>';
  return h;
}

/* ═══════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════ */
function init() {
  Promise.all([
    api("/api/models").catch(function() { return { models: [] }; }),
    api("/api/section-outputs").catch(function() { return { outputs: {} }; }),
    api("/api/pulse").catch(function() { return { pulse: null, signals: [], anomalies: [], week_iso: "" }; }),
    api("/api/pulse/trends").catch(function() { return null; }),
  ]).then(function(results) {
    S.models = results[0].models || [];
    try { S.proceedModel = JSON.parse(localStorage.getItem("fw_proceedModel") || "{}"); } catch(e) {}
    S.sectionOutputs = results[1].outputs || {};
    S.weekIso = results[1].week_iso || results[2].week_iso || "";
    S.pulse = results[2].pulse;
    S.signals = results[2].signals || [];
    S.anomalies = results[2].anomalies || [];
    S.lastScraped.pulse = results[2].last_scraped_at || null;
    S.trends = results[3] || null;
    render();
  });
}

init();
</script>
