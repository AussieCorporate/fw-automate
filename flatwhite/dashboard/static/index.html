<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flat White — Editor Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface-warm: #FAF8F4;
  --border: #E8E4DE;
  --border-gold: #F0DFA8;
  --divider: #EEEBE5;
  --text: #1A1A1A;
  --text-2: #5A5048;
  --text-3: #7A6D60;
  --amber: #D9920A;
  --amber-light: #FEF3D8;
  --amber-dark: #B87800;
  --green: #2D8A56;
  --green-bg: #E8F5E9;
  --red: #C62828;
  --red-bg: #FFEBEE;
  --blue: #2C6FC7;
  --font-serif: Arial, Helvetica, sans-serif;
  --font-sans: Arial, Helvetica, sans-serif;
}
/* iOS token overrides: intentionally redefines --bg/--green from the legacy :root above so the new iOS values win the cascade (later block wins on equal specificity) */
:root{--bg:#f2f2f7;--card:#fff;--sep:rgba(60,60,67,.11);--label:#1c1c1e;--label2:#8e8e93;--label3:#b7b7c0;
--accent:#6c63ff;--accent-soft:rgba(108,99,255,.09);--green:#34c759;--green-soft:rgba(52,199,89,.13);--green-ink:#248a3d;
--amber-soft:rgba(255,159,10,.15);--amber-ink:#b25e00;--track:#ececf1;--r-card:14px;--r-btn:10px;}
body{background:var(--bg);color:var(--label)}
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: var(--font-sans); cursor: pointer; border: none; }
input, textarea, select { font-family: var(--font-sans); font-size: 14px; }
::selection { background: var(--amber-light); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
/* Task 3: retired the old fixed-width icon <nav id="sidebar">, #main and
   #content rules that used to hold it (body no longer needs display:flex
   for that offset - #cmd-bar-container and .layout now stack as normal
   block children). renderLegacyNav()/NAV_ITEMS/sectionStatus() (JS) were
   removed with it. */

/* ── Section header ── */
.sh { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid var(--border-gold); }
.sh h2 { font-family: var(--font-sans); font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sh .sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; transition: all 0.2s ease; }
.card.hov:hover { border-color: var(--border-gold); box-shadow: 0 2px 16px rgba(180,150,80,0.09); }
.card.sel { border-color: var(--amber); background: var(--amber-light); }

/* ── Chips ── */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
.chip-green { background: var(--green-bg); color: var(--green); border: 1px solid #C8E6C9; }
.chip-red { background: var(--red-bg); color: var(--red); border: 1px solid #FFCDD2; }
.chip-amber { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--border-gold); }
.chip-default { background: var(--surface-warm); color: var(--text-2); border: 1px solid var(--border); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; min-height: 40px; transition: all 0.15s ease; }
.btn-sm { padding: 6px 13px; font-size: 12px; min-height: 32px; }
.btn-primary { background: var(--amber); color: #fff; }
.btn-primary:hover { background: var(--amber-dark); }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #2E7D32; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface-warm); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #B71C1C; }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid transparent; }
.btn-ghost:hover { background: var(--surface-warm); }
.btn:disabled { background: #E0D8CC !important; color: #AAA !important; cursor: not-allowed; }

/* ── Spinner ── */
.ingest-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-3); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Gauge ── */
.gauge-wrap { text-align: center; }
.gauge-num { font-family: var(--font-sans); font-size: 60px; font-weight: 700; letter-spacing: -3px; margin-top: 4px; line-height: 1; }
.gauge-lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
.dir-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.dir-up { background: var(--green-bg); color: var(--green); border: 1px solid #C8E6C9; }
.dir-down { background: var(--red-bg); color: var(--red); border: 1px solid #FFCDD2; }
.dir-stable { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--border-gold); }

/* ── Table ── */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border); font-weight: 600; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--divider); vertical-align: top; }
.tbl tr:hover td { background: var(--surface-warm); }
.tbl tbody tr:hover { background: var(--bg-2); }
.tbl input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--amber); }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--surface); }
.form-input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }
textarea.form-input { min-height: 100px; resize: vertical; font-family: var(--font-sans); }
select.form-input { appearance: auto; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
.toolbar .model-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface-warm); min-width: 180px; }
.toolbar .model-select:focus { outline: none; border-color: var(--amber); }

/* ── Output box ── */
.output-box { margin-top: 20px; }
.output-box textarea { width: 100%; min-height: 200px; padding: 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; line-height: 1.7; font-family: var(--font-sans); resize: vertical; background: var(--surface-warm); }
.output-box textarea:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-light); }

/* ── Radio ── */
.radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #fff; transition: all 0.15s ease; cursor: pointer; }
.radio.on { background: var(--amber); border-color: var(--amber); }

/* ── Layout utils ── */
.g2 { display: grid; grid-template-columns: 280px 1fr; gap: 28px; }
.fc { display: flex; flex-direction: column; gap: 10px; }
.fr { display: flex; align-items: center; gap: 8px; }
.fb { display: flex; justify-content: space-between; align-items: center; }
.fw { display: flex; flex-wrap: wrap; gap: 10px; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt20 { margin-top: 20px; }
.mb8 { margin-bottom: 8px; }
.mb16 { margin-bottom: 16px; }
.mb20 { margin-bottom: 20px; }
.mb24 { margin-bottom: 24px; }
.bt { border-top: 1px solid var(--divider); }

/* ── Toast notifications ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }
.toast {
  background: var(--surface); border: 1px solid var(--border-gold);
  border-radius: 14px; padding: 13px 22px; margin-top: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
  animation: slideUp 0.3s ease; font-size: 14px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Loading ── */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.loading { animation: pulse 1.5s infinite; color: var(--text-3); font-size: 14px; }

/* ── Anomaly ── */
.anomaly { background: var(--red-bg); border: 1px solid #FFCDD2; border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

/* ── Mover cards ── */
.movers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
.mover-card { padding: 16px; }
.mover-card .mc-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.mover-card .mc-sector { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.mover-card .mc-delta { font-size: 22px; font-weight: 700; }
.mover-card .mc-delta.up { color: var(--green); }
.mover-card .mc-delta.down { color: var(--red); }
.mover-card .mc-detail { font-size: 12px; color: var(--text-2); margin-top: 4px; }

/* ── Assemble status ── */
.asm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.asm-item { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
.asm-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.asm-dot.done { background: var(--green); }
.asm-dot.pending { background: var(--border); }
.asm-dot.amber { background: var(--amber); }
.asm-name { font-size: 13px; font-weight: 600; }

/* ── Candidate card list ── */
.cand-list { display: flex; flex-direction: column; gap: 10px; }
.cand-card { display: flex; gap: 14px; align-items: flex-start; cursor: pointer; }
.cand-card .cand-body { flex: 1; }
.cand-card .cand-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.cand-card .cand-meta { font-size: 12px; color: var(--text-3); }
.cand-card .cand-summary { font-size: 13px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }

/* ── OTC categories ── */
.otc-cats { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.otc-cat-card { padding: 20px; }
.otc-cat-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; color: var(--amber-dark); }

@media (max-width: 768px) {
  .g2 { grid-template-columns: 1fr; }
}
.modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:60px; }
.modal-box { background:var(--bg-2);border-radius:12px;padding:28px;width:720px;max-width:95vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3); }
.modal-box h3 { margin:0 0 16px;font-size:18px; }
.modal-section-label { font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-3);margin:16px 0 6px; }
.modal-footer { display:flex;gap:10px;justify-content:flex-end;margin-top:20px; }
.cat-trends { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px; }
@media(max-width:700px){.cat-trends{grid-template-columns:1fr;}}
.cat-card { background:var(--bg-2);border-radius:10px;padding:16px; }
.cat-card-label { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);margin-bottom:8px; }
.cat-card-score { font-size:28px;font-weight:700;color:var(--text-1); }
.cat-card-delta { display:inline-block;font-size:13px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:4px; }
.cat-card-delta.up { background:#d4edda;color:#155724; }
.cat-card-delta.down { background:#f8d7da;color:#721c24; }
.cat-card-delta.stable { background:var(--bg-3);color:var(--text-3); }
.chip-au { background:#d4edda;color:#155724; }
.chip-low-au { background:var(--bg-3);color:var(--text-3); }
/* ── Phase accordion ─────────────────────────────── */
.phase-card { border: 1.5px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.15s; }
.phase-card.phase-open { border-color: var(--accent, #4a9); }
.phase-card.phase-locked { opacity: 0.45; pointer-events: none; }
.phase-hdr { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: var(--bg-2); user-select: none; }
.phase-hdr:hover { background: var(--bg-3, #ebebeb); }
.phase-num { background: var(--accent, #4a9); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.phase-locked .phase-num { background: var(--text-3, #ccc); }
.phase-lbl { font-weight: 600; font-size: 13px; flex: 1; }
.phase-done { color: var(--accent, #4a9); font-size: 12px; margin-right: 4px; }
.phase-chevron { color: var(--text-2); font-size: 11px; }
.phase-body { padding: 14px 16px; }
/* ── Command bar ─────────────────────────────────── */
.cmd-bar { display: flex; align-items: center; gap: 8px; padding: 7px 16px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }
.cmd-pill { padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; background: #333; color: #ccc; }
.cmd-pill:hover { background: #444; }
.cmd-pill.pill-green { background: #1e4a1e; color: #6f6; }
.cmd-pill.pill-amber { background: #4a3a1e; color: #fa4; }
.cmd-pill.pill-red { background: #4a1e1e; color: #f66; }
.layout{max-width:1120px;margin:0 auto;padding:0 20px 90px;display:flex;gap:18px;align-items:flex-start}
.side{width:264px;flex:none;position:sticky;top:14px;background:var(--card);border:1px solid var(--sep);border-radius:var(--r-card);padding:14px 12px}
.main{flex:1;min-width:0}
.page{background:var(--card);border-radius:var(--r-card);border:1px solid var(--sep);overflow:hidden}
.page-h{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:.5px solid var(--sep)}
.page-h h2{margin:0;font-size:18px;font-weight:700;flex:1}
.page-b{padding:18px 20px}
.stat{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;cursor:pointer}
.s-ready{background:var(--green-soft);color:var(--green-ink)}.s-notready{background:var(--track);color:var(--label2)}.s-manual{background:var(--amber-soft);color:var(--amber-ink)}
@media(max-width:820px){.layout{flex-direction:column}.side{width:100%;position:static}}
/* ── Running-order sidebar (Task 2) ── */
.side-cap{color:var(--label3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:2px 6px 9px;display:flex;justify-content:space-between}
.navlist{display:flex;flex-direction:column;gap:3px}
.nav-card{border-radius:10px;display:flex;align-items:center;gap:10px;padding:9px 11px;cursor:pointer}
.nav-card:hover{background:rgba(0,0,0,.035)}
.nav-card.active{background:var(--accent-soft)}
.nav-card.active .n-name{color:var(--accent)}
.nav-card.dragging{opacity:.45}.nav-card.dragover{box-shadow:0 0 0 2px var(--accent)}
.handle{cursor:grab;color:var(--label3);font-size:13px;opacity:0}
.nav-card:hover .handle,.nav-card.active .handle{opacity:1}
.nord{width:18px;color:var(--label3);font-size:11px;font-weight:700;text-align:center}
.ndot{width:8px;height:8px;border-radius:50%}
.n-ready{background:var(--green)}.n-notready{background:var(--label3)}.n-manual{background:#ff9f0a}
.n-name{font-weight:600;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navdiv{height:1px;background:var(--sep);margin:14px 6px}
.nav-lite{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer;color:var(--label2);font-size:14px}
.nav-lite:hover{background:rgba(0,0,0,.035)}.nav-lite.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.bc-bank{display:flex;flex-direction:column;gap:10px}
.bc-topic-card{border:1px solid var(--sep);border-radius:var(--r-card);padding:12px 14px;display:flex;align-items:center;gap:14px}
.bc-topic-name{font-weight:600;flex:1}
.bc-topic-meta{color:var(--label2);font-size:12px}
.bc-topic-actions{display:flex;gap:8px}
.bc-detail-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.bc-detail-title{font-weight:700;font-size:15px}
.bc-headline{font-weight:700;font-size:16px;margin-bottom:14px}
.bc-paragraph{border-top:.5px solid var(--sep);padding:14px 0}
.bc-p-text{font-size:14px;line-height:1.5;margin-bottom:10px}
.bc-shots{display:flex;gap:8px;flex-wrap:wrap;min-height:64px}
.bc-shot{width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:grab;border:1px solid var(--sep)}
.bc-tier-pools{display:flex;flex-direction:column;gap:16px}
.bc-pool{margin-top:16px}
.bc-pool-label{font-size:11px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.bc-tier-toggle{margin-top:12px}
.bc-instruction{background:var(--accent-soft);border-radius:8px;padding:10px;font-size:12px;margin-top:10px;font-family:monospace}
.it-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.it-card{border:1px solid var(--sep);border-radius:10px;overflow:hidden;background:var(--card)}
.it-card.picked{box-shadow:0 0 0 2px var(--accent)}
.it-thumb{width:100%;height:140px;object-fit:cover;display:block;cursor:pointer;background:var(--track)}
.it-body{padding:8px 10px}
.it-fname{font-size:11px;color:var(--label2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.it-note{width:100%;font-size:12px;border:1px solid var(--sep);border-radius:6px;padding:6px;resize:vertical;font-family:inherit;box-sizing:border-box}
.it-empty{color:var(--label2);font-size:13px;padding:8px 0}
/* Brains Trust angle picker - .chip/.chip-green/.chip-amber already exist above */
.pick-row{display:flex;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:6px}
.pick-row:hover{background:rgba(0,0,0,.03)}
.pick-row.picked{border-color:var(--accent,#6c63ff);background:rgba(108,99,255,.06)}
.pick-date{width:84px;flex:none;color:var(--text-2);font-size:12px;padding-top:2px}
.pick-pitch{font-weight:600;font-size:14px}
.pick-angle{color:var(--text-2);font-size:13px;margin-top:2px}
/* Assemble to beehiiv (Increment 7 Task 6) */
.bench-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;display:inline-block;margin-left:8px}
.bench-within{background:var(--green-soft);color:var(--green-ink)}
.bench-short,.bench-long{background:var(--amber-soft);color:var(--amber-ink)}
.bench-no_data{background:var(--track);color:var(--label2)}
.block-preview{border:1px solid var(--sep);border-radius:10px;padding:10px 14px;margin-bottom:10px}
.block-preview h4{margin:0 0 6px;font-size:13px;color:var(--label2);text-transform:uppercase;letter-spacing:.03em}
.assemble-missing{color:var(--label2);font-size:13px;margin:8px 0}
</style>
</head>
<body>
<!-- Task 3: old <nav id="sidebar">/#main/#content path is retired. render()
     now draws into #page below; the running-order sidebar (Task 2) plus
     #cmd-bar-container are the only top-level UI. -->
<div id="cmd-bar-container"></div>
<div class="layout">
  <div class="side">
    <div class="side-cap"><span>Running order</span><span id="readyStat"></span></div>
    <div class="navlist" id="navlist"></div>
    <div class="navdiv"></div>
    <div class="nav-lite" id="nl-bank" onclick="selectSegment('bank')">Content bank</div>
    <div class="nav-lite" id="nl-sources" onclick="selectSegment('sources')">Sources</div>
    <div class="navdiv"></div>

/* ── Helpers ───────────────────────────────────────────── */
function api(path, opts) {
  opts = opts || {};
  var config = { headers: { "Content-Type": "application/json" } };
  if (opts.method) config.method = opts.method;
  if (opts.body) config.body = JSON.stringify(opts.body);
  return fetch(path, config).then(function(r) {
    if (!r.ok) return r.json().then(function(d) { var e = new Error(d.error || ("HTTP " + r.status)); e.data = d; throw e; });
    return r.json();
  });
}

function getCurrentWeekIso() {
  var d = new Date();
  var dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getUTCFullYear() + "-W" + String(weekNo).padStart(2, "0");
}

function sparkline(values, width, height) {
  var clean = values.filter(function(v) { return v != null; });
  if (clean.length < 2) return '<svg width="' + width + '" height="' + height + '"></svg>';
  var min = Math.min.apply(null, clean);
  var max = Math.max.apply(null, clean);
  var range = max - min || 1;
  var w = width / (clean.length - 1);
  var points = clean.map(function(v, i) {
    var x = Math.round(i * w);
    var y = Math.round(height - ((v - min) / range * (height - 4)) - 2);
    return x + "," + y;
  }).join(" ");
  return '<svg width="' + width + '" height="' + height + '" style="vertical-align:middle">'
    + '<polyline points="' + points + '" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

function barSparkline(values, width, height) {
  var clean = values.filter(function(v) { return v != null; });
  if (!clean.length) return '<svg width="' + width + '" height="' + height + '"></svg>';
  var max = Math.max.apply(null, clean) || 1;
  var barW = Math.max(2, Math.floor(width / clean.length) - 1);
  var bars = clean.map(function(v, i) {
    var h2 = Math.max(2, Math.round((v / max) * height));
    var x = i * (barW + 1);
    var y = height - h2;
    return '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + h2 + '" fill="var(--accent)" opacity="0.7" rx="1"/>';
  }).join("");
  return '<svg width="' + width + '" height="' + height + '" style="vertical-align:middle">' + bars + '</svg>';
}

function esc(s) {
  if (s == null) return "";
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

function jsq(s) {
  // A JS single-quoted string literal, safe to embed inside a
  // double-quoted HTML attribute (e.g. onclick="fn(' + jsq(x) + ')").
  // Topic names can contain colons/spaces (e.g. "Teams:Slack Monitoring")
  // so plain concatenation is not safe here.
  return "'" + String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'") + "'";
}

// esc() round-trips through a text node, so it escapes & < > but leaves a
// literal double-quote untouched. That's fine inside HTML text content, but
// it corrupts any value="...", href="...", title="..." etc attribute built
// via string concatenation (the embedded quote closes the attribute early
// and the rest of the string becomes bogus extra attributes on the tag).
// Use escAttr() instead of esc() for any double-quoted HTML-attribute context.
function escAttr(s) {
  return esc(s).replace(/"/g, "&quot;");
}

function formatScrapedDate(isoStr) {
  if (!isoStr) return null;
  var d = new Date(isoStr.replace(" ", "T") + "Z");
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getDate() + " " + months[d.getMonth()];
}

function formatThreadBlock(d) {
  var title = (d.title || "").trim();
  var url = (d.url || "").trim();
  var preview = (d.preview || "").trim();
  var topComment = (d.topComment || "").trim();
  var lines = [];
  lines.push("#### [_**" + title + "**_](" + url + ")");
  lines.push("");
  if (preview) lines.push(preview);
  if (topComment) {
    lines.push("");
    lines.push("> _" + topComment + "_");
  }
  return lines.join("\n");
}

function renderThread(el) {
  var d = S.threadDraft;

  var p1 = '';
  p1 += '<div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text-2);">Thread title</label>';
  p1 += '<input class="form-input" value="' + escAttr(d.title) + '" oninput="S.threadDraft.title=this.value"></div>';
  p1 += '<div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text-2);">Reddit URL</label>';
  p1 += '<input class="form-input" value="' + escAttr(d.url) + '" oninput="S.threadDraft.url=this.value"></div>';

  p1 += '<div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text-2);">Top comment</label>';

  p1 += '<button class="btn btn-success" onclick="formatThread()">Format</button>';

function formatThread() {

/* ── Drag-to-reorder (HTML5 drag and drop) ── */
function dragStart(e) {
  _dragFromIndex = Number(e.currentTarget.getAttribute("data-idx"));
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  try { e.dataTransfer.setData("text/plain", String(_dragFromIndex)); } catch (err) {}
}

function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add("dragover");
  e.dataTransfer.dropEffect = "move";
}

function drop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove("dragover");
  var toIdx = Number(e.currentTarget.getAttribute("data-idx"));
  if (_dragFromIndex == null || toIdx === _dragFromIndex) return;
  var moved = SEGMENTS.splice(_dragFromIndex, 1)[0];
  // Removing the dragged item shifts every later index down by one, so
  // when the drop target was originally AFTER the source, the insertion
  // index must be decremented to land the moved item at (not past) the
  // target's new position. Upward drags (target originally before the
  // source) are unaffected: indices before the removal point don't shift.
  var insertIdx = toIdx > _dragFromIndex ? toIdx - 1 : toIdx;
  SEGMENTS.splice(insertIdx, 0, moved);
  _dragFromIndex = null;
  renderSidebar();
}

function dragEnd(e) {
  e.currentTarget.classList.remove("dragging");
  document.querySelectorAll(".nav-card.dragover").forEach(function(n) { n.classList.remove("dragover"); });
}

   _REAL_SEGMENTS since there is no scrape to derive readiness from) shows
   its static SEGMENTS status,
   flipped to "ready" by markReady()/toggleReady(); Content bank / Sources
   (not in SEGMENTS, no ready concept) get a plain header with no pill. */
function _statusLabel(status) {
  if (status === "ready") return "Ready";
  if (status === "manual") return "Manual";
  return "Not ready";
}

function _pageHeaderHtml(id) {
  var seg = SEGMENTS.filter(function(s) { return s.id === id; })[0];
  if (!seg) {
    var title = _SEGMENT_TITLES[id] || id;
    return '<h2>' + esc(title) + '</h2>';
  }
  var status = _segmentStatus(seg);
  var h = '<h2>' + esc(seg.name) + '</h2>'
    + '<span class="stat s-' + status + '" onclick="toggleReady(\'' + esc(id) + '\')">' + esc(_statusLabel(status)) + '</span>';
  // Insert-into-beehiiv: available once the section is ready. First insert of the
  // week duplicates last week's edition; each section replaces its own block.
  var ins = (S.bhInsert && S.bhInsert.section === id) ? S.bhInsert : null;
  if (status === "ready") {
    if (ins && ins.status === "running") {
      h += ' <button class="btn btn-sm btn-secondary" disabled>Inserting into beehiiv...</button>';
    } else {
      h += ' <button class="btn btn-sm btn-primary" onclick="insertSectionBeehiiv(\'' + esc(id) + '\')">Insert into beehiiv</button>';
    }
    if (ins && ins.status === "failed") {
      h += ' <span style="font-size:12px;color:var(--danger,#c0392b)">' + esc(ins.error || 'insert failed') + '</span>';
    }
  }
  return h;
}

function _refreshPageHeader() {
  var hEl = $("page-h");
  if (hEl) hEl.innerHTML = _pageHeaderHtml(S.page);
}

// Segments a placeholder page ("This section arrives in a later increment.")
// covers - the running-order items with no real section behind them yet,
// plus the Sources link. The Inside Track, Brains Trust and Content bank
// now all have real pages (renderInsideTrack()/renderBrains()/renderBank()),
// so none of them is in this list any more.
var _PLACEHOLDER_IDS = { sources: 1 };

function toggleReady(id) {
  var seg = SEGMENTS.filter(function(s) { return s.id === id; })[0];
  if (!seg) return;
  seg.status = (_segmentStatus(seg) === "ready") ? "notready" : "ready";
  renderSidebar();
  _refreshPageHeader();
}

function insertSectionBeehiiv(section) {
  S.bhInsert = { section: section, status: "running", error: null };
  _refreshPageHeader();
  showToast("Inserting " + section.replace(/_/g, " ") + " into beehiiv...");
  api("/api/section/" + encodeURIComponent(section) + "/insert-beehiiv", { method: "POST" })
    .then(function(d) { pollSectionInsert(section, d.run_id); })
    .catch(function(e) {
      S.bhInsert = { section: section, status: "failed", error: e.message };
      _refreshPageHeader();
      showToast("Insert failed: " + e.message, "error");
    });
}

function pollSectionInsert(section, runId) {
  api("/api/skill-run/" + encodeURIComponent(runId))
    .then(function(r) {
      if (!S.bhInsert || S.bhInsert.section !== section) return;
      if (r.status === "done") {
        S.bhInsert = null;
        _refreshPageHeader();
        showToast(section.replace(/_/g, " ") + " inserted into next week's beehiiv draft", "success");
      } else if (r.status === "failed") {
        S.bhInsert = { section: section, status: "failed", error: r.error };
        _refreshPageHeader();
        showToast("Insert failed: " + (r.error || "unknown"), "error");
      } else {
        setTimeout(function() { pollSectionInsert(section, runId); }, 3000);
      }
    })
    .catch(function() { setTimeout(function() { pollSectionInsert(section, runId); }, 4000); });
}

function markReady(section) {
  var ta = $("output-" + section);
  if (ta && ta.value && ta.value.trim()) {
    saveOutput(section);
  }
  var seg = SEGMENTS.find(function(s) { return s.id === section; });
  if (seg) seg.status = "ready";
  renderSidebar();
  _refreshPageHeader();
  showToast(section.replace(/_/g, " ") + " marked ready");
}

function allSegmentsReadyExcept(excludeId) {
  return SEGMENTS.every(function(seg) {
    return seg.id === excludeId || _segmentStatus(seg) === "ready";
  });
}

/* ── Main render dispatch (Task 3: draws into #page, not the old #content) ── */
function render() {
  var cmdEl = document.getElementById("cmd-bar-container");
  if (cmdEl) cmdEl.innerHTML = renderCommandBar();
  renderSidebar();
  var pageEl = $("page");
  if (pageEl) {
    pageEl.innerHTML = '<div class="page-h" id="page-h">' + _pageHeaderHtml(S.page) + '</div>'
      + '<div class="page-b" id="page-b"></div>';
    var bodyEl = $("page-b");
    switch (S.page) {
      case "pulse": renderPulse(bodyEl); break;
      case "big_conversation": renderBigConv(bodyEl); break;
      case "off_the_clock": renderOTC(bodyEl); break;
      case "top_picks": renderTopPicks(bodyEl); break;
      case "insidetrack": renderInsideTrack(bodyEl); break;
      case "editorial": renderEditorial(bodyEl); break;
      case "thread": renderThread(bodyEl); break;
      case "brains_trust": renderBrains(bodyEl); break;
      case "assemble": renderAssemble(bodyEl); break;
      case "bank": renderBank(bodyEl); break;
      default:
        if (_PLACEHOLDER_IDS[S.page]) {
          bodyEl.innerHTML = '<p style="color:var(--label2)">This section arrives in a later increment.</p>';
        } else {
          bodyEl.innerHTML = '<p>Unknown page</p>';
        }
    }
  }
  // Render modal overlay (outside main content)
  var modalEl = document.getElementById("modal-root");
  if (modalEl) modalEl.innerHTML = renderProceedModal();
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: EDITORIAL
   ═══════════════════════════════════════════════════════════════════════ */
function renderEditorialBody() {
  var h = '';
  h += '<div class="card mb20"><div style="font-size:13px;color:var(--text-2);margin-bottom:10px;font-weight:600;">Other segments</div>';
  SEGMENTS.filter(function(s) { return s.id !== "editorial"; }).forEach(function(s) {
    var ready = _segmentStatus(s) === "ready";
    h += '<div class="fr mb8"><span style="width:10px;height:10px;border-radius:50%;background:' + (ready ? "var(--green)" : "var(--border)") + ';"></span> <span style="font-size:13px;">' + esc(s.name) + '</span></div>';
  });
  h += '</div>';
  h += '<div class="card mb20">';
  h += '<div style="font-size:13px;font-weight:600;margin-bottom:8px;">Big story of the week</div>';
  h += '<p style="font-size:12px;color:var(--text-3);margin:0 0 8px 0;">The open hook - the thing that makes people open the email.</p>';
  h += '<textarea class="form-input" id="editorial-big-story" rows="3" placeholder="e.g. Optiver paid an average $1.4 million per employee last year..." oninput="S.editorialBigStory=this.value">' + esc(S.editorialBigStory) + '</textarea>';
  h += '</div>';
  return h;
}

function renderEditorial(el) {
  var hasScrapeData = !!(S.lastScraped && S.lastScraped.editorial);
  var hasOutput = !!(S.sectionOutputs.editorial && S.sectionOutputs.editorial.output_text);
  if (!S.sectionPhase.editorial) S.sectionPhase.editorial = hasOutput ? 3 : (hasScrapeData ? 2 : 1);

  var p1 = '';
  p1 += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
  p1 += '<button class="btn btn-primary" onclick="runSection(\'editorial\')">SCRAPE</button>';
  if (S.loading.editorial) p1 += renderSectionProgress('editorial');
  var _ps = formatScrapedDate(S.lastScraped.editorial);
  if (_ps) p1 += '<span class="scraped-badge">Scraped ' + _ps + '</span>';
  p1 += '</div>';

  var p2 = renderEditorialBody();

  var gated = !allSegmentsReadyExcept('editorial');
  var p3 = '';
  if (gated) {
    p3 += '<p style="font-size:12px;color:var(--amber-ink);background:var(--amber-soft);padding:8px 12px;border-radius:8px;margin-bottom:12px;">Write is locked until every other segment is marked ready.</p>';
  }
  p3 += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">';
  p3 += modelSelect('model-editorial');
  p3 += '<button class="btn btn-success" onclick="proceedEditorial()"' + (gated ? ' disabled' : '') + '>Write</button>';
  p3 += '</div>';
  p3 += outputBox('editorial');

  var h = '<div class="sh"><div><h2>GM Editorial</h2><div class="sub">Hook / intro paragraph. Written last, once every other segment is ready.</div></div></div>';
  h += phasePanel('editorial', 1, 'Scrape', true, hasScrapeData, p1);
  h += phasePanel('editorial', 2, 'Big story + segments', true, false, p2);
  h += phasePanel('editorial', 3, 'Write', true, hasOutput, p3);

  el.innerHTML = h;
  fillOutput('editorial');
}

function proceedEditorial() {
  if (!allSegmentsReadyExcept('editorial')) { showToast("Mark every other segment ready first", "error"); return; }
  var bigStory = (S.editorialBigStory || "").trim();
  if (!bigStory) { showToast("Add the big story of the week first", "error"); return; }
  var model = getModel("model-editorial");
  var otherSegments = SEGMENTS.filter(function(s) { return s.id !== "editorial" && s.id !== "big_conversation"; }).map(function(s) {
    return { id: s.id, label: s.name, output_text: (S.sectionOutputs[s.id] && S.sectionOutputs[s.id].output_text) || "" };
  });
  var bigConv = (S.sectionOutputs.big_conversation && S.sectionOutputs.big_conversation.output_text) || "";
  S.loading.editorial = true; render();
  var data = { big_story: bigStory, big_conversation_output: bigConv, other_segments: otherSegments };
  api("/api/proceed-section", { method: "POST", body: { section: "editorial", model: model, data: data } })
    .then(function(d) { S.sectionOutputs.editorial = { output_text: d.output, model_used: d.model }; S.loading.editorial = false; render(); fillOutput('editorial'); showToast("Editorial written"); })
    .catch(function(e) { S.loading.editorial = false; render(); showToast("Error: " + e.message, "error"); });
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: THE BRAINS TRUST (= THE ECONOMIC SCOOP, one segment, two names)
   ═══════════════════════════════════════════════════════════════════════ */
var BRAINS_WORD_RANGE = [230, 390]; // padded around the 10 real editions' 263-375 word range

function _brainsWordCountChip(text) {
  var words = (text || "").trim().length ? text.trim().split(/\s+/).length : 0;
  var lo = BRAINS_WORD_RANGE[0], hi = BRAINS_WORD_RANGE[1];
  var inRange = words >= lo && words <= hi;
  var cls = inRange ? "chip chip-green" : "chip chip-amber";
  var label = words + " words (target " + lo + "-" + hi + ")";
  return '<span class="' + cls + '">' + esc(label) + '</span>';
}

function pickBrainsAngle(idx) {
  S.brainsChosen = S.brainsAngles[idx];
  render();
}

function draftBrainsTrust() {
  if (!S.brainsChosen) return;
  S.brainsDrafting = true;
  render();
  api("/api/proceed-section", {
    method: "POST",
    body: {
      section: "brains_trust",
      model: getModel("model-brains_trust"),
      data: {
        chosen_pitch: S.brainsChosen.pitch,
        chosen_angle: S.brainsChosen.angle,
        chosen_why_tac: S.brainsChosen.why_tac,
        candidates_pool: S.brainsAngles,
      },
    },
  }).then(function(d) {
    S.brainsDrafting = false;
    S.sectionOutputs.brains_trust = { output_text: d.output, model_used: d.model };
    S.sectionPhase.brains_trust = 2;
    render();
    fillOutput('brains_trust');
    showToast("Brains Trust drafted");
  }).catch(function(e) {
    S.brainsDrafting = false;
    render();
    showToast("Error: " + e.message, "error");
  });
}

function renderBrainsPicker() {

  var angles = S.brainsAngles || [];

      if (a.angle) h += '<div class="pick-angle">' + esc(a.angle) + '</div>';
      h += '</div></div>';
    });
  }
  if (S.brainsChosen) {
    h += '<div style="display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap;">';
    h += modelSelect('model-brains_trust');
    h += '<button class="btn btn-primary" onclick="draftBrainsTrust()"' + (S.brainsDrafting ? ' disabled' : '') + '>' + (S.brainsDrafting ? "Drafting…" : "Draft") + '</button>';
    h += '</div>';
  }
  return h;
}

function renderBrains(el) {
  var hasOutput = !!(S.sectionOutputs.brains_trust && S.sectionOutputs.brains_trust.output_text);
  if (!S.sectionPhase.brains_trust) S.sectionPhase.brains_trust = hasOutput ? 2 : 1;

  var p1 = renderBrainsPicker();

  var p2 = outputBox('brains_trust');
  if (hasOutput) p2 += '<div style="margin-top:8px;">' + _brainsWordCountChip(S.sectionOutputs.brains_trust.output_text) + '</div>';

  var h = '<div class="sh"><div><h2>The Brains Trust</h2><div class="sub">Pick an angle from the last 3 weeks of research; the dash drafts the piece.</div></div></div>';
  h += phasePanel('brains_trust', 1, 'Pick + draft', true, !!S.brainsChosen, p1);
  h += phasePanel('brains_trust', 2, 'Output', true, hasOutput, p2);

}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: PULSE
   ═══════════════════════════════════════════════════════════════════════ */
function renderCategoryTrends() {
  if (!S.trends || !S.trends.categories) return "";
  var h = '<div class="cat-trends">';
  S.trends.categories.forEach(function(cat) {
    var score = cat.current_score != null ? cat.current_score.toFixed(1) : "—";
    var delta = cat.delta;
    var deltaClass = delta == null ? "stable" : (delta > 2 ? "up" : (delta < -2 ? "down" : "stable"));
    var weeksAvail = S.trends && S.trends.weeks_available != null ? S.trends.weeks_available : 1;
    var deltaText = delta == null ? (weeksAvail < 2 ? "first week" : "—") : ((delta > 0 ? "+" : "") + delta.toFixed(1));
    var histScores = (cat.history || []).map(function(h) { return h.score; });
    h += '<div class="cat-card">';
    h += '<div class="cat-card-label">' + esc(cat.label) + '</div>';
    h += '<div class="cat-card-score">' + esc(score) + '</div>';
    h += '<div><span class="cat-card-delta ' + deltaClass + '">' + esc(deltaText) + ' WoW</span></div>';
    if (histScores.length >= 2) {
      h += '<div style="margin-top:10px;">' + sparkline(histScores, 120, 36) + '</div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function sortSignals(col) {
  if (S.signalSort.col === col) {
    S.signalSort.dir = S.signalSort.dir === "desc" ? "asc" : "desc";
  } else {
    S.signalSort.col = col;
    S.signalSort.dir = "desc";
  }
  render();
}

function getSortedSignals(signals, moverDeltas) {
  var sort = S.signalSort;
  if (!sort.col) return signals.slice();
  return signals.slice().sort(function(a, b) {
    var na = a.signal_name || a.name || "";
    var nb = b.signal_name || b.name || "";
    var val = 0;
    if (sort.col === "name") {
      val = na.localeCompare(nb);
    } else if (sort.col === "score") {
      val = (a.normalised_score || 0) - (b.normalised_score || 0);
    } else if (sort.col === "delta") {
      val = Math.abs(moverDeltas[na] || 0) - Math.abs(moverDeltas[nb] || 0);
    } else if (sort.col === "area") {
      val = (a.area || "").localeCompare(b.area || "");
    } else if (sort.col === "evidence") {
      val = (S.signalIntelligence[na] ? 1 : 0) - (S.signalIntelligence[nb] ? 1 : 0);
    }
    return sort.dir === "desc" ? -val : val;
  });
}

function renderPulseBody() {
  var h = '';
  if (!S.pulse) {
    h += '<div class="card"><p class="loading">No pulse data yet. Click RUN to pull signals.</p></div>';
  } else {
    // Gauge
    var p = S.pulse;
    var score = p.smoothed_score != null ? p.smoothed_score : (p.composite_score != null ? p.composite_score : "—");
    var dir = p.direction || "stable";
    // Compute pulse-level delta from trends composite_history if available
    var delta = 0;
    if (S.trends && S.trends.composite_history && S.trends.composite_history.length >= 2) {
      var hist = S.trends.composite_history;
      delta = (p.smoothed_score || 0) - (hist[hist.length - 2].score || 0);
    }
    var dirClass = dir === "up" ? "dir-up" : (dir === "down" ? "dir-down" : "dir-stable");
    var arrow = dir === "up" ? "\u2191" : (dir === "down" ? "\u2193" : "\u2192");

    h += '<div class="card mb20" style="text-align:center;padding:32px;">';
    h += '<div class="gauge-lbl">MARKET PULSE</div>';
    h += '<div class="gauge-num">' + esc(typeof score === "number" ? score.toFixed(1) : score) + '</div>';
    h += '<div style="margin-top:10px;"><span class="dir-pill ' + dirClass + '">' + arrow + ' ' + esc(dir) + (delta ? ' (' + (delta > 0 ? "+" : "") + delta.toFixed(1) + ')' : '') + '</span></div>';
    h += '<div style="margin-top:8px;font-size:11px;color:var(--text-3);">Higher = more stress · Lower = calm market</div>';
    h += '</div>';

    h += renderCategoryTrends();

    // Anomalies
    if (S.anomalies && S.anomalies.length) {
      h += '<div class="mb20">';
      S.anomalies.forEach(function(a) {
        h += '<div class="anomaly"><span style="font-size:18px;">\u26A0</span><span>' + esc(a.signal + ': score ' + (a.current != null ? a.current : '\u2014') + ' (' + (a.direction || '') + ', ' + (a.confidence || '') + ' confidence)') + '</span></div>';
      });
      h += '</div>';
    }

    // Signal table with checkboxes
    h += '<div class="card mb20"><div style="font-weight:600;margin-bottom:12px;">Signals</div>';
    if (S.signals && S.signals.length) {
      function thSort(col, label, width) {
        var active = S.signalSort.col === col;
        var arrow = active ? (S.signalSort.dir === "desc" ? " \u25BC" : " \u25B2") : "";
        var style = 'cursor:pointer;user-select:none;' + (width ? 'width:' + width + ';' : '');
        return '<th onclick="sortSignals(\'' + col + '\')" style="' + style + '">' + label + arrow + '</th>';
      }
      h += '<table class="tbl"><thead><tr>';
      h += '<th style="width:30px;"></th>';
      h += thSort("name", "Signal");
      h += thSort("score", "Score");
      h += thSort("delta", "Delta");
      h += thSort("area", "Category");
      h += thSort("evidence", "Evidence", "60px");
      h += '</tr></thead><tbody>';
      // Build delta lookup from all_signal_deltas (full set) with biggest_movers as fallback
      var moverDeltas = {};
      if (S.trends && S.trends.all_signal_deltas) {
        Object.keys(S.trends.all_signal_deltas).forEach(function(name) {
          moverDeltas[name] = S.trends.all_signal_deltas[name].delta || 0;
        });
      } else if (S.trends && S.trends.biggest_movers) {
        S.trends.biggest_movers.forEach(function(m) { moverDeltas[m.signal_name || m.name] = m.delta || 0; });
      }
      getSortedSignals(S.signals, moverDeltas).forEach(function(sig) {
        var name = sig.signal_name || sig.name || "";
        var checked = S.pulseChecked[name] ? " checked" : "";
        var dv = moverDeltas[name] != null ? moverDeltas[name] : 0;
        var hasDelta = moverDeltas[name] != null;
        var dc = !hasDelta ? 'color:var(--text-3)' : (SIGNAL_INVERTED_DISPLAY.has(name)
          ? (dv > 0 ? 'color:var(--red)' : 'color:var(--green)')
          : (dv > 0 ? 'color:var(--green)' : 'color:var(--red)'));
        h += '<tr style="cursor:pointer;" onclick="togglePulseCheck(\'' + esc(name) + '\',!S.pulseChecked[\'' + esc(name) + '\']);render()">';
        h += '<td onclick="event.stopPropagation()"><input type="checkbox"' + checked + ' onchange="togglePulseCheck(\'' + esc(name) + '\',this.checked)"></td>';
        h += '<td>' + esc(name) + '</td>';
        h += '<td>' + esc(sig.normalised_score != null ? sig.normalised_score.toFixed(1) : "—") + '</td>';
        h += '<td style="font-weight:600;' + dc + '">' + (hasDelta ? ((dv > 0 ? "+" : "") + dv.toFixed(1)) : "—") + '</td>';
        h += '<td><span class="chip chip-default">' + esc(sig.area || "") + '</span></td>';
        var intel = S.signalIntelligence[name];
        var evidenceBadge = intel
          ? '<span class="chip chip-default" style="cursor:pointer;font-size:10px;" onclick="toggleSignalIntel(\'' + esc(name) + '\')" title="' + escAttr((intel.commentary || "").slice(0, 80)) + '...">&#8801; evidence</span>'
          : '';
        h += '<td onclick="event.stopPropagation()">' + evidenceBadge + '</td>';
        h += '</tr>';
        if (S.signalIntelExpanded[name] && intel) {
          h += '<tr><td colspan="6" style="background:var(--bg-2);padding:12px 16px;">';
          h += '<div style="font-size:13px;line-height:1.6;color:var(--text-1);margin-bottom:10px;">' + esc(intel.commentary) + '</div>';
          if (intel.articles && intel.articles.length) {
            h += '<div style="font-size:11px;color:var(--text-3);margin-bottom:6px;">Sources:</div>';
            intel.articles.slice(0, 3).forEach(function(a) {
              h += '<div style="font-size:12px;margin-bottom:4px;">';
              h += '<a href="' + escAttr(a.url) + '" target="_blank" style="color:var(--amber);">' + esc(a.title) + '</a>';
              if (a.published) h += ' <span style="color:var(--text-3);">(' + esc(a.published.slice(0, 10)) + ')</span>';
              h += '</div>';
            });
          }
          h += '<button class="btn btn-secondary" style="font-size:10px;margin-top:8px;" onclick="refreshSignalIntel(\'' + esc(name) + '\')">Refresh evidence</button>';
          h += '</td></tr>';
        }
      });
      h += '</tbody></table>';
    } else {
      h += '<p style="color:var(--text-3);font-size:13px;">No signals loaded yet.</p>';
    }
    h += '</div>';
  }
  return h;
}

function renderPulse(el) {
  var hasScrapeData = !!(S.signals && S.signals.length);
  var hasOutput = !!(S.sectionOutputs.pulse && S.sectionOutputs.pulse.output_text);
  if (!S.sectionPhase.pulse) S.sectionPhase.pulse = hasOutput ? 3 : (hasScrapeData ? 2 : 1);

  // Phase 1: Scrape
  var p1 = '';
  p1 += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
  p1 += '<button class="btn btn-primary" onclick="runSection(\'pulse\')">SCRAPE</button>';
  if (S.trends && S.trends.weeks_available < 2) {
    p1 += ' <button class="btn btn-secondary" onclick="runBackfill()" style="font-size:11px;">Backfill prev week</button>';
  }
  if (S.loading.pulse) p1 += renderSectionProgress('pulse');
  var _ps1 = formatScrapedDate(S.lastScraped.pulse);
  if (_ps1) p1 += '<span class="scraped-badge">Scraped ' + _ps1 + '</span>';
  p1 += '</div>';

  // Phase 2: Review & Pick
  var p2 = hasScrapeData ? renderPulseBody() : '';

  // Phase 3: Generate
  var p3 = '';
  p3 += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">';
  p3 += modelSelect('model-pulse');
  p3 += '<button class="btn btn-success" onclick="proceedPulse()">' + (hasOutput ? 'Regenerate' : 'Generate') + '</button>';
  p3 += '</div>';
  p3 += outputBox('pulse');

  var h = '<div class="sh"><div><h2>Pulse</h2><div class="sub">Disruption score, signals, and narrative</div></div></div>';
  h += phasePanel('pulse', 1, 'Scrape', true, hasScrapeData, p1);
  h += phasePanel('pulse', 2, 'Review & Pick', hasScrapeData, false, p2);
  h += phasePanel('pulse', 3, 'Generate', hasScrapeData, hasOutput, p3);

  el.innerHTML = h;
  fillOutput('pulse');
}

function refreshBigConvTopic() {
  if (S.bigConvSelectedTopic) loadBigConvTopicDetail(S.bigConvSelectedTopic);
}

function runBigConvTopic(topic) {
  // Kick off the real big-conversation skill headless, then poll to completion.
  S.bigConvRun = { topic: topic, status: "queued", run_id: null, error: null };
  render();
  api("/api/skill-run/big-conversation/" + encodeURIComponent(topic), { method: "POST" })
    .then(function(d) {
      S.bigConvRun = { topic: topic, status: "running", run_id: d.run_id, error: null };
      render();
      pollBigConvRun(topic, d.run_id);
    })
    .catch(function(e) {
      S.bigConvRun = { topic: topic, status: "failed", error: e.message };
      render();
    });
}

function pollBigConvRun(topic, runId) {
  api("/api/skill-run/" + encodeURIComponent(runId))
    .then(function(r) {
      if (!S.bigConvRun || S.bigConvRun.topic !== topic) return;  // user moved on
      if (r.status === "done") {
        S.bigConvRun = null;
        showToast("Big Conversation ready", "success");
        refreshBigConvTopic();  // loads the piece + screenshots the skill wrote
      } else if (r.status === "failed") {
        S.bigConvRun = { topic: topic, status: "failed", error: r.error, output_tail: r.output_tail };
        render();
      } else {
        setTimeout(function() { pollBigConvRun(topic, runId); }, 3000);
      }
    })
    .catch(function() {
      setTimeout(function() { pollBigConvRun(topic, runId); }, 4000);  // transient, keep polling
    });
}

function toggleBigConvTierPool() {

   SECTION: OFF THE CLOCK

var OTC_CATS = [
  { key: "otc_eating", label: "Eating" },
  { key: "otc_watching", label: "Watching" },
  { key: "otc_reading", label: "Reading" },
  { key: "otc_wearing", label: "Wearing" },
  { key: "otc_going", label: "Going" },
];

// Signals where a positive WoW delta = BAD news for readers (higher score = more disruption).
// All other signals: positive delta = good news (higher score = better conditions).
var SIGNAL_INVERTED_DISPLAY = new Set(["asx_volatility"]);

function _otcSel(cat) {
  if (!S.otcSelection[cat]) {
    S.otcSelection[cat] = { mode: "candidate", candidateIndex: 0, swapOpen: false, customUrl: "", customContent: "", blurb: "", generating: false };
  }
  return S.otcSelection[cat];
}

function _otcCandidate(cat, idx) {
  var list = (S.otcData && S.otcData.candidates && S.otcData.candidates[cat]) || [];
  return list[idx] || null;
}

function renderOTCBody() {
  var h = '';
  if (!S.otcData || !S.otcData.candidates) {
    h += '<div class="card"><p class="loading">No data yet. Click SCRAPE to pull lifestyle sources.</p></div>';
    return h;
  }
  h += '<div class="otc-cats">';
  OTC_CATS.forEach(function(cat) {
    var sel = _otcSel(cat.key);
    var candidates = S.otcData.candidates[cat.key] || [];
    h += '<div class="card otc-cat-card">';
    h += '<div class="otc-cat-title">' + esc(cat.label) + '</div>';

    if (!candidates.length && sel.mode !== "custom") {
      h += '<p style="font-size:12px;color:var(--text-3);">No candidates scraped for this category.</p>';
      h += '<button class="btn btn-sm btn-secondary" onclick="toggleOTCCustom(\'' + cat.key + '\')">Add custom</button>';
      h += '</div>';
      return;
    }

    if (sel.mode === "candidate") {
      var current = _otcCandidate(cat.key, sel.candidateIndex) || candidates[0];
      var title = (current && (current.title || current.summary)) || "";
      h += '<div style="font-weight:600;font-size:14px;margin-bottom:4px;">' + esc(title) + '</div>';
      if (current && current.city) h += '<div style="font-size:11px;color:var(--text-3);margin-bottom:6px;">' + esc(current.city) + '</div>';
      h += '<textarea class="form-input" rows="2" placeholder="Blurb for this pick..." oninput="updateOTCBlurb(\'' + cat.key + '\',this.value)">' + esc(sel.blurb || (current ? current.summary : "") || "") + '</textarea>';
      h += '<div style="display:flex;gap:8px;margin-top:8px;">';
      h += '<button class="btn btn-sm btn-secondary" onclick="toggleOTCSwap(\'' + cat.key + '\')">Swap</button>';
      h += '<button class="btn btn-sm" onclick="toggleOTCCustom(\'' + cat.key + '\')">Add custom</button>';
      h += '</div>';
      if (sel.swapOpen) {
        h += '<div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">';
        candidates.forEach(function(c, idx) {
          if (idx === sel.candidateIndex) return;
          var label = (c.title || c.summary || "").slice(0, 60);
          h += '<button class="btn btn-sm" style="text-align:left;" onclick="pickOTCCandidate(\'' + cat.key + '\',' + idx + ')">' + esc(label) + '</button>';
        });
        h += '</div>';
      }
    } else {
      h += '<div style="font-size:11px;color:var(--text-3);margin-bottom:4px;">Custom pick</div>';
      h += '<input class="form-input" placeholder="URL" style="margin-bottom:6px;" value="' + escAttr(sel.customUrl) + '" oninput="updateOTCCustomField(\'' + cat.key + '\',\'customUrl\',this.value)">';
      h += '<textarea class="form-input" rows="3" placeholder="Paste the article/venue content..." oninput="updateOTCCustomField(\'' + cat.key + '\',\'customContent\',this.value)">' + esc(sel.customContent) + '</textarea>';
      h += '<div style="display:flex;gap:8px;margin-top:8px;">';
      h += '<button class="btn btn-sm btn-success" onclick="generateOTCCustomBlurb(\'' + cat.key + '\')"' + (sel.generating ? ' disabled' : '') + '>' + (sel.generating ? 'Generating…' : 'Generate blurb') + '</button>';
      h += '<button class="btn btn-sm btn-secondary" onclick="toggleOTCCustom(\'' + cat.key + '\')">Back to scraped picks</button>';
      h += '</div>';
      if (sel.blurb) {
        h += '<textarea class="form-input" rows="2" style="margin-top:8px;" oninput="updateOTCBlurb(\'' + cat.key + '\',this.value)">' + esc(sel.blurb) + '</textarea>';
      }
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function toggleOTCSwap(cat) {
  var sel = _otcSel(cat);
  sel.swapOpen = !sel.swapOpen;
  render();
}

function pickOTCCandidate(cat, idx) {
  var sel = _otcSel(cat);
  sel.candidateIndex = idx;
  sel.swapOpen = false;
  var next = _otcCandidate(cat, idx);
  sel.blurb = next ? (next.summary || "") : "";
  render();
}

function toggleOTCCustom(cat) {
  var sel = _otcSel(cat);
  sel.mode = sel.mode === "custom" ? "candidate" : "custom";
  render();
}

function updateOTCCustomField(cat, field, value) {
  _otcSel(cat)[field] = value;
}

function updateOTCBlurb(cat, value) {
  _otcSel(cat).blurb = value;
}

function generateOTCCustomBlurb(cat) {
  var sel = _otcSel(cat);
  if (!sel.customContent || !sel.customContent.trim()) {
    showToast("Paste the content to write from first", "error");
    return;
  }
  sel.generating = true; render();
  var model = getModel("model-otc");
  // Deliberately calls the short-raw-summary endpoint, not /api/proceed-section -
  // that produces the FULLY FORMATTED entry (category header + title + [LINK]),
  // which would then get formatted a second time by the combined Generate call.
  api("/api/otc-custom-summary", { method: "POST", body: { category: cat, url: sel.customUrl || "", content: sel.customContent, model: model } })
    .then(function(d) { sel.blurb = d.output; sel.generating = false; render(); showToast("Blurb generated for " + cat.replace("otc_", "")); })
    .catch(function(e) { sel.generating = false; render(); showToast("Error: " + e.message, "error"); });
}

function renderOTC(el) {
  var hasScrapeData = !!(S.otcData && S.otcData.candidates);
  var hasOutput = !!(S.sectionOutputs.off_the_clock && S.sectionOutputs.off_the_clock.output_text);
  if (!S.sectionPhase.off_the_clock) S.sectionPhase.off_the_clock = hasOutput ? 3 : (hasScrapeData ? 2 : 1);

  var p1 = '';
  p1 += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
  p1 += '<button class="btn btn-primary" onclick="runSection(\'off_the_clock\')">SCRAPE</button>';
  p1 += '<button class="btn btn-sm btn-secondary" onclick="runSection(\'classify_otc\')">Classify OTC</button>';
  if (S.loading.off_the_clock) p1 += renderSectionProgress('off_the_clock');
  var _ps = formatScrapedDate(S.lastScraped && S.lastScraped.off_the_clock);
  if (_ps) p1 += '<span class="scraped-badge">Scraped ' + _ps + '</span>';
  p1 += '</div>';

  var p2 = hasScrapeData ? renderOTCBody() : '';

  var p3 = '';
  p3 += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">';
  p3 += modelSelect("model-otc");
  p3 += '<button class="btn btn-success" onclick="proceedOTC()">' + (hasOutput ? 'Regenerate' : 'Generate') + '</button>';
  p3 += '</div>';
  p3 += outputBox("off_the_clock");

  var h = '<div class="sh"><div><h2>Off the Clock</h2><div class="sub">Eat, watch, read, wear, go - one pick per category.</div></div></div>';
  h += phasePanel('off_the_clock', 1, 'Scrape', true, hasScrapeData, p1);
  h += phasePanel('off_the_clock', 2, 'Pick each category', hasScrapeData, false, p2);
  h += phasePanel('off_the_clock', 3, 'Generate', hasScrapeData, hasOutput, p3);

  el.innerHTML = h;
  fillOutput('off_the_clock');
}

function proceedOTC() {
  var model = getModel("model-otc");
  var picks = [];
  OTC_CATS.forEach(function(cat) {
    var sel = _otcSel(cat.key);
    if (sel.mode === "custom") {
      if (!sel.blurb) return;
      picks.push({ category: cat.key, title: sel.customContent.split("\n")[0].slice(0, 80), url: sel.customUrl || "", blurb: sel.blurb });
    } else {
      var current = _otcCandidate(cat.key, sel.candidateIndex);
      if (!current) return;
      picks.push({ category: cat.key, title: current.title || current.summary || "", url: current.url || "", blurb: sel.blurb || current.summary || "" });
    }
  });
  if (!picks.length) { showToast("Pick at least one category before generating.", "error"); return; }
  S.loading.off_the_clock = true; render();
  api("/api/proceed-section", { method: "POST", body: { section: "off_the_clock", model: model, data: { picks: picks } } })
    .then(function(d) { S.sectionOutputs.off_the_clock = { output_text: d.output, model_used: d.model }; S.loading.off_the_clock = false; render(); fillOutput('off_the_clock'); showToast("Off the Clock generated"); })
    .catch(function(e) { S.loading.off_the_clock = false; render(); showToast("Error: " + e.message, "error"); });
}

function toggleInsideTrackPick(filename) {

function updateInsideTrackNote(filename, value) {

/* ═══════════════════════════════════════════════════════════════════════
   SHARED: Output box + Save + Run
   ═══════════════════════════════════════════════════════════════════════ */
function openPhase(section, num) {
  S.sectionPhase[section] = num;
  render();
}

function phasePanel(section, num, label, unlocked, done, bodyHtml) {
  var open = unlocked && (S.sectionPhase[section] || 1) === num;
  var classes = 'phase-card' + (open ? ' phase-open' : '') + (unlocked ? '' : ' phase-locked');
  var h = '<div class="' + classes + '">';
  h += '<div class="phase-hdr"' + (unlocked ? ' onclick="openPhase(\'' + section + '\',' + num + ')"' : '') + '>';
  h += '<span class="phase-num">' + num + '</span>';
  h += '<span class="phase-lbl">' + label + '</span>';
  if (done) h += '<span class="phase-done">✓</span>';
  if (unlocked) h += '<span class="phase-chevron">' + (open ? '▲' : '▼') + '</span>';
  h += '</div>';
  if (open) h += '<div class="phase-body">' + bodyHtml + '</div>';
  h += '</div>';
  return h;
}

function outputBox(section) {
  var h = '<div class="output-box">';
  h += '<div class="fb mb8"><span style="font-weight:600;font-size:13px;">Output</span>';
  h += '<div style="display:flex;gap:6px;">';
  h += '<button class="btn btn-sm" onclick="copyOutput(\'' + section + '\')" id="copy-btn-' + section + '">Copy</button>';
  h += '<button class="btn btn-sm btn-success" onclick="saveOutput(\'' + section + '\')">Save</button>';
  h += '<button class="btn btn-sm btn-success" onclick="markReady(\'' + section + '\')">Mark ready</button>';
  h += '</div></div>';
  h += '<textarea id="output-' + section + '" placeholder="Generated output will appear here..."></textarea>';
  h += '</div>';
  return h;
}

function copyOutput(section) {
  var ta = $("output-" + section);
  if (!ta || !ta.value) return;
  navigator.clipboard.writeText(ta.value).then(function() {
    var btn = $("copy-btn-" + section);
    if (btn) { btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy"; }, 1500); }
  }).catch(function() {
    ta.select();
    document.execCommand("copy");
    var btn = $("copy-btn-" + section);
    if (btn) { btn.textContent = "Copied!"; setTimeout(function() { btn.textContent = "Copy"; }, 1500); }
  });
}

function fillOutput(section) {
  var ta = $("output-" + section);
  if (ta && S.sectionOutputs[section] && S.sectionOutputs[section].output_text) {
    ta.value = S.sectionOutputs[section].output_text;
  }
}

function saveOutput(section) {
  var ta = $("output-" + section);
  if (!ta) return;
  api("/api/section-output/" + section, { method: "POST", body: { output_text: ta.value } })
    .then(function() {
      S.sectionOutputs[section] = S.sectionOutputs[section] || {};
      S.sectionOutputs[section].output_text = ta.value;
      showToast("Saved " + section.replace(/_/g, " "));
      renderSidebar();
      _refreshPageHeader();
    })
    .catch(function(e) { showToast("Error: " + e.message, "error"); });
}

function runBackfill() {
  // Compute previous week ISO string
  var now = new Date();
  var prevWeek = new Date(now.getTime() - 7 * 24 * 3600 * 1000);
  var d = new Date(Date.UTC(prevWeek.getFullYear(), prevWeek.getMonth(), prevWeek.getDate()));
  var dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  var targetWeek = d.getUTCFullYear() + "-W" + String(weekNo).padStart(2, "0");

  showToast("Backfilling " + targetWeek + " — signal backfill runs in background (~6 min for Google Trends)");
  api("/api/backfill", { method: "POST", body: { target_week: targetWeek } })
    .then(function(d) {
      showToast("Backfill started: " + d.seeded_employers + " employer snapshots seeded. Signal data populating in background.");
      S.trends = null;
      loadPageData("pulse").then(function() { render(); });
    })
    .catch(function(e) { showToast("Backfill failed: " + e.message, "error"); });
}

function runScrapeAll() {
  if (S.scrapeAllRunning) return;
  S.scrapeAllRunning = true;
  S.scrapeAllErrors = {};
  render();
  api("/api/scrape-all", { method: "POST" })
    .then(function() { pollScrapeAll(); })
    .catch(function(e) {
      S.scrapeAllRunning = false;
      render();
      showToast("Scrape All failed to start: " + e.message, "error");
    });
}

function pollScrapeAll() {
  var failCount = 0;
  var poll = setInterval(function() {
    fetch("/api/scrape-all/status").then(function(r) { return r.json(); }).then(function(d) {
      failCount = 0; // reset on success
      render(); // shows current section in pill
      if (!d.running) {
        clearInterval(poll);
        S.scrapeAllRunning = false;
        // Store errors from results
        (d.results || []).forEach(function(r) {
          if (r.status === "error") S.scrapeAllErrors[r.section] = r.error;
        });
        var failed = (d.results || []).filter(function(r) { return r.status === "error"; });
        var ok = (d.results || []).filter(function(r) { return r.status === "ok"; });
        var msg = "Scrape All done — " + ok.length + "/" + d.total + " succeeded";
        if (failed.length) msg += " · " + failed.map(function(r) { return r.section; }).join(", ") + " failed";
        showToast(msg, failed.length ? "error" : "");
        // Reload current page data
        loadPageData(S.page).then(function() { render(); });
      }
    }).catch(function() {
      failCount++;
      if (failCount >= 3) {
        clearInterval(poll);
        S.scrapeAllRunning = false;
        render();
        showToast("Scrape All: lost connection to server", "error");
      }
    });
  }, 2000);
}

function runSection(section) {
  S.loading[section] = true; render();
  // Fire and forget — returns immediately, runs in background on server
  api("/api/run-section", { method: "POST", body: { section: section } })
    .then(function(d) {
      if (!d.started) { S.loading[section] = false; render(); showToast(d.message || "Already running", "error"); return; }
      showToast(section.replace(/_/g, " ") + " scraping...");
      // Poll for completion
      pollSectionStatus(section);
    })
    .catch(function(e) { S.loading[section] = false; render(); showToast("Error: " + e.message, "error"); });
}

function pollSectionStatus(section) {
  var poll = setInterval(function() {
    fetch("/api/section-status/" + section).then(function(r) { return r.json(); }).then(function(d) {
      // Always store latest progress for render
      S.sectionProgress[section] = {
        step: d.step || 0,
        total: d.total || 0,
        step_name: d.step_name || ""
      };
      if (!d.running && d.done) {
        clearInterval(poll);
        S.loading[section] = false;
        delete S.sectionProgress[section];
        // Auto-advance to Phase 2 when scrape completes successfully
        if (!d.error && (S.sectionPhase[section] === 1 || !S.sectionPhase[section])) {
          S.sectionPhase[section] = 2;
        }
        if (d.error) {
          showToast(section.replace(/_/g, " ") + " failed: " + d.error, "error");
        } else {
          showToast(section.replace(/_/g, " ") + " complete");
        }
        switch (section) {
          case "pulse": S.pulse = null; S.trends = null; break;
          case "finds": case "editorial": case "classify": S.items = null; S.bigConvCandidates = null; break;
          case "thread": S.threads = null; break;
          case "off_the_clock": case "classify_otc": S.otcData = null; break;
          case "big_conversation": S.bigConvCandidates = null; break;
        }
        var pageForSection = {pulse:"pulse", finds:"finds", editorial:"editorial", classify:"finds", thread:"thread", off_the_clock:"off_the_clock", classify_otc:"off_the_clock", big_conversation:"big_conversation"};
        var relevantPage = pageForSection[section] || section;
        if (S.page === relevantPage) {
          loadPageData(S.page).then(function() { render(); });
        } else {
          render();
        }
      } else {
        render();
      }
    }).catch(function() { /* ignore poll errors */ });
  }, 2000);
}

function renderSectionProgress(section) {
  var p = S.sectionProgress[section];
  if (!p || !S.loading[section]) return '<span class="ingest-spinner"></span>';
  var total = p.total || 1;
  var step = Math.min(p.step, total);
  var pct = Math.round((step / total) * 100);
  var label = esc(p.step_name || "Running...");
  return (
    '<span style="display:inline-flex;align-items:center;gap:8px;margin-left:8px;">' +
    '<span style="display:inline-block;width:120px;height:6px;background:var(--divider);border-radius:3px;overflow:hidden;">' +
    '<span style="display:block;height:100%;width:' + pct + '%;background:var(--amber);border-radius:3px;transition:width 0.4s ease;"></span>' +
    '</span>' +
    '<span style="font-size:12px;color:var(--text-2);">' + step + '/' + total + ' &middot; ' + label + '</span>' +
    '</span>'
  );
}

function openProceedModal(section, items) {

    items: items || [], loading: true,
    contextBreakdown: null, excludedItems: {}, _tab: "prompt"
  };
  render();
  api("/api/preview-prompt", { method: "POST", body: { section: section, data: (S.proceedData[section] || {}).data || {} } })
    .then(function(d) {
      S.proceedModal.prompt = d.prompt || "";
      S.proceedModal.contextBreakdown = d.context_breakdown || null;
      S.proceedModal.loading = false;
      render();

      S.proceedModal.loading = false;

function closeProceedModal() {
  S.proceedModal = { open: false, section: null, prompt: "", lean: "", items: [], loading: false, contextBreakdown: null, excludedItems: {}, _tab: "prompt" };
  render();
}

function confirmAndGenerate() {
  var modal = S.proceedModal;
  var section = modal.section;
  var lean = modal.lean.trim();
  var customPrompt = lean ? lean + "\n\n" + modal.prompt : modal.prompt;
  var model = S.proceedModel[section] || (S.models && S.models.length ? S.models[0].id : null);
  S.proceedModal.open = false;
  S.loading[section] = true;
  render();
  var body = Object.assign({}, S.proceedData[section] || {}, {
    section: section,
    custom_prompt: customPrompt,
    model: model,
    excluded: Object.keys(modal.excludedItems).filter(function(k) { return modal.excludedItems[k]; }),
  });
  api("/api/proceed-section", { method: "POST", body: body })
    .then(function(d) {
      S.sectionOutputs[section] = { output_text: d.output, model_used: d.model };
      S.loading[section] = false;
      S.sectionPhase[section] = 3;
      render();
      showToast(section.replace(/_/g, " ") + " generated" + (d.model ? " · " + d.model : ""));
    })
    .catch(function(e) { S.loading[section] = false; render(); showToast("Error: " + e.message, "error"); });
}
