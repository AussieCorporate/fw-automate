        var active = m.id === currentModel;
        h += '<div onclick="S.proceedModel[\'' + section + '\']=\'' + m.id + '\';try{localStorage.setItem(\'fw_proceedModel\',JSON.stringify(S.proceedModel));}catch(e){}render()" ';
        h += 'style="padding:10px 14px;border-radius:6px;cursor:pointer;background:' + (active ? 'var(--amber-soft, rgba(255,180,0,0.12))' : 'transparent') + ';border:1px solid ' + (active ? 'var(--amber)' : 'var(--divider)') + ';margin-bottom:6px;display:flex;align-items:center;gap:10px;">';
        h += '<div style="width:10px;height:10px;border-radius:50%;background:' + (active ? 'var(--amber)' : 'var(--divider)') + ';flex-shrink:0;"></div>';
        h += '<div><div style="font-size:13px;font-weight:' + (active ? '600' : '400') + ';">' + esc(m.label) + '</div>';
        h += '<div style="font-size:11px;color:var(--text-3);">' + esc(m.id) + '</div></div>';
        h += '</div>';
      });
    });
  }

  h += '<div class="modal-footer" style="margin-top:16px;">';
  h += '<button class="btn btn-secondary" onclick="closeProceedModal()">Cancel</button>';
  h += '<button class="btn btn-success" onclick="confirmAndGenerate()" ' + (modal.loading ? 'disabled' : '') + '>Confirm & Generate</button>';
  h += '</div></div></div>';
  return h;
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: TOP PICKS (Beehiiv Pick & Scroll)
   ═══════════════════════════════════════════════════════════════════════ */
function _allTopPicks() {
  var clickPicks = (S.topPicks && S.topPicks.picks) || [];
  var features = Object.keys(S.topPicksFeatureAdds).map(function(id) {
    var f = S.topPicksFeatureAdds[id];
    return {
      url: f.url, summary: f.blurb, clicks: null, is_feature: true,
      campaign_title: f.title, campaign_url: f.url, source_domain: "feature",
    };
  });
  return clickPicks.concat(features);
}

function loadTopPicksRecentPosts() {
  S.loading.top_picks_features = true; render();
  api("/api/top-picks/recent-posts")
    .then(function(d) { S.topPicksRecentPosts = d.posts || []; S.loading.top_picks_features = false; render(); })
    .catch(function(e) { S.loading.top_picks_features = false; render(); showToast("Could not load recent editions: " + e.message, "error"); });
}

function toggleTopPicksFeatureDraft(id, checked) {
  if (checked) {
    if (S.topPicksFeatureDrafts[id] === undefined) S.topPicksFeatureDrafts[id] = "";
  } else {
    delete S.topPicksFeatureDrafts[id];
    delete S.topPicksFeatureAdds[id];
    S.topPicksChecked = {};
  }
  render();
}

function updateTopPicksFeatureBlurb(id, value) {
  S.topPicksFeatureDrafts[id] = value;
}

function addTopPicksFeature(id) {
  var post = (S.topPicksRecentPosts || []).find(function(p) { return p.id === id; });
  var blurb = (S.topPicksFeatureDrafts[id] || "").trim();
  if (!post || !blurb) { showToast("Write the feature's blurb first", "error"); return; }
  S.topPicksFeatureAdds[id] = { title: post.title, url: post.web_url, blurb: blurb };
  S.topPicksChecked = {};
  showToast("Added feature: " + post.title);
  render();
}

function renderTopPicksFeaturesPanel() {
  var h = '<div class="card mb20">';
  h += '<div style="font-weight:600;margin-bottom:8px;">Feature stories</div>';
  h += '<p style="font-size:12px;color:var(--text-3);margin:0 0 10px 0;">Features run inline with no click-tracked link, so they never show up in the click-ranked list above. Flag the ones that ran this week and write their own blurb so they can make the cut.</p>';
  if (!S.topPicksRecentPosts) {
    h += '<button class="btn btn-sm btn-secondary" onclick="loadTopPicksRecentPosts()"' + (S.loading.top_picks_features ? ' disabled' : '') + '>' + (S.loading.top_picks_features ? 'Loading…' : 'Load recent editions') + '</button>';
    h += '</div>';
    return h;
  }
  if (!S.topPicksRecentPosts.length) {
    h += '<p style="font-size:12px;color:var(--text-3);">No recent editions found.</p></div>';
    return h;
  }
  S.topPicksRecentPosts.forEach(function(post) {
    var added = S.topPicksFeatureAdds[post.id];
    h += '<div class="fr mb8" style="align-items:flex-start;gap:8px;">';
    h += '<input type="checkbox"' + (added ? " checked" : "") + ' onchange="toggleTopPicksFeatureDraft(\'' + esc(post.id) + '\',this.checked)">';
    h += '<div style="flex:1;">';
    h += '<div style="font-size:13px;font-weight:600;">' + esc(post.title) + '</div>';
    h += '<div style="font-size:11px;color:var(--text-3);margin-bottom:4px;"><a href="' + escAttr(post.web_url) + '" target="_blank">' + esc(post.web_url) + '</a></div>';
    if (S.topPicksFeatureDrafts[post.id] !== undefined) {
      h += '<textarea class="form-input" rows="2" placeholder="Write this feature\'s blurb..." oninput="updateTopPicksFeatureBlurb(\'' + esc(post.id) + '\',this.value)">' + esc(S.topPicksFeatureDrafts[post.id] || "") + '</textarea>';
      h += '<button class="btn btn-sm btn-success" style="margin-top:6px;" onclick="addTopPicksFeature(\'' + esc(post.id) + '\')">Add to list</button>';
    }
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

function buildTopPicksOutput() {
  var picks = _allTopPicks();
  var selected = picks.filter(function(p, i) { return S.topPicksChecked && S.topPicksChecked[i]; });
  if (!selected.length) { showToast("Select at least one pick first", "error"); return; }
  var lines = selected.map(function(p) {
    var summary = (p.summary || "").replace(/\s+/g, " ").trim();
    if (!summary) return null;
    if (!/[.!?]$/.test(summary)) summary += ".";
    return summary + " " + (p.url || "");
  }).filter(function(line) { return line !== null; });
  var ta = $("output-top_picks");
  if (ta) ta.value = lines.join("\n\n");
}

function renderTopPicksBody() {
  var picks = _allTopPicks();
  if (!picks.length) return '<div class="card mb20"><p style="color:var(--text-3);font-size:13px;">No data yet. Click SCRAPE to fetch click data from Pick &amp; Scroll.</p></div>';

  var checkedCount = Object.keys(S.topPicksChecked || {}).filter(function(k) { return S.topPicksChecked[k]; }).length;
  var h = '';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
  h += '<span style="font-size:13px;color:var(--text-2);">' + checkedCount + ' selected of ' + picks.length + ' links</span>';
  if (checkedCount > 0) {
    h += '<button class="btn btn-sm btn-success" onclick="copyTopPicks()">Copy Selected</button>';
  }
  h += '</div>';

  picks.forEach(function(p, i) {
    var domain = esc(p.source_domain || "");
    var summary = esc(p.summary || "No summary extracted");
    var url = escAttr(p.url || "#");
    var clicks = p.clicks || 0;
    var campaign = esc(p.campaign_title || "");
    var campaignUrl = escAttr(p.campaign_url || "#");
    var checked = S.topPicksChecked && S.topPicksChecked[i];

    h += '<div class="card mb12 hov' + (checked ? " sel" : "") + '" style="padding:14px 16px;">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">';
    h += '<div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0;">';
    h += '<input type="checkbox"' + (checked ? " checked" : "") + ' onchange="toggleTopPick(' + i + ',this.checked)" style="width:18px;height:18px;accent-color:var(--amber);margin-top:2px;flex-shrink:0;">';
    h += '<div style="flex:1;min-width:0;">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
    h += '<span style="font-size:18px;font-weight:700;color:var(--text-3);min-width:24px;">#' + (i + 1) + '</span>';
    h += '<span class="chip" style="font-size:11px;">' + domain + '</span>';
    h += '</div>';
    h += '<p style="font-size:13px;line-height:1.5;margin:0 0 6px 0;color:var(--text-1);">' + summary + '</p>';
    h += '<div style="font-size:12px;color:var(--text-3);">';
    h += '<a href="' + url + '" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none;word-break:break-all;">' + url + '</a>';
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--text-3);margin-top:4px;">Campaign: <a href="' + campaignUrl + '" target="_blank" rel="noopener" style="color:var(--text-2);text-decoration:underline;">' + campaign + '</a></div>';
    h += '</div></div>';
    if (p.is_feature) {
      h += '<div style="text-align:center;flex-shrink:0;min-width:60px;"><span class="chip chip-amber" style="font-size:10px;">FEATURE</span></div>';
    } else {
      h += '<div style="text-align:center;flex-shrink:0;min-width:60px;">';
      h += '<div style="font-size:24px;font-weight:700;color:var(--amber);">' + clicks + '</div>';
      h += '<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;">clicks</div>';
      h += '</div>';
    }
    h += '</div></div>';
  });
  return h;
}

function toggleTopPick(idx, val) {
  if (!S.topPicksChecked) S.topPicksChecked = {};
  S.topPicksChecked[idx] = val;
  render();
}

function copyTopPicks() {
  var picks = _allTopPicks();
  var selected = [];
  for (var i = 0; i < picks.length; i++) {
    if (S.topPicksChecked && S.topPicksChecked[i]) selected.push(picks[i]);
  }
  if (!selected.length) { showToast("No picks selected", "error"); return; }

  // Build rich HTML matching the Flat White template's Top Picks house format:
  // <li><p><strong>lead clause</strong> rest. <a ...>LINK</a></p></li>
  var htmlParts = [];
  var plainParts = [];
  selected.forEach(function(p) {
    var summary = (p.summary || "").replace(/\s+/g, " ").trim();
    // Strip section prefixes ("Editor's Pick:", "Doctor's Pick:", "Draft Pick:" —
    // straight or curly apostrophe) and the daily newsletter's greeting.
    summary = summary.replace(/^[A-Za-z]+(?:['’]s)?\s*pick\s*[:–—-]\s*/i, "");
    summary = summary.replace(/^good morning[.!]\s*/i, "");
    if (!summary) return;
    var url = p.url || "";
    if (!/[.!?]$/.test(summary)) summary += ".";
    // Bold the opening clause: cut at an early comma, else the first 10 words.
    var words = summary.split(" ");
    var cut = Math.min(10, words.length);
    for (var w = 4; w < Math.min(words.length, 14); w++) {
      if (words[w].slice(-1) === ",") { cut = w + 1; break; }
    }
    var lead = words.slice(0, cut).join(" ");
    var trailing = lead.slice(-1) === "," ? "," : "";
    if (trailing) lead = lead.slice(0, -1);
    var rest = words.slice(cut).join(" ");
    var anchor = "<a target=\"_blank\" rel=\"noopener noreferrer nofollow\" class=\"link\" href=\"" + escAttr(url) + "\">LINK</a>";
    htmlParts.push("<li><p><strong>" + esc(lead) + "</strong>" + trailing + (rest ? " " + esc(rest) : "") + " " + anchor + "</p></li>");
    plainParts.push(summary + " " + url);
  });
  if (!htmlParts.length) { showToast("Selected picks have no summary text", "error"); return; }
  var html = "<ul>" + htmlParts.join("") + "</ul>";
  var plain = plainParts.join("\n\n");

  // Copy as rich text so Beehiiv gets clickable links
  var blob = new Blob([html], { type: "text/html" });
  var plainBlob = new Blob([plain], { type: "text/plain" });
  navigator.clipboard.write([
    new ClipboardItem({ "text/html": blob, "text/plain": plainBlob })
  ]).then(function() {
    showToast("Copied " + selected.length + " picks with links");
  }).catch(function() {
    // Fallback: plain text
    navigator.clipboard.writeText(plain).then(function() {
      showToast("Copied " + selected.length + " picks (plain text)");
    });
  });
}

function scrapeTopPicks() {
  S.loading.top_picks = true; render();
  api("/api/top-picks/scrape", { method: "POST", body: { days: 7 } })
    .then(function(d) {
      S.topPicks = d;
      S.lastScraped.top_picks = d.scraped_at || null;
      S.loading.top_picks = false;
      S.topPicksChecked = {};
      render();
      showToast("Top Picks scraped — " + (d.picks || []).length + " links ranked");
    })
    .catch(function(e) {
      S.loading.top_picks = false; render();
      showToast("Scrape failed: " + e.message, "error");
    });
}

function renderTopPicks(el) {
  var hasPicks = !!(S.topPicks && S.topPicks.picks && S.topPicks.picks.length);
  var hasOutput = !!(S.sectionOutputs.top_picks && S.sectionOutputs.top_picks.output_text);
  if (!S.sectionPhase.top_picks) S.sectionPhase.top_picks = hasOutput ? 3 : (hasPicks ? 2 : 1);

  var p1 = '';
  p1 += '<div class="card mb20">';
  p1 += '<p style="font-size:13px;color:var(--text-2);margin:0 0 12px 0;">Fetches the last 7 days of Pick &amp; Scroll editions from Beehiiv and ranks all links by total click count.</p>';
  p1 += '<button class="btn btn-primary" onclick="scrapeTopPicks()">SCRAPE BEEHIIV</button>';
  if (S.loading.top_picks) p1 += ' <span class="ingest-spinner"></span>';
  if (S.lastScraped.top_picks) p1 += '<span style="font-size:11px;color:var(--text-3);margin-left:10px;">Last scraped: ' + esc(S.lastScraped.top_picks) + '</span>';
  p1 += '</div>';
  p1 += renderTopPicksFeaturesPanel();

  var p2 = renderTopPicksBody();
  p2 += '<div style="margin-top:12px;"><button class="btn btn-sm btn-secondary" onclick="buildTopPicksOutput()">Build block from selected</button></div>';

  var h = '';
  h += phasePanel('top_picks', 1, 'Scrape + flag features', true, hasPicks, p1);
  h += phasePanel('top_picks', 2, 'Select & Copy', true, false, p2);
  h += phasePanel('top_picks', 3, 'Output', true, hasOutput, outputBox('top_picks'));

  el.innerHTML = h;
  fillOutput('top_picks');
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: ASSEMBLE TO BEEHIIV (Increment 7 Task 6)
   ═══════════════════════════════════════════════════════════════════════ */
function renderAssemble(el) {
  var h = '<p style="font-size:13px;color:var(--text-2);margin:0 0 12px 0;">Builds the edition from every segment marked ready, in the running order shown on the left.</p>';

  h += '<div class="fb mb8"><label><input type="checkbox" id="asm-sponsor-on" onchange="S.assembleSponsorOn=this.checked"' +
       (S.assembleSponsorOn ? ' checked' : '') + '> Include sponsor this week</label></div>';
  h += '<input class="form-input mb8" id="asm-sponsor-name" placeholder="Sponsor name (e.g. Spaceship)" oninput="S.assembleSponsorName=this.value" value="' + escAttr(S.assembleSponsorName || "") + '">';
  h += '<textarea class="form-input mb8" id="asm-sponsor-text" placeholder="Sponsor pitch text..." oninput="S.assembleSponsorText=this.value">' + esc(S.assembleSponsorText || "") + '</textarea>';
  h += '<textarea class="form-input mb8" id="asm-odd-picks" placeholder="Odd Picks from last week (optional, one per line)..." oninput="S.assembleOddPicks=this.value">' + esc(S.assembleOddPicks || "") + '</textarea>';

  h += '<button class="btn btn-primary mb8" onclick="buildAssembly()">Build assembly</button>';

  if (S.assembly) {
    if (S.assembly.missing_ready.length) {
      h += '<p class="assemble-missing">Not ready / no saved output: ' + esc(S.assembly.missing_ready.join(", ")) + '</p>';
    }
    S.assembly.blocks.forEach(function(b) {
      var bm = b.benchmark;
      var chip = '';
      if (bm.status !== "no_data") {
        chip = '<span class="bench-chip bench-' + esc(bm.status) + '">' + bm.word_count + 'w vs ' + bm.target_min + '-' + bm.target_max + '</span>';
      }
      h += '<div class="block-preview"><h4>' + esc(b.label) + chip + '</h4>' + b.html + '</div>';
    });
    h += '<button class="btn btn-sm" onclick="copyAssembledHtml()">Copy assembled HTML</button>';
    h += '<p style="font-size:12px;color:var(--text-3);margin-top:14px;">Design B: this dash formats the blocks only. To publish, open the beehiiv MCP in a Claude session, read the target draft with get_post_content, then insert this HTML with edit_post_content - raw-API content write is Enterprise-gated on our plan.</p>';
  }

  el.innerHTML = h;
}

function buildAssembly() {
  S.assembleSponsorOn = $("asm-sponsor-on").checked;
  S.assembleSponsorName = $("asm-sponsor-name").value;
  S.assembleSponsorText = $("asm-sponsor-text").value;
  S.assembleOddPicks = $("asm-odd-picks").value;

  api("/api/assemble-edition", { method: "POST", body: {
    segments: SEGMENTS.map(function(s) { return { id: s.id, status: _segmentStatus(s) }; }),
    sponsor: { include: S.assembleSponsorOn, name: S.assembleSponsorName, text: S.assembleSponsorText },
    odd_picks_text: S.assembleOddPicks,
  }}).then(function(d) {
    S.assembly = d;
    render();
  }).catch(function(e) { showToast("Assemble failed: " + e.message, "error"); });
}

function copyAssembledHtml() {
  if (!S.assembly) return;
  navigator.clipboard.writeText(S.assembly.assembled_html).then(function() {
    showToast("Copied assembled HTML");
  }).catch(function() { showToast("Copy failed - select manually", "error"); });
}

/* ═══════════════════════════════════════════════════════════════════════
   SECTION: CONTENT BANK (Increment 7 Task 7)
   Replaces Increment 1's "bank" placeholder. Pieces produced ahead of time
   (Big Conversation, Brains Trust), decoupled from any specific week; "Pull
   into edition" writes the piece into THIS week's section_outputs under a
   chosen running-order segment id, via /api/content-bank/{id}/pull.
   ═══════════════════════════════════════════════════════════════════════ */
function renderBank(el) {
  var h = '<p style="font-size:13px;color:var(--text-2);margin:0 0 12px 0;">Pieces produced ahead of time. Pull one into this week\'s running order when needed.</p>';

  h += '<div class="fb mb8">';
  h += '<select class="form-input" id="bank-type"><option value="big_conversation">Big Conversation</option><option value="brains_trust">Brains Trust</option></select>';
  h += '<input class="form-input" id="bank-title" placeholder="Title">';
  h += '</div>';
  h += '<textarea class="form-input mb8" id="bank-body" placeholder="Piece text..."></textarea>';
  h += '<input class="form-input mb8" id="bank-source" placeholder="Source note (optional, e.g. folder name)">';
  h += '<button class="btn btn-primary mb8" onclick="addBankItem()">Add to bank</button>';

  (S.bankItems || []).forEach(function(item) {
    h += '<div class="block-preview"><h4>' + esc(item.segment_type) + '</h4>';
    h += '<div style="font-weight:600;margin-bottom:4px;">' + esc(item.title) + '</div>';
    h += '<div style="color:var(--label2);font-size:13px;margin-bottom:8px;">' + esc((item.body_text || "").slice(0, 160)) + '...</div>';
    h += '<select class="form-input" id="pull-target-' + item.id + '">';
    // NOTE: "brains_trust" (not "brains") is the real Brains Trust section
    // id everywhere else in this file (see SEGMENTS, loadPageData's
    // "brains_trust" case, and the render switch's "brains_trust" case) -
    // must match here too, or a pull "into" Brains Trust would silently
    // write to an orphaned "brains" section_outputs key that page never
    // reads.
    ["editorial","brains_trust","top_picks","insidetrack","pulse","off_the_clock","thread","big_conversation"].forEach(function(sid) {
      h += '<option value="' + sid + '">' + sid + '</option>';
    });
    h += '</select> ';
    h += '<button class="btn btn-sm" onclick="pullBankItem(' + item.id + ')">Pull into edition</button> ';
    h += '<button class="btn btn-sm" onclick="archiveBankItem(' + item.id + ')">Archive</button>';
    h += '</div>';
  });

  el.innerHTML = h;
}

function addBankItem() {
  var segmentType = $("bank-type").value;
  var title = $("bank-title").value.trim();
  var bodyText = $("bank-body").value.trim();
  var sourceNote = $("bank-source").value.trim();
  if (!title || !bodyText) { showToast("Title and body text are required", "error"); return; }

  api("/api/content-bank", { method: "POST", body: {
    segment_type: segmentType, title: title, body_text: bodyText, source_note: sourceNote || null,
  }}).then(function() {
    showToast("Added to bank");
    return loadBankItems();
  }).then(render).catch(function(e) { showToast("Error: " + e.message, "error"); });
}

function loadBankItems() {
  return api("/api/content-bank").then(function(d) { S.bankItems = d.items || []; });
}

function pullBankItem(bankId) {
  var target = $("pull-target-" + bankId).value;
  api("/api/content-bank/" + bankId + "/pull", { method: "POST", body: { target_section: target } })
    .then(function() {
      showToast("Pulled into " + target + " - open that page to review and mark ready");
    })
    .catch(function(e) { showToast("Pull failed: " + e.message, "error"); });
}

function archiveBankItem(bankId) {
  api("/api/content-bank/" + bankId + "/archive", { method: "POST" })
    .then(function() { return loadBankItems(); })
    .then(render)
    .catch(function(e) { showToast("Archive failed: " + e.message, "error"); });
}

/* ═══════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════ */
function init() {
  Promise.all([
    api("/api/models").catch(function() { return { models: [] }; }),
    api("/api/section-outputs").catch(function() { return { outputs: {} }; }),
    api("/api/pulse").catch(function() { return { pulse: null, signals: [], anomalies: [], week_iso: "" }; }),
    api("/api/pulse/trends").catch(function() { return null; }),
  ]).then(function(results) {
    S.models = results[0].models || [];
    try { S.proceedModel = JSON.parse(localStorage.getItem("fw_proceedModel") || "{}"); } catch(e) {}
    S.sectionOutputs = results[1].outputs || {};
    S.weekIso = results[1].week_iso || results[2].week_iso || "";
    S.pulse = results[2].pulse;
    S.signals = results[2].signals || [];
    S.anomalies = results[2].anomalies || [];
    S.lastScraped.pulse = results[2].last_scraped_at || null;
    S.trends = results[3] || null;
    // Task 3 Step 3: default selection opens on a real page (Editorial,
    // SEGMENTS[0]) instead of the bare render() the shell used to call.
    selectSegment(SEGMENTS[0].id);
  });
}

init();
